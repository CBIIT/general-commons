        - sample_ids # alias for sample_id - for GraphQL parameter compatibility
        - is_tumor # sample.sample_tumor_status - array
        - sample_types # sample.sample_type - array
        - analyte_type # sample.sample_type - array
        # Diagnoses
        - primary_diagnoses # diagnosis.primary_diagnosis - array
        - site # diagnosis.primary_site - array
        # Genomic Info
        - library_strategies # genomic_info.library_strategy - array
        - library_source_materials # genomic_info.library_source_material - array
        - library_source_molecules # genomic_info.library_source_molecule - array
        - library_layouts # genomic_info.library_layout - array
        - library_selections # genomic_info.library_selection - array
        - platforms # genomic_info.platform - array
        - instrument_models # genomic_info.instrument_model - array
        - reference_genome_assemblies # genomic_info.reference_genome_assembly - array
        # Imaging
        - image_modality # image.image_modality - array
        - organ_or_tissue # image.organ_or_tissue - array
        - tissue_fixative # MultiplexMicroscopy.tissue_fixative - array
        - imaging_assay_type # MultiplexMicroscopy.imaging_assay_type - array
        # Proteomic
        - analytical_fractions # proteomic.analytical_fractions - array
        - instrument_makes # proteomic.instrument_make - array
        - proteomic_design_descriptions # proteomic.proteomic_design_description - array
        # Experimental Strategies
        - experimental_strategies # file.experimental_strategy_and_data_subtypes - array
        - file_types # file.file_type - array
        # Sort properties
        - experimental_strategies_sort # derived from experimental_strategies - single value
        - sex_sort # derived from sex - single value
        - races_sort # derived from races - single value
        - is_tumor_sort # derived from is_tumor - single value
        - sample_types_sort # derived from sample_types - single value
        - analyte_type_sort # derived from analyte_type - single value
        - library_strategies_sort # derived from library_strategies - single value
        - library_source_materials_sort # derived from library_source_materials - single value
        - library_source_molecules_sort # derived from library_source_molecules - single value
        - library_layouts_sort # derived from library_layouts - single value
        - library_selections_sort # derived from library_selections - single value
        - platforms_sort # derived from platforms - single value
        - instrument_models_sort # derived from instrument_models - single value
        - primary_diagnoses_sort # derived from primary_diagnoses - single value
        - site_sort # derived from site - single value
        - image_modality_sort # derived from image_modality - single value
        - organ_or_tissue_sort # derived from organ_or_tissue - single value
        - tissue_fixative_sort # derived from tissue_fixative - single value
        - imaging_assay_type_sort # derived from imaging_assay_type - single value
        - supplementary_file_names_sort # derived from supplementary_file_names - single value
        # Associated Files
        - associated_file # file.file_name - single value
        - associated_drs_uri # calculated - single value
        - associated_md5sum # file.md5sum - single value
        # caNanoLab Protocol
        - protocol_pk_ids # Protocol.protocol_pk_id - protocol_pk_ids_filter - array
        - protocol_names # Protocol.protocol_name - protocol_names_filter - array
        - protocol_types # Protocol.protocol_type - protocol_types_filter - array
        - doi_urls # Protocol.doi_url - doi_urls_filter - array
        - dois # Protocol.doi - dois_filter - array
        # caNanoLab Publication
        - publication_titles # Publication.Publication_Title - publication_titles_filter - array
        - publication_statuses # Publication.Publication_Status - publication_statuses_filter - array
        - pub_ids # Publication.DOI_or_Pub_ID - pub_ids_filter - array
        # caNanoLab Composition
        - nanomaterial_entities # Composition.Nanomaterial_Entity_Type - nanomaterial_entities_filter - array
        - functionalizing_entities # Composition.Functionalizing_Entity_Type - functionalizing_entities_filter - array
        # caNanoLab Characterization
        - characterization_types # Characterization.Characterization_Type - characterization_types_filter - array
        - characterization_names # Characterization.Characterization_Name - characterization_names_filter - array
      long:
        - file_size # file.file_size - single value
        - number_of_study_participants # calculated - single value
        - number_of_study_samples # calculated - single value
    initial_query:
      # file_id
      # file_name
      # file_type
      # file_size
      # md5sum
      # file_url_in_cds
      # drs_uri
      # is_supplementary_file
      # release_datetime
      # supplementary_file_names
      # experimental_strategies
      # file_types
      # experimental_strategies_sort
      query: |
        MATCH (f:file)
        WITH DISTINCT f
        ORDER BY f.file_id
        SKIP $skip LIMIT $limit
        WITH f, "Not specified in data" AS nsd,
          split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") AS experimental_strategies
        WITH f, nsd, 
            CASE WHEN experimental_strategies IS NULL OR size(experimental_strategies)=0 THEN [nsd] ELSE experimental_strategies END AS experimental_strategies
        CALL {
          WITH experimental_strategies
          UNWIND experimental_strategies AS experimental_strategy
          WITH experimental_strategy
          ORDER BY experimental_strategy
          WITH collect(experimental_strategy) AS sorted_experimental_strategies
          RETURN sorted_experimental_strategies, reduce(s = '', i IN sorted_experimental_strategies | s + i + '') AS experimental_strategies_sort
        }
        WITH f, nsd, sorted_experimental_strategies, experimental_strategies_sort,
          COALESCE(toUpper(f.file_type), nsd) AS file_type
        RETURN DISTINCT
          f.file_id AS file_id,
          f.file_id AS file_ids,
          f.file_name AS file_name,
          f.file_name AS file_names,
          file_type,
          f.file_size AS file_size,
          f.md5sum AS md5sum,
          f.file_url_in_cds AS file_url_in_cds,
          'drs://nci-crdc.datacommons.io/' + f.file_id AS drs_uri,
          COALESCE(f.is_supplementary_file, nsd) AS is_supplementary_file,
          f.release_datetime AS release_datetime,
          sorted_experimental_strategies AS experimental_strategies,
          [file_type] AS file_types,
          experimental_strategies_sort
      page_size: 20000
    update_queries:
      # Studies
      - name: Studies
        # accesses
        # acl
        # phs_accession
        # studies
        # study_data_types
        # number_of_study_participants
        # number_of_study_samples
        query: |
          MATCH (s:study)
          WITH s 
          SKIP $skip LIMIT $limit 
          OPTIONAL MATCH (s)<-[*]-(f:file)
          WITH DISTINCT s, COLLECT(DISTINCT f.file_id) AS file_ids, "Not specified in data" AS nsd, "Not Applicable" AS na
          CALL {
            WITH s
            OPTIONAL MATCH (s)<-[*]-(p:participant)
            WITH s, COUNT(DISTINCT p) AS number_of_study_participants
            OPTIONAL MATCH (s)<-[*]-(samp:sample)
            RETURN number_of_study_participants, count(distinct samp) AS number_of_study_samples
          }
          WITH 
            s, file_ids, nsd, na, number_of_study_participants, number_of_study_samples,
            split(replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', ''), ", ") AS study_data_types,
            CASE WHEN s.acl = '[]' THEN nsd ELSE replace(replace(replace(s.acl, '[', ''), ']', ''), '"', '') END AS acl
          WITH 
            s, file_ids, nsd, na, number_of_study_participants, number_of_study_samples,
            CASE WHEN study_data_types IS NULL OR size(study_data_types)=0 THEN [nsd] ELSE study_data_types END AS study_data_types,
            acl
          UNWIND file_ids AS file_id
          WITH file_id, s, nsd, na, study_data_types, number_of_study_participants, number_of_study_samples,
            COLLECT(DISTINCT CASE WHEN s IS NULL THEN null ELSE COALESCE(s.study_access, nsd) END) AS accesses,
            COLLECT(DISTINCT acl) AS acl,
            COLLECT(DISTINCT CASE WHEN s IS NULL THEN null ELSE COALESCE(s.phs_accession, nsd) END) AS phs_accession,
            COLLECT(DISTINCT CASE WHEN s IS NULL THEN null ELSE COALESCE(s.study_name, nsd) END) AS studies,
            COLLECT(DISTINCT CASE WHEN s IS NULL THEN null ELSE COALESCE(s.study_name, nsd) END) AS study_name
          CALL {
            WITH accesses
            UNWIND accesses AS access_value
            WITH access_value
            ORDER BY access_value
            RETURN collect(access_value) AS sorted_accesses
          }
          CALL {
            WITH phs_accession
            UNWIND phs_accession AS phs_value
            WITH phs_value
            ORDER BY phs_value
            RETURN collect(phs_value) AS sorted_phs_accession
          }
          CALL {
            WITH studies
            UNWIND studies AS study_value
            WITH study_value
            ORDER BY study_value
            RETURN collect(study_value) AS sorted_studies
          }
          CALL {
            WITH study_name, nsd
            WITH CASE WHEN study_name IS NULL OR size(study_name)=0 THEN [nsd] ELSE study_name END AS study_name
            UNWIND study_name AS study_name_value
            WITH study_name_value
            ORDER BY study_name_value
            WITH collect(study_name_value) AS sorted_study_name
            RETURN sorted_study_name, reduce(s = '', i IN sorted_study_name | s + i + '') AS study_name_sort
          }
          CALL {
            WITH study_data_types
            UNWIND study_data_types AS study_data_type_value
            WITH study_data_type_value
            ORDER BY study_data_type_value
            RETURN collect(study_data_type_value) AS sorted_study_data_types
          }
          RETURN
            file_id,
            sorted_accesses AS accesses,
            acl,
            sorted_phs_accession AS phs_accession,
            sorted_studies AS studies,
            sorted_study_name AS study_name,
            study_name_sort,
            sorted_study_data_types AS study_data_types,
            number_of_study_participants,
            number_of_study_samples
        page_size: 1
      # Participants
      - name: Participants
        # sex
        # sex_sort
        # races
        # races_sort
        # subject_ids
        # study_participant_ids
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-->(p:participant)
          WITH f.file_id AS file_id, p, "Not specified in data" AS nsd, "Not Applicable" AS na
          WITH file_id, nsd, na,
            COLLECT(DISTINCT CASE WHEN p IS NULL THEN null ELSE COALESCE(p.sex, nsd) END) AS sex,
            COLLECT(DISTINCT CASE WHEN p IS NULL THEN null ELSE COALESCE(p.race, nsd) END) AS races,
            COLLECT(DISTINCT CASE WHEN p IS NULL THEN null ELSE COALESCE(p.participant_id, nsd) END) AS participant_ids,
            COLLECT(DISTINCT CASE WHEN p IS NULL THEN null ELSE COALESCE(p.study_participant_id, nsd) END) AS study_participant_ids
          WITH file_id, nsd, na,
            CASE WHEN size(sex) = 0 THEN [na] ELSE sex END AS sex,
            CASE WHEN size(races) = 0 THEN [na] ELSE races END AS races,
            participant_ids,
            study_participant_ids
          CALL {
            WITH sex
            UNWIND sex AS sex_value
            WITH sex_value
            ORDER BY sex_value
            WITH collect(sex_value) AS sorted_sex
            RETURN sorted_sex, reduce(s = '', i IN sorted_sex | s + i + '') AS sex_sort
          }
          CALL {
            WITH races
            UNWIND races AS race_value
            WITH race_value
            ORDER BY race_value
            WITH collect(race_value) AS sorted_races
            RETURN sorted_races, reduce(s = '', i IN sorted_races | s + i + '') AS races_sort
          }
          CALL {
            WITH participant_ids
            UNWIND participant_ids AS participant_id
            WITH participant_id
            ORDER BY participant_id
            RETURN collect(participant_id) AS sorted_subject_ids
          }
          RETURN 
            file_id,
            sorted_sex AS sex,
            sex_sort,
            sorted_races AS races,
            races_sort,
            sorted_subject_ids AS subject_ids,
            study_participant_ids
        page_size: 5000
      # Samples
      - name: Samples
        # is_tumor
        # is_tumor_sort
        # sample_types
        # sample_types_sort
        # analyte_type
        # analyte_type_sort
        # sample_id
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-->(samp:sample)
          WITH DISTINCT f.file_id AS file_id, samp, "Not specified in data" AS nsd, "Not Applicable" AS na
          WITH file_id, nsd, na,
            COLLECT(DISTINCT CASE WHEN samp IS NULL THEN null ELSE COALESCE(samp.sample_tumor_status, nsd) END) AS sample_tumor_status,
            COLLECT(DISTINCT samp.sample_type) AS raw_sample_types,
            COLLECT(DISTINCT CASE WHEN samp IS NULL THEN null ELSE COALESCE(samp.sample_id, nsd) END) AS sample_id
          CALL {
            WITH raw_sample_types, nsd
            UNWIND (CASE WHEN size(raw_sample_types) = 0 THEN [null] ELSE raw_sample_types END) AS raw_sample_type
            WITH CASE WHEN raw_sample_type IS NULL THEN null ELSE COALESCE(TRIM(LAST(split(raw_sample_type, ':'))), nsd) END AS processed_sample_type
            RETURN COLLECT(DISTINCT processed_sample_type) AS sample_type
          }
          WITH file_id, nsd, na, sample_tumor_status, sample_id, sample_type
          WITH file_id, nsd, na, 
            CASE WHEN size(sample_tumor_status) = 0 THEN [na] ELSE sample_tumor_status END AS is_tumor,
            CASE WHEN size(sample_type) = 0 THEN [na] ELSE sample_type END AS sample_types,
            CASE WHEN size(sample_id) = 0 THEN [na] ELSE sample_id END AS sample_id
          CALL {
            WITH is_tumor
            UNWIND is_tumor AS tumor_status
            WITH tumor_status
            ORDER BY tumor_status
            WITH collect(tumor_status) AS sorted_is_tumor
            RETURN sorted_is_tumor, reduce(s = '', i IN sorted_is_tumor | s + i + '') AS is_tumor_sort
          }
          CALL {
            WITH sample_types
            UNWIND sample_types AS sample_type_value
            WITH sample_type_value
            ORDER BY sample_type_value
            WITH collect(distinct sample_type_value) AS sorted_sample_types
            RETURN sorted_sample_types, 
                   sorted_sample_types AS sorted_analyte_type,
                   reduce(s = '', i IN sorted_sample_types | s + i + '') AS sample_types_sort,
                   reduce(s = '', i IN sorted_sample_types | s + i + '') AS analyte_type_sort
          }
          CALL {
            WITH sample_id
            UNWIND sample_id AS sample_id_value
            WITH sample_id_value
            ORDER BY sample_id_value
            RETURN collect(sample_id_value) AS sorted_sample_id
          }
          RETURN 
            file_id,
            sorted_is_tumor AS is_tumor,
            is_tumor_sort,
            sorted_sample_types AS sample_types,
            sample_types_sort,
            sorted_analyte_type AS analyte_type,
            analyte_type_sort,
            sorted_sample_id AS sample_id,
            sorted_sample_id AS sample_ids
        page_size: 25000
      # Diagnoses
      - name: Diagnoses
        # primary_diagnoses
        # primary_diagnoses_sort
        # site
        # site_sort
        query: |
          MATCH (f:file)
          WITH DISTINCT f, "Not specified in data" AS nsd, "Not Applicable" AS na
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-->(p:participant)<--(diag1:diagnosis)
          OPTIONAL MATCH (diag2:diagnosis)-->(samp:sample)<--(f)
          WITH f, [diag1, diag2] AS diagList, nsd, na
          UNWIND diagList AS diag
          WITH DISTINCT diag as diag, f, nsd, na
          WITH f.file_id AS file_id, nsd, na, 
          COLLECT(DISTINCT CASE WHEN diag IS NULL THEN null ELSE COALESCE(TRIM(LAST(split(diag.primary_diagnosis, ':'))), nsd) END) AS primary_diagnoses,
          COLLECT(DISTINCT CASE WHEN diag IS NULL THEN null ELSE COALESCE(diag.primary_site, nsd) END) AS primary_sites
          WITH file_id, nsd, na, 
            CASE WHEN primary_diagnoses IS NULL OR size(primary_diagnoses)=0 THEN [na] ELSE primary_diagnoses END AS primary_diagnoses,
            CASE WHEN primary_sites IS NULL OR size(primary_sites)=0 THEN [na] ELSE primary_sites END AS site
          CALL {
            WITH primary_diagnoses
            UNWIND primary_diagnoses AS primary_diagnosis
            WITH primary_diagnosis
            ORDER BY primary_diagnosis
            WITH collect(primary_diagnosis) AS sorted_primary_diagnoses
            RETURN sorted_primary_diagnoses, reduce(s = '', i IN sorted_primary_diagnoses | s + i + '') AS primary_diagnoses_sort
          }
          CALL {
            WITH site
            UNWIND site AS site_value
            WITH site_value
            ORDER BY site_value
            WITH collect(site_value) AS sorted_site
            RETURN sorted_site, reduce(s = '', i IN sorted_site | s + i + '') AS site_sort
          }
          RETURN DISTINCT
            file_id,
            sorted_primary_diagnoses AS primary_diagnoses,
            primary_diagnoses_sort,
            sorted_site AS site,
            site_sort
        page_size: 5000
      # Genomic Info
      - name: Genomic Info
        # library_strategies
        # library_strategies_sort
        # library_source_materials
        # library_source_materials_sort
        # library_source_molecules
        # library_source_molecules_sort
        # library_layouts
        # library_layouts_sort
        # library_selections
        # library_selections_sort
        # platforms
        # platforms_sort
        # instrument_models
        # instrument_models_sort
        # reference_genome_assemblies
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)<-[:of_file]-(g:genomic_info)
          WITH f.file_id AS file_id, g, "Not specified in data" AS nsd, "Not Applicable" AS na
          WITH file_id, nsd, na,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_strategy, nsd) END) AS library_strategies,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_source_material, nsd) END) AS library_source_materials,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_source_molecule, nsd) END) AS library_source_molecules,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_layout, nsd) END) AS library_layouts,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_selection, nsd) END) AS library_selections,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.platform, nsd) END) AS platforms,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.instrument_model, nsd) END) AS instrument_models,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.reference_genome_assembly, nsd) END) AS reference_genome_assemblies
          WITH file_id, nsd, na,
            CASE WHEN size(library_strategies) = 0 THEN [na] ELSE library_strategies END AS library_strategies,
            CASE WHEN size(library_source_materials) = 0 THEN [na] ELSE library_source_materials END AS library_source_materials,
            CASE WHEN size(library_source_molecules) = 0 THEN [na] ELSE library_source_molecules END AS library_source_molecules,
            CASE WHEN size(library_layouts) = 0 THEN [na] ELSE library_layouts END AS library_layouts,
            CASE WHEN size(library_selections) = 0 THEN [na] ELSE library_selections END AS library_selections,
            CASE WHEN size(platforms) = 0 THEN [na] ELSE platforms END AS platforms,
            CASE WHEN size(instrument_models) = 0 THEN [na] ELSE instrument_models END AS instrument_models,
            CASE WHEN size(reference_genome_assemblies) = 0 THEN [na] ELSE reference_genome_assemblies END AS reference_genome_assemblies
          CALL {
            WITH library_strategies
            UNWIND library_strategies AS library_strategy
            WITH library_strategy
            ORDER BY library_strategy
            WITH collect(library_strategy) AS sorted_library_strategies
            RETURN sorted_library_strategies, reduce(s = '', i IN sorted_library_strategies | s + i + '') AS library_strategies_sort
          }
          CALL {
            WITH library_source_materials
            UNWIND library_source_materials AS library_source_material
            WITH library_source_material
            ORDER BY library_source_material
            WITH collect(library_source_material) AS sorted_library_source_materials
            RETURN sorted_library_source_materials, reduce(s = '', i IN sorted_library_source_materials | s + i + '') AS library_source_materials_sort
          }
          CALL {
            WITH library_source_molecules
            UNWIND library_source_molecules AS library_source_molecule
            WITH library_source_molecule
            ORDER BY library_source_molecule
            WITH collect(library_source_molecule) AS sorted_library_source_molecules
            RETURN sorted_library_source_molecules, reduce(s = '', i IN sorted_library_source_molecules | s + i + '') AS library_source_molecules_sort
          }
          CALL {
            WITH library_layouts
            UNWIND library_layouts AS library_layout
            WITH library_layout
            ORDER BY library_layout
            WITH collect(library_layout) AS sorted_library_layouts
            RETURN sorted_library_layouts, reduce(s = '', i IN sorted_library_layouts | s + i + '') AS library_layouts_sort
          }
          CALL {
            WITH library_selections
            UNWIND library_selections AS library_selection
            WITH library_selection
            ORDER BY library_selection
            WITH collect(library_selection) AS sorted_library_selections
            RETURN sorted_library_selections, reduce(s = '', i IN sorted_library_selections | s + i + '') AS library_selections_sort
          }
          CALL {
            WITH platforms
            UNWIND platforms AS platform
            WITH platform
            ORDER BY platform
            WITH collect(platform) AS sorted_platforms
            RETURN sorted_platforms, reduce(s = '', i IN sorted_platforms | s + i + '') AS platforms_sort
          }
          CALL {
            WITH instrument_models
            UNWIND instrument_models AS instrument_model
            WITH instrument_model
            ORDER BY instrument_model
            WITH collect(instrument_model) AS sorted_instrument_models
            RETURN sorted_instrument_models, reduce(s = '', i IN sorted_instrument_models | s + i + '') AS instrument_models_sort
          }
          CALL {
            WITH reference_genome_assemblies
            UNWIND reference_genome_assemblies AS reference_genome_assembly
            WITH reference_genome_assembly
            ORDER BY reference_genome_assembly
            RETURN collect(reference_genome_assembly) AS sorted_reference_genome_assemblies
          }
          RETURN 
            file_id,
            sorted_library_strategies AS library_strategies,
            library_strategies_sort,
            sorted_library_source_materials AS library_source_materials,
            library_source_materials_sort,
            sorted_library_source_molecules AS library_source_molecules,
            library_source_molecules_sort,
            sorted_library_layouts AS library_layouts,
            library_layouts_sort,
            sorted_library_selections AS library_selections,
            library_selections_sort,
            sorted_platforms AS platforms,
            platforms_sort,
            sorted_instrument_models AS instrument_models,
            instrument_models_sort,
            sorted_reference_genome_assemblies AS reference_genome_assemblies
        page_size: 5000
      # Imaging
      - name: Imaging
        # image_modality
        # organ_or_tissue
        # tissue_fixative
        # imaging_assay_type
        # license
        query: |
          MATCH (f:file)
          WITH DISTINCT f, "Not specified in data" AS nsd, "Not Applicable" AS na
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)<-[:of_file]-(i:image)
          OPTIONAL MATCH (i)<-[:of_image]-(mm:MultiplexMicroscopy)
          WITH DISTINCT f.file_id AS file_id, nsd, na,
            COLLECT(DISTINCT CASE WHEN i IS NULL THEN null ELSE COALESCE(i.organ_or_tissue, nsd) END) AS organ_or_tissue,
            COLLECT(DISTINCT CASE WHEN i IS NULL THEN null ELSE COALESCE(i.image_modality, nsd) END) AS image_modality,
            COLLECT(DISTINCT CASE WHEN mm IS NULL THEN null ELSE COALESCE(mm.imaging_assay_type, nsd) END) AS imaging_assay_type,
            COLLECT(DISTINCT CASE WHEN mm IS NULL THEN null ELSE COALESCE(mm.tissue_fixative, nsd) END) AS tissue_fixative,
            COLLECT(DISTINCT i.license) AS license_values
          WITH file_id, nsd, na,
            CASE WHEN size(organ_or_tissue) = 0 THEN [na] ELSE organ_or_tissue END AS organ_or_tissue,
            CASE WHEN size(image_modality) = 0 THEN [na] ELSE image_modality END AS image_modality,
            CASE WHEN size(imaging_assay_type) = 0 THEN [na] ELSE imaging_assay_type END AS imaging_assay_type,
            CASE WHEN size(tissue_fixative) = 0 THEN [na] ELSE tissue_fixative END AS tissue_fixative,
            CASE WHEN size(license_values) = 0 OR license_values[0] IS NULL THEN na ELSE license_values[0] END AS license
          CALL {
            WITH image_modality
            UNWIND image_modality AS modality
            WITH modality
            ORDER BY modality
            WITH collect(modality) AS sorted_image_modality
            RETURN sorted_image_modality, reduce(s = '', i IN sorted_image_modality | s + i + '') AS image_modality_sort
          }
          CALL {
            WITH organ_or_tissue
            UNWIND organ_or_tissue AS organ_tissue
            WITH organ_tissue
            ORDER BY organ_tissue
            WITH collect(organ_tissue) AS sorted_organ_or_tissue
            RETURN sorted_organ_or_tissue, reduce(s = '', i IN sorted_organ_or_tissue | s + i + '') AS organ_or_tissue_sort
          }
          CALL {
            WITH tissue_fixative
            UNWIND tissue_fixative AS fixative
            WITH fixative
            ORDER BY fixative
            WITH collect(fixative) AS sorted_tissue_fixative
            RETURN sorted_tissue_fixative, reduce(s = '', i IN sorted_tissue_fixative | s + i + '') AS tissue_fixative_sort
          }
          CALL {
            WITH imaging_assay_type
            UNWIND imaging_assay_type AS assay_type
            WITH assay_type
            ORDER BY assay_type
            WITH collect(assay_type) AS sorted_imaging_assay_type
            RETURN sorted_imaging_assay_type, reduce(s = '', i IN sorted_imaging_assay_type | s + i + '') AS imaging_assay_type_sort
          }
          RETURN DISTINCT 
            file_id,
            sorted_organ_or_tissue AS organ_or_tissue,
            organ_or_tissue_sort,
            sorted_image_modality AS image_modality,
            image_modality_sort,
            sorted_imaging_assay_type AS imaging_assay_type,
            imaging_assay_type_sort,
            sorted_tissue_fixative AS tissue_fixative,
            tissue_fixative_sort,
            license
        page_size: 5000
      # Proteomic
      - name: Proteomic
        # analytical_fractions
        # instrument_makes
        # proteomic_design_descriptions
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)<-[:of_file]-(pr:proteomic)
          WITH f.file_id AS file_id, pr, "Not specified in data" AS nsd, "Not Applicable" AS na
          WITH file_id, nsd, na,
            COLLECT(DISTINCT CASE WHEN pr IS NULL THEN null ELSE COALESCE(pr.analytical_fractions, nsd) END) AS analytical_fractions,
            COLLECT(DISTINCT CASE WHEN pr IS NULL THEN null ELSE COALESCE(pr.instrument_make, nsd) END) AS instrument_makes,
            COLLECT(DISTINCT CASE WHEN pr IS NULL THEN null ELSE COALESCE(pr.proteomic_design_description, nsd) END) AS proteomic_design_descriptions
          WITH file_id, nsd, na,
            CASE WHEN size(analytical_fractions) = 0 THEN [na] ELSE analytical_fractions END AS analytical_fractions,
            CASE WHEN size(instrument_makes) = 0 THEN [na] ELSE instrument_makes END AS instrument_makes,
            CASE WHEN size(proteomic_design_descriptions) = 0 THEN [na] ELSE proteomic_design_descriptions END AS proteomic_design_descriptions
          RETURN DISTINCT 
            file_id,
            analytical_fractions,
            instrument_makes,
            proteomic_design_descriptions
        page_size: 5000
      # Associated Files
      - name: Associated Files
        # associated_file
        # associated_drs_uri
        # associated_md5sum
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-->(af:file)
          WITH f.file_id AS file_id, af, "Not specified in data" AS nsd, "Not Applicable" AS na
          RETURN DISTINCT
            file_id,
            CASE WHEN af IS NULL THEN na ELSE COALESCE(af.file_name, nsd) END AS associated_file,
            CASE WHEN af IS NULL THEN na WHEN af.file_id IS NOT NULL THEN 'drs://nci-crdc.datacommons.io/' + af.file_id ELSE nsd END AS associated_drs_uri,
            CASE WHEN af IS NULL THEN na ELSE COALESCE(af.md5sum, nsd) END AS associated_md5sum
        page_size: 5000
      # Supplementary File Names
      - name: Supplementary File Names
        # supplementary_file_names
        # supplementary_file_names_sort
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-[:of_file]->(sf:file)
          WHERE sf.is_supplementary_file = true
          WITH f.file_id AS file_id, COLLECT(DISTINCT sf.file_name) AS supplementary_file_names, "Not specified in data" AS nsd, "Not Applicable" AS na
          WITH file_id, nsd, na,
            CASE WHEN size(supplementary_file_names) = 0 THEN [] ELSE supplementary_file_names END AS supplementary_file_names
          CALL {
            WITH supplementary_file_names
            UNWIND supplementary_file_names AS file_name
            WITH file_name
            ORDER BY file_name
            WITH collect(file_name) AS sorted_supplementary_file_names
            RETURN sorted_supplementary_file_names, reduce(s = '', i IN sorted_supplementary_file_names | s + i + '') AS supplementary_file_names_sort
          }
          RETURN DISTINCT
            file_id,
            sorted_supplementary_file_names AS supplementary_file_names,
            supplementary_file_names_sort
        page_size: 5000
      # caNanoLab Protocol
      - name: "caNanoLab Protocol"
        # protocol_names
        # protocol_types
        # doi_urls
        # dois
        # protocol_pk_ids
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          WITH f, "Not specified in data" AS nsd, "Not Applicable" AS na
          OPTIONAL MATCH (f)<-[*]-(proto:Protocol)
          WITH f, nsd, na,
            COLLECT(DISTINCT CASE WHEN proto IS NULL THEN null ELSE COALESCE(proto.protocol_name, nsd) END) AS protocol_names_raw,
            COLLECT(DISTINCT CASE WHEN proto IS NULL THEN null ELSE COALESCE(proto.protocol_type, nsd) END) AS protocol_types_raw,
            COLLECT(DISTINCT CASE WHEN proto IS NULL THEN null ELSE COALESCE(proto.doi_url, nsd) END) AS doi_urls_raw,
            COLLECT(DISTINCT CASE WHEN proto IS NULL THEN null ELSE COALESCE(proto.doi, nsd) END) AS dois_raw,
            COLLECT(DISTINCT CASE WHEN proto IS NULL THEN null ELSE COALESCE(proto.protocol_pk_id, nsd) END) AS protocol_pk_ids_raw
          RETURN DISTINCT
            f.file_id AS file_id,
            CASE WHEN size(protocol_names_raw)=0 THEN [na] ELSE protocol_names_raw END AS protocol_names,
            CASE WHEN size(protocol_types_raw)=0 THEN [na] ELSE protocol_types_raw END AS protocol_types,
            CASE WHEN size(doi_urls_raw)=0 THEN [na] ELSE doi_urls_raw END AS doi_urls,
            CASE WHEN size(dois_raw)=0 THEN [na] ELSE dois_raw END AS dois,
            CASE WHEN size(protocol_pk_ids_raw)=0 THEN [na] ELSE protocol_pk_ids_raw END AS protocol_pk_ids
        page_size: 5000
      # caNanoLab Publication
      - name: "caNanoLab Publication"
        # publication_titles
        # publication_statuses
        # pub_ids
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          WITH f, "Not specified in data" AS nsd, "Not Applicable" AS na
          OPTIONAL MATCH (f)-->(samp:sample)<-[*]-(pub:Publication)
          WITH f, nsd, na,
            COLLECT(DISTINCT CASE WHEN pub IS NULL THEN null ELSE COALESCE(pub.Publication_Title, nsd) END) AS publication_titles_raw,
            COLLECT(DISTINCT CASE WHEN pub IS NULL THEN null ELSE COALESCE(pub.Publication_Status, nsd) END) AS publication_statuses_raw,
            COLLECT(DISTINCT CASE WHEN pub IS NULL THEN null ELSE COALESCE(pub.DOI_or_Pub_ID, nsd) END) AS pub_ids_raw
          RETURN DISTINCT
            f.file_id AS file_id,
            CASE WHEN size(publication_titles_raw)=0 THEN [na] ELSE publication_titles_raw END AS publication_titles,
            CASE WHEN size(publication_statuses_raw)=0 THEN [na] ELSE publication_statuses_raw END AS publication_statuses,
            CASE WHEN size(pub_ids_raw)=0 THEN [na] ELSE pub_ids_raw END AS pub_ids
        page_size: 5000
      # caNanoLab Composition
      - name: "caNanoLab Composition"
        # nanomaterial_entities
        # functionalizing_entities
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          WITH f, "Not specified in data" AS nsd, "Not Applicable" AS na
          OPTIONAL MATCH (f)-->(samp:sample)<-[*]-(comp:Composition)
          WITH f, nsd, na,
            COLLECT(DISTINCT CASE WHEN comp IS NULL OR comp.Nanomaterial_Entity_Type = "[]" THEN null ELSE COALESCE(replace(replace(replace(comp.Nanomaterial_Entity_Type, '[', ''), ']', ''), '"', ''), nsd) END) AS nanomaterial_entities_raw,
            COLLECT(DISTINCT CASE WHEN comp IS NULL OR comp.Functionalizing_Entity_Type = "[]" THEN null ELSE COALESCE(replace(replace(replace(comp.Functionalizing_Entity_Type, '[', ''), ']', ''), '"', ''), nsd) END) AS functionalizing_entities_raw
          RETURN DISTINCT
            f.file_id AS file_id,
            CASE WHEN size(nanomaterial_entities_raw)=0 THEN [na] ELSE nanomaterial_entities_raw END AS nanomaterial_entities,
            CASE WHEN size(functionalizing_entities_raw)=0 THEN [na] ELSE functionalizing_entities_raw END AS functionalizing_entities
        page_size: 5000
      # caNanoLab Characterization
      - name: "caNanoLab Characterization"
        # characterization_types
        # characterization_names
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          WITH f, "Not specified in data" AS nsd, "Not Applicable" AS na
          OPTIONAL MATCH (f)-->(samp:sample)<-[*]-(char:Characterization)
          WITH f, nsd, na,
            COLLECT(DISTINCT CASE WHEN char IS NULL OR char.Characterization_Type = "[]" THEN null ELSE COALESCE(replace(replace(replace(char.Characterization_Type, '[', ''), ']', ''), '"', ''), nsd) END) AS characterization_types_raw,
            COLLECT(DISTINCT CASE WHEN char IS NULL OR char.Characterization_Name = "[]" THEN null ELSE COALESCE(replace(replace(replace(char.Characterization_Name, '[', ''), ']', ''), '"', ''), nsd) END) AS characterization_names_raw
          RETURN DISTINCT
            f.file_id AS file_id,
            CASE WHEN size(characterization_types_raw)=0 THEN [na] ELSE characterization_types_raw END AS characterization_types,
            CASE WHEN size(characterization_names_raw)=0 THEN [na] ELSE characterization_names_raw END AS characterization_names
        page_size: 5000
  - index_name: "dashboard_file_experimental_strategy"
    id_field: "file_id_experimental_strategy"
    mapping:
      keyword:
        # initial_query
        - file_id_experimental_strategy # calculated - single value
        - file_id # file.file_id - single value
        - file_ids # alias for file_id - for GraphQL parameter compatibility
        - experimental_strategies # file.experimental_strategy_and_data_subtypes - single value
        # Study
        - accesses # study.study_access - array
        - acl # study.acl - array
        - phs_accession # study.phs_accession - array
        - studies # study.study_name - array
        - study_data_types # study.study_data_types - array
        # Participants
        - sex # participant.sex - array
        - subject_ids # participant.participant_id - array
        # Samples
        - sample_id # sample.sample_id - array
        - sample_ids # alias for sample_id - for GraphQL parameter compatibility
        - is_tumor # sample.sample_tumor_status - array
        - sample_types # sample.sample_type - array
        - analyte_type # sample.sample_type - array
        # Diagnoses
        - primary_diagnoses # diagnosis.primary_diagnosis - array
        - site # diagnosis.primary_site - array
        # Genomic Info
        - library_strategies # genomic_info.library_strategy - array
        - library_source_materials # genomic_info.library_source_material - array
        - library_source_molecules # genomic_info.library_source_molecule - array
        - library_layouts # genomic_info.library_layout - array
        - library_selections # genomic_info.library_selection - array
        - platforms # genomic_info.platform - array
        - instrument_models # genomic_info.instrument_model - array
        - reference_genome_assemblies # genomic_info.reference_genome_assembly - array
        # Imaging
        - image_modality # image.image_modality - array
        - organ_or_tissue # image.organ_or_tissue - array
        - tissue_fixative # MultiplexMicroscopy.tissue_fixative - array
        - imaging_assay_type # MultiplexMicroscopy.imaging_assay_type - array
        # Proteomic
        - analytical_fractions # proteomic.analytical_fractions - array
        - instrument_makes # proteomic.instrument_make - array
        - proteomic_design_descriptions # proteomic.proteomic_design_description - array
        # caNanoLab Protocol
        - protocol_names # Protocol.protocol_name - protocol_names_filter - array
        - protocol_types # Protocol.protocol_type - protocol_types_filter - array
        - doi_urls # Protocol.doi_url - doi_urls_filter - array
        - dois # Protocol.doi - dois_filter - array
        # caNanoLab Publication
        - publication_titles # Publication.Publication_Title - publication_titles_filter - array
        - publication_statuses # Publication.Publication_Status - publication_statuses_filter - array
        - pub_ids # Publication.DOI_or_Pub_ID - pub_ids_filter - array
        # caNanoLab Composition
        - nanomaterial_entities # Composition.Nanomaterial_Entity_Type - nanomaterial_entities_filter - array
        - functionalizing_entities # Composition.Functionalizing_Entity_Type - functionalizing_entities_filter - array
        # caNanoLab Characterization
        - characterization_types # Characterization.Characterization_Type - characterization_types_filter - array
        - characterization_names # Characterization.Characterization_Name - characterization_names_filter - array
      long:
        - number_of_study_participants # calculated - single value
        - number_of_study_samples # calculated - single value
      boolean:
        - is_supplementary_file # file.is_supplementary_file - for GraphQL parameter compatibility
    initial_query:
      # file_id_experimental_strategy
      # file_id
      # experimental_strategies
      query: |
        MATCH (f:file)
        WITH DISTINCT f
        ORDER BY f.file_id
        SKIP $skip LIMIT $limit
        WITH f, "Not specified in data" AS nsd,
          split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") AS experimental_strategies
        WITH f, nsd, 
            CASE WHEN experimental_strategies IS NULL OR size(experimental_strategies)=0 THEN [nsd] ELSE experimental_strategies END AS experimental_strategies
        UNWIND experimental_strategies AS experimental_strategy
        RETURN DISTINCT
          f.file_id + "_" + COALESCE(experimental_strategy, nsd) AS file_id_experimental_strategy,
          f.file_id AS file_id,
          f.file_id AS file_ids,
          COALESCE(experimental_strategy, nsd) AS experimental_strategies,
          COALESCE(f.is_supplementary_file, false) AS is_supplementary_file
      page_size: 50000
    update_queries:
      # Studies
      - name: Studies
        # accesses
        # acl
        # phs_accession
        # studies
        # study_data_types
        # number_of_study_participants
        # number_of_study_samples
        query: |
          MATCH (s:study)
          WITH s 
          SKIP $skip LIMIT $limit 
          OPTIONAL MATCH (s)<-[:of_study]-(f:file)
          WITH DISTINCT s, COLLECT(DISTINCT f) AS fs, "Not specified in data" AS nsd, "Not Applicable" AS na
          CALL {
            WITH s
            OPTIONAL MATCH (s)<-[*]-(p:participant)
            WITH s, COUNT(DISTINCT p) AS number_of_study_participants
            OPTIONAL MATCH (s)<-[*]-(samp:sample)
            RETURN number_of_study_participants, count(distinct samp) AS number_of_study_samples
          }
          WITH s, fs, nsd, na, number_of_study_participants, number_of_study_samples,
            split(replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', ''), ", ") AS study_data_types,
            CASE WHEN s.acl = '[]' THEN nsd ELSE replace(replace(replace(s.acl, '[', ''), ']', ''), '"', '') END AS acl
          WITH s, fs, nsd, na, number_of_study_participants, number_of_study_samples,
            CASE WHEN study_data_types IS NULL OR size(study_data_types)=0 THEN [nsd] ELSE study_data_types END AS study_data_types,
            acl
          UNWIND fs AS f
          WITH f, s, nsd, na, study_data_types, acl, number_of_study_participants, number_of_study_samples,
            split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") AS experimental_strategies
          WITH f, s, nsd, na, study_data_types, acl, number_of_study_participants, number_of_study_samples,
            CASE WHEN experimental_strategies IS NULL OR size(experimental_strategies)=0 THEN [nsd] ELSE experimental_strategies END AS experimental_strategies
          UNWIND experimental_strategies AS experimental_strategy
          RETURN
            f.file_id + "_" + COALESCE(experimental_strategy, nsd) AS file_id_experimental_strategy,
            COLLECT(DISTINCT CASE WHEN s IS NULL THEN null ELSE COALESCE(s.study_access, nsd) END) AS accesses,
            COLLECT(DISTINCT acl) AS acl,
            COLLECT(DISTINCT CASE WHEN s IS NULL THEN null ELSE COALESCE(s.phs_accession, nsd) END) AS phs_accession,
            COLLECT(DISTINCT CASE WHEN s IS NULL THEN null ELSE COALESCE(s.study_name, nsd) END) AS studies,
            study_data_types,
            number_of_study_participants,
            number_of_study_samples
        page_size: 1
      # Participants
      - name: Participants
        # sex
        # subject_ids
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          WITH f, "Not specified in data" AS nsd, "Not Applicable" AS na,
            split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") AS experimental_strategies
          WITH f, nsd, na,
            CASE WHEN experimental_strategies IS NULL OR size(experimental_strategies)=0 THEN [nsd] ELSE experimental_strategies END AS experimental_strategies
          UNWIND experimental_strategies AS experimental_strategy
          OPTIONAL MATCH (f)-[:of_participant]->(p:participant)
          WITH f, experimental_strategy, p, nsd, na
          WITH f, experimental_strategy, nsd, na,
            COLLECT(DISTINCT CASE WHEN p IS NULL THEN null ELSE COALESCE(p.sex, nsd) END) AS sex,
            COLLECT(DISTINCT CASE WHEN p IS NULL THEN null ELSE COALESCE(p.participant_id, nsd) END) AS participant_ids
          WITH f, experimental_strategy, nsd, na, sex, participant_ids
          WITH f, experimental_strategy, nsd, na,
            CASE WHEN size(sex) = 0 THEN [na] ELSE sex END AS sex,
            CASE WHEN size(participant_ids) = 0 THEN [na] ELSE participant_ids END AS subject_ids
          RETURN 
            f.file_id + "_" + COALESCE(experimental_strategy, nsd) AS file_id_experimental_strategy,
            sex,
            subject_ids
        page_size: 5000
      # Samples
      - name: Samples
        # is_tumor
        # sample_types
        # analyte_type
        # sample_id
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          WITH f, "Not specified in data" AS nsd, "Not Applicable" AS na,
            split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") AS experimental_strategies
          WITH f, nsd, na,
            CASE WHEN experimental_strategies IS NULL OR size(experimental_strategies)=0 THEN [nsd] ELSE experimental_strategies END AS experimental_strategies
          UNWIND experimental_strategies AS experimental_strategy
          OPTIONAL MATCH (f)-->(samp:sample)
          WITH DISTINCT f, experimental_strategy, nsd, na,
            COLLECT(DISTINCT CASE WHEN samp IS NULL THEN null ELSE COALESCE(samp.sample_tumor_status, nsd) END) AS sample_tumor_status,
            COLLECT(DISTINCT CASE WHEN samp IS NULL THEN null ELSE COALESCE(TRIM(LAST(split(samp.sample_type, ':'))), nsd) END) AS sample_type,
            COLLECT(DISTINCT CASE WHEN samp IS NULL THEN null ELSE COALESCE(samp.sample_id, nsd) END) AS sample_id
          WITH DISTINCT f, experimental_strategy, nsd, na,
            CASE WHEN size(sample_tumor_status) = 0 THEN [na] ELSE sample_tumor_status END AS is_tumor,
            CASE WHEN size(sample_type) = 0 THEN [na] ELSE sample_type END AS sample_types,
            CASE WHEN size(sample_id) = 0 THEN [na] ELSE sample_id END AS sample_id
          RETURN 
            f.file_id + "_" + COALESCE(experimental_strategy, nsd) AS file_id_experimental_strategy,
            is_tumor,
            sample_types,
            sample_types AS analyte_type,
            sample_id,
            sample_id AS sample_ids
        page_size: 25000
      # Diagnoses
      - name: Diagnoses
        # primary_diagnoses
        # site
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          WITH f, "Not specified in data" AS nsd, "Not Applicable" AS na,
            split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") AS experimental_strategies
          WITH f, nsd, na,
            CASE WHEN experimental_strategies IS NULL OR size(experimental_strategies)=0 THEN [nsd] ELSE experimental_strategies END AS experimental_strategies
          UNWIND experimental_strategies AS experimental_strategy
          OPTIONAL MATCH (f)-->(p:participant)<--(diag1:diagnosis)
          OPTIONAL MATCH (diag2:diagnosis)-->(samp:sample)<--(f)
          WITH f, [diag1, diag2] AS diagList, nsd, na, experimental_strategy
          UNWIND diagList AS diag
          WITH DISTINCT diag as diag, f, nsd, na, experimental_strategy
          WITH f, experimental_strategy, nsd, na,
            COLLECT(DISTINCT CASE WHEN diag IS NULL THEN null ELSE COALESCE(TRIM(LAST(split(diag.primary_diagnosis, ':'))), nsd) END) AS primary_diagnoses,
            COLLECT(DISTINCT CASE WHEN diag IS NULL THEN null ELSE COALESCE(diag.primary_site, nsd) END) AS site
          WITH f, experimental_strategy, nsd, na, 
            CASE WHEN primary_diagnoses IS NULL OR size(primary_diagnoses)=0 THEN [na] ELSE primary_diagnoses END AS primary_diagnoses,
            CASE WHEN site IS NULL OR size(site)=0 THEN [na] ELSE site END AS site
          RETURN DISTINCT
            f.file_id + "_" + COALESCE(experimental_strategy, nsd) AS file_id_experimental_strategy,
            primary_diagnoses,
            site
        page_size: 5000
      # Genomic Info
      - name: Genomic Info
        # library_strategies
        # library_source_materials
        # library_source_molecules
        # library_layouts
        # library_selections
        # platforms
        # instrument_models
        # reference_genome_assemblies
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          WITH f, "Not specified in data" AS nsd, "Not Applicable" AS na,
            split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") AS experimental_strategies
          WITH f, nsd, na,
            CASE WHEN experimental_strategies IS NULL OR size(experimental_strategies)=0 THEN [nsd] ELSE experimental_strategies END AS experimental_strategies
          UNWIND experimental_strategies AS experimental_strategy
          OPTIONAL MATCH (f)<-[:of_file]-(g:genomic_info)
          WITH f, experimental_strategy, g, nsd, na
          WITH f, experimental_strategy, nsd, na,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_strategy, nsd) END) AS library_strategies,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_source_material, nsd) END) AS library_source_materials,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_source_molecule, nsd) END) AS library_source_molecules,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_layout, nsd) END) AS library_layouts,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_selection, nsd) END) AS library_selections,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.platform, nsd) END) AS platforms,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.instrument_model, nsd) END) AS instrument_models,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.reference_genome_assembly, nsd) END) AS reference_genome_assemblies
          WITH f, experimental_strategy, nsd, na, library_strategies, library_source_materials, library_source_molecules,
            library_layouts, library_selections, platforms, instrument_models, reference_genome_assemblies
          WITH f, experimental_strategy, nsd, na,
            CASE WHEN size(library_strategies) = 0 THEN [na] ELSE library_strategies END AS library_strategies,
            CASE WHEN size(library_source_materials) = 0 THEN [na] ELSE library_source_materials END AS library_source_materials,
            CASE WHEN size(library_source_molecules) = 0 THEN [na] ELSE library_source_molecules END AS library_source_molecules,
            CASE WHEN size(library_layouts) = 0 THEN [na] ELSE library_layouts END AS library_layouts,
            CASE WHEN size(library_selections) = 0 THEN [na] ELSE library_selections END AS library_selections,
            CASE WHEN size(platforms) = 0 THEN [na] ELSE platforms END AS platforms,
            CASE WHEN size(instrument_models) = 0 THEN [na] ELSE instrument_models END AS instrument_models,
            CASE WHEN size(reference_genome_assemblies) = 0 THEN [na] ELSE reference_genome_assemblies END AS reference_genome_assemblies
          RETURN 
            f.file_id + "_" + COALESCE(experimental_strategy, nsd) AS file_id_experimental_strategy,
            library_strategies,
            library_source_materials,
            library_source_molecules,
            library_layouts,
            library_selections,
            platforms,
            instrument_models,
            reference_genome_assemblies
        page_size: 5000
      # Imaging
      - name: Imaging
        # image_modality
        # organ_or_tissue
        # tissue_fixative
        # imaging_assay_type
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          WITH f, "Not specified in data" AS nsd, "Not Applicable" AS na,
            split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") AS experimental_strategies
          WITH f, nsd, na,
            CASE WHEN experimental_strategies IS NULL OR size(experimental_strategies)=0 THEN [nsd] ELSE experimental_strategies END AS experimental_strategies
          UNWIND experimental_strategies AS experimental_strategy
          OPTIONAL MATCH (f)<-[:of_file]-(i:image)
          OPTIONAL MATCH (i)<-[:of_image]-(mm:MultiplexMicroscopy)
          WITH DISTINCT f, experimental_strategy, nsd, na,
            COLLECT(DISTINCT CASE WHEN i IS NULL THEN null ELSE COALESCE(i.image_modality, nsd) END) AS image_modality,
            COLLECT(DISTINCT CASE WHEN i IS NULL THEN null ELSE COALESCE(i.organ_or_tissue, nsd) END) AS organ_or_tissue,
            COLLECT(DISTINCT CASE WHEN mm IS NULL THEN null ELSE COALESCE(mm.imaging_assay_type, nsd) END) AS imaging_assay_type,
            COLLECT(DISTINCT CASE WHEN mm IS NULL THEN null ELSE COALESCE(mm.tissue_fixative, nsd) END) AS tissue_fixative
          WITH f, experimental_strategy, nsd, na,
            CASE WHEN size(image_modality) = 0 THEN [na] ELSE image_modality END AS image_modality,
            CASE WHEN size(organ_or_tissue) = 0 THEN [na] ELSE organ_or_tissue END AS organ_or_tissue,
            CASE WHEN size(imaging_assay_type) = 0 THEN [na] ELSE imaging_assay_type END AS imaging_assay_type,
            CASE WHEN size(tissue_fixative) = 0 THEN [na] ELSE tissue_fixative END AS tissue_fixative
          RETURN DISTINCT 
            f.file_id + "_" + COALESCE(experimental_strategy, nsd) AS file_id_experimental_strategy,
            image_modality,
            organ_or_tissue,
            imaging_assay_type,
            tissue_fixative 
        page_size: 5000
      # Proteomic
      - name: Proteomic
        # analytical_fractions
        # instrument_makes
        # proteomic_design_descriptions
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          WITH f, "Not specified in data" AS nsd, "Not Applicable" AS na,
            split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") AS experimental_strategies
          WITH f, nsd, na,
            CASE WHEN experimental_strategies IS NULL OR size(experimental_strategies)=0 THEN [nsd] ELSE experimental_strategies END AS experimental_strategies
          UNWIND experimental_strategies AS experimental_strategy
          OPTIONAL MATCH (f)<-[:of_file]-(pr:proteomic)
          WITH f, experimental_strategy, pr, nsd, na
          WITH f, experimental_strategy, nsd, na,
            COLLECT(DISTINCT CASE WHEN pr IS NULL THEN null ELSE COALESCE(pr.analytical_fractions, nsd) END) AS analytical_fractions,
            COLLECT(DISTINCT CASE WHEN pr IS NULL THEN null ELSE COALESCE(pr.instrument_make, nsd) END) AS instrument_makes,
            COLLECT(DISTINCT CASE WHEN pr IS NULL THEN null ELSE COALESCE(pr.proteomic_design_description, nsd) END) AS proteomic_design_descriptions
          WITH f, experimental_strategy, nsd, na, analytical_fractions, instrument_makes, proteomic_design_descriptions
          WITH f, experimental_strategy, nsd, na,
            CASE WHEN size(analytical_fractions) = 0 THEN [na] ELSE analytical_fractions END AS analytical_fractions,
            CASE WHEN size(instrument_makes) = 0 THEN [na] ELSE instrument_makes END AS instrument_makes,
            CASE WHEN size(proteomic_design_descriptions) = 0 THEN [na] ELSE proteomic_design_descriptions END AS proteomic_design_descriptions
          RETURN DISTINCT 
            f.file_id + "_" + COALESCE(experimental_strategy, nsd) AS file_id_experimental_strategy,
            analytical_fractions,
            instrument_makes,
            proteomic_design_descriptions
        page_size: 5000
      # caNanoLab Protocol
      - name: "caNanoLab Protocol"
        # protocol_names
        # protocol_types
        # doi_urls
        # dois
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          WITH f, "Not specified in data" AS nsd, "Not Applicable" AS na,
            split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") AS experimental_strategies
          WITH f, nsd, na,
            CASE WHEN experimental_strategies IS NULL OR size(experimental_strategies)=0 THEN [nsd] ELSE experimental_strategies END AS experimental_strategies
          UNWIND experimental_strategies AS experimental_strategy
          OPTIONAL MATCH (f)<-[*]-(proto:Protocol)
          WITH f, experimental_strategy, nsd, na,
            COLLECT(DISTINCT CASE WHEN proto IS NULL THEN null ELSE COALESCE(proto.protocol_name, nsd) END) AS protocol_names_raw,
            COLLECT(DISTINCT CASE WHEN proto IS NULL THEN null ELSE COALESCE(proto.protocol_type, nsd) END) AS protocol_types_raw,
            COLLECT(DISTINCT CASE WHEN proto IS NULL THEN null ELSE COALESCE(proto.doi_url, nsd) END) AS doi_urls_raw,
            COLLECT(DISTINCT CASE WHEN proto IS NULL THEN null ELSE COALESCE(proto.doi, nsd) END) AS dois_raw
          RETURN DISTINCT
            f.file_id + "_" + COALESCE(experimental_strategy, nsd) AS file_id_experimental_strategy,
            CASE WHEN size(protocol_names_raw)=0 THEN [na] ELSE protocol_names_raw END AS protocol_names,
            CASE WHEN size(protocol_types_raw)=0 THEN [na] ELSE protocol_types_raw END AS protocol_types,
            CASE WHEN size(doi_urls_raw)=0 THEN [na] ELSE doi_urls_raw END AS doi_urls,
            CASE WHEN size(dois_raw)=0 THEN [na] ELSE dois_raw END AS dois
        page_size: 5000
      # caNanoLab Publication
      - name: "caNanoLab Publication"
        # publication_titles
        # publication_statuses
        # pub_ids
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          WITH f, "Not specified in data" AS nsd, "Not Applicable" AS na,
            split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") AS experimental_strategies
          WITH f, nsd, na,
            CASE WHEN experimental_strategies IS NULL OR size(experimental_strategies)=0 THEN [nsd] ELSE experimental_strategies END AS experimental_strategies
          UNWIND experimental_strategies AS experimental_strategy
          OPTIONAL MATCH (f)-->(samp:sample)<-[*]-(pub:Publication)
          WITH f, experimental_strategy, nsd, na,
            COLLECT(DISTINCT CASE WHEN pub IS NULL THEN null ELSE COALESCE(pub.Publication_Title, nsd) END) AS publication_titles_raw,
            COLLECT(DISTINCT CASE WHEN pub IS NULL THEN null ELSE COALESCE(pub.Publication_Status, nsd) END) AS publication_statuses_raw,
            COLLECT(DISTINCT CASE WHEN pub IS NULL THEN null ELSE COALESCE(pub.DOI_or_Pub_ID, nsd) END) AS pub_ids_raw
          RETURN DISTINCT
            f.file_id + "_" + COALESCE(experimental_strategy, nsd) AS file_id_experimental_strategy,
            CASE WHEN size(publication_titles_raw)=0 THEN [na] ELSE publication_titles_raw END AS publication_titles,
            CASE WHEN size(publication_statuses_raw)=0 THEN [na] ELSE publication_statuses_raw END AS publication_statuses,
            CASE WHEN size(pub_ids_raw)=0 THEN [na] ELSE pub_ids_raw END AS pub_ids
        page_size: 5000
      # caNanoLab Composition
      - name: "caNanoLab Composition"
        # nanomaterial_entities
        # functionalizing_entities
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          WITH f, "Not specified in data" AS nsd, "Not Applicable" AS na,
            split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") AS experimental_strategies
          WITH f, nsd, na,
            CASE WHEN experimental_strategies IS NULL OR size(experimental_strategies)=0 THEN [nsd] ELSE experimental_strategies END AS experimental_strategies
          UNWIND experimental_strategies AS experimental_strategy
          OPTIONAL MATCH (f)-->(samp:sample)<-[*]-(comp:Composition)
          WITH f, experimental_strategy, nsd, na,
            COLLECT(DISTINCT CASE WHEN comp IS NULL OR comp.Nanomaterial_Entity_Type = "[]" THEN null ELSE COALESCE(replace(replace(replace(comp.Nanomaterial_Entity_Type, '[', ''), ']', ''), '"', ''), nsd) END) AS nanomaterial_entities_raw,
            COLLECT(DISTINCT CASE WHEN comp IS NULL OR comp.Functionalizing_Entity_Type = "[]" THEN null ELSE COALESCE(replace(replace(replace(comp.Functionalizing_Entity_Type, '[', ''), ']', ''), '"', ''), nsd) END) AS functionalizing_entities_raw
          RETURN DISTINCT
            f.file_id + "_" + COALESCE(experimental_strategy, nsd) AS file_id_experimental_strategy,
            CASE WHEN size(nanomaterial_entities_raw)=0 THEN [na] ELSE nanomaterial_entities_raw END AS nanomaterial_entities,
            CASE WHEN size(functionalizing_entities_raw)=0 THEN [na] ELSE functionalizing_entities_raw END AS functionalizing_entities
        page_size: 5000
      # caNanoLab Characterization
      - name: "caNanoLab Characterization"
        # characterization_types
        # characterization_names
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          WITH f, "Not specified in data" AS nsd, "Not Applicable" AS na,
            split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") AS experimental_strategies
          WITH f, nsd, na,
            CASE WHEN experimental_strategies IS NULL OR size(experimental_strategies)=0 THEN [nsd] ELSE experimental_strategies END AS experimental_strategies
          UNWIND experimental_strategies AS experimental_strategy
          OPTIONAL MATCH (f)-->(samp:sample)<-[*]-(char:Characterization)
          WITH f, experimental_strategy, nsd, na,
            COLLECT(DISTINCT CASE WHEN char IS NULL OR char.Characterization_Type = "[]" THEN null ELSE COALESCE(replace(replace(replace(char.Characterization_Type, '[', ''), ']', ''), '"', ''), nsd) END) AS characterization_types_raw,
            COLLECT(DISTINCT CASE WHEN char IS NULL OR char.Characterization_Name = "[]" THEN null ELSE COALESCE(replace(replace(replace(char.Characterization_Name, '[', ''), ']', ''), '"', ''), nsd) END) AS characterization_names_raw
          RETURN DISTINCT
            f.file_id + "_" + COALESCE(experimental_strategy, nsd) AS file_id_experimental_strategy,
            CASE WHEN size(characterization_types_raw)=0 THEN [na] ELSE characterization_types_raw END AS characterization_types,
            CASE WHEN size(characterization_names_raw)=0 THEN [na] ELSE characterization_names_raw END AS characterization_names
        page_size: 5000
  - index_name: "dashboard_study_data_type"
    id_field: "file_id_study_data_type"
    mapping:
      keyword:
        - file_id_study_data_type
        - file_id
        - study_study_data_type_filter
        - study_data_types
        - studies # study.study_name - study_study_name_filter - array
        - phs_accession # study.phs_accession - study_phs_accession_filter - array
        - experimental_strategies # file.experimental_strategy_and_data_subtypes - files_experimental_strategy_filter - array
        - file_types # file.file_type - files_file_type_filter - array
        - sex # participant.sex - demographics_sex_filter - single value
        - is_tumor # sample.sample_tumor_status - samples_sample_tumor_status_filter - array
        - sample_types # sample.sample_type - samples_sample_type_filter - array
        # File Diagnoses
        - primary_diagnoses # diagnosis.primary_diagnosis - diagnosis_primary_diagnosis_filter - array
        #- diagnosis_primary_diagnosis_filter # diagnosis.primary_diagnosis - array
        # File Genomic Info
        - library_strategies # genomic_info.library_strategy - genomic_library_strategy_filter - array
        - library_source_materials # genomic_info.library_source_material - genomic_library_source_material_filter - array
        - library_source_molecules # genomic_info.library_source_molecule - genomic_library_source_molecule_filter - array
        - library_layouts # genomic_info.library_layout - genomic_library_layout_filter - array
        - library_selections # genomic_info.library_selection - genomic_library_selection_filter - array
        - platforms # genomic_info.platform - genomic_platform_filter - array
        - instrument_models # genomic_info.instrument_model - genomic_instrument_model_filter - array
        - reference_genome_assemblies # genomic_info.reference_genome_assembly - genomic_reference_genome_assembly_filter - array
        # File Imaging
        - image_modality # image.image_modality - imaging_image_modality_filter - array
        - organ_or_tissue # image.organ_or_tissue - imaging_tissue_or_organ_of_origin_filter - array 
        - tissue_fixative # MultiplexMicroscopy.tissue_fixative - imaging_tissue_fixative_filter - array
        - imaging_assay_type # MultiplexMicroscopy.imaging_assay_type - imaging_imaging_assay_type_filter - array
        # File Proteomic
        - analytical_fractions # proteomic.analytical_fractions - proteomic_analytical_fractions_filter - array
        - instrument_makes # proteomic.instrument_make - proteomic_instrument_makes_filter - array
        # caNanoLab Protocol
        - protocol_names # Protocol.protocol_name - protocol_names_filter - array
        - protocol_types # Protocol.protocol_type - protocol_types_filter - array
        - doi_urls # Protocol.doi_url - doi_urls_filter - array
        - dois # Protocol.doi - dois_filter - array
        # caNanoLab Publication
        - publication_titles # Publication.Publication_Title - publication_titles_filter - array
        - publication_statuses # Publication.Publication_Status - publication_statuses_filter - array
        - pub_ids # Publication.DOI_or_Pub_ID - pub_ids_filter - array
        # caNanoLab Composition
        - nanomaterial_entities # Composition.Nanomaterial_Entity_Type - nanomaterial_entities_filter - array
        - functionalizing_entities # Composition.Functionalizing_Entity_Type - functionalizing_entities_filter - array
        # caNanoLab Characterization
        - characterization_types # Characterization.Characterization_Type - characterization_types_filter - array
        - characterization_names # Characterization.Characterization_Name - characterization_names_filter - array
      long:
        - number_of_study_participants # calculated - single value
        - number_of_study_samples # calculated - single value
      boolean:
        - files_is_supplementary_file_filter
        - is_supplementary_file # alias for files_is_supplementary_file_filter - for GraphQL parameter compatibility
    initial_query:
      # file_id_study_data_type
      # file_id
      # study_study_data_type_filter
      # study_data_types
      query: |
        MATCH (f:file)
        WITH DISTINCT f
        SKIP $skip LIMIT $limit
        OPTIONAL MATCH (f)-[:of_study]->(s:study)
        WITH DISTINCT s, COLLECT(DISTINCT f) AS fs, "Not specified in data" AS nsd,
          split(replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', ''), ", ") AS study_data_types
        WITH s, fs, nsd,
            CASE WHEN study_data_types IS NULL OR size(study_data_types)=0 THEN [nsd] ELSE study_data_types END AS study_data_types
        UNWIND study_data_types AS study_data_type
        UNWIND fs AS f
        RETURN DISTINCT
          f.file_id + "_" + COALESCE(study_data_type, nsd) AS file_id_study_data_type,
          f.file_id AS file_id,
          COALESCE(study_data_type, nsd) AS study_study_data_type_filter,
          COALESCE(study_data_type, nsd) AS study_data_types
      page_size: 5000
    update_queries:
      # Studies
      - name: Studies
        # studies
        # phs_accession
        # number_of_study_participants
        # number_of_study_samples
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-[:of_study]->(s:study)
          WITH DISTINCT s, COLLECT(DISTINCT f) AS fs, "Not specified in data" AS nsd, "Not Applicable" AS na
          CALL {
            WITH s
            OPTIONAL MATCH (s)<-[*]-(p:participant)
            WITH s, COUNT(DISTINCT p) AS number_of_study_participants
            OPTIONAL MATCH (s)<-[*]-(samp:sample)
            RETURN number_of_study_participants, count(distinct samp) AS number_of_study_samples
          }
          WITH s, fs, nsd, na, number_of_study_participants, number_of_study_samples,
            split(replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', ''), ", ") AS study_data_types
          WITH s, fs, nsd, na, number_of_study_participants, number_of_study_samples,
            CASE WHEN study_data_types IS NULL OR size(study_data_types)=0 THEN [nsd] ELSE study_data_types END AS study_data_types
          UNWIND study_data_types AS study_data_type
          UNWIND fs AS f
          RETURN DISTINCT
            f.file_id + "_" + COALESCE(study_data_type, nsd) AS file_id_study_data_type,
            COLLECT(DISTINCT CASE WHEN s IS NULL THEN null ELSE COALESCE(s.study_name, nsd) END) AS studies,
            COLLECT(DISTINCT CASE WHEN s IS NULL THEN null ELSE COALESCE(s.phs_accession, nsd) END) AS phs_accession,
            COALESCE(study_data_type, nsd) AS study_data_types,
            number_of_study_participants,
            number_of_study_samples
        page_size: 5000
      # Files
      - name: Files
        # experimental_strategies
        # file_types
        # files_is_supplementary_file_filter
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-[:of_study]->(s:study)
          WITH DISTINCT s, COLLECT(DISTINCT f) AS fs, "Not specified in data" AS nsd, "Not Applicable" AS na,
            split(replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', ''), ", ") AS study_data_types
          WITH s, fs, nsd, na,
            CASE WHEN study_data_types IS NULL OR size(study_data_types)=0 THEN [nsd] ELSE study_data_types END AS study_data_types
          UNWIND study_data_types AS study_data_type
          UNWIND fs AS f
          WITH f, study_data_type, nsd, na,
            split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") AS experimental_strategies
          WITH f, study_data_type, nsd, na,
            CASE WHEN experimental_strategies IS NULL OR size(experimental_strategies)=0 THEN [nsd] ELSE experimental_strategies END AS experimental_strategies
          UNWIND experimental_strategies AS experimental_strategy
          WITH f, study_data_type, nsd, na, experimental_strategy
          WITH f, study_data_type, nsd, na,
            COLLECT(DISTINCT CASE WHEN experimental_strategy IS NULL THEN null ELSE COALESCE(experimental_strategy, nsd) END) AS experimental_strategies,
            COLLECT(DISTINCT CASE WHEN f IS NULL THEN null ELSE COALESCE(f.file_type, nsd) END) AS file_types,
            COLLECT(DISTINCT COALESCE(f.is_supplementary_file, false)) AS files_is_supplementary_file_filter
          WITH f, study_data_type, nsd, na, experimental_strategies, file_types, files_is_supplementary_file_filter
          WITH f, study_data_type, nsd, na,
            CASE WHEN size(experimental_strategies) = 0 THEN [na] ELSE experimental_strategies END AS experimental_strategies,
            CASE WHEN size(file_types) = 0 THEN [na] ELSE file_types END AS file_types,
            files_is_supplementary_file_filter
          RETURN DISTINCT
            f.file_id + "_" + COALESCE(study_data_type, nsd) AS file_id_study_data_type,
            experimental_strategies,
            file_types,
            files_is_supplementary_file_filter,
            files_is_supplementary_file_filter AS is_supplementary_file
        page_size: 5000
      # Participants
      - name: Participants
        # sex
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-[:of_study]->(s:study)
          WITH DISTINCT s, COLLECT(DISTINCT f) AS fs, "Not specified in data" AS nsd, "Not Applicable" AS na,
            split(replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', ''), ", ") AS study_data_types
          WITH s, fs, nsd, na,
            CASE WHEN study_data_types IS NULL OR size(study_data_types)=0 THEN [nsd] ELSE study_data_types END AS study_data_types
          UNWIND study_data_types AS study_data_type
          UNWIND fs AS f
          OPTIONAL MATCH (f)-[:of_participant]->(p:participant)
          WITH f, study_data_type, nsd, na,
            COLLECT(DISTINCT CASE WHEN p IS NULL THEN null ELSE COALESCE(p.sex, nsd) END) AS sex
          WITH f, study_data_type, nsd, na,
            CASE WHEN size(sex) = 0 THEN [na] ELSE sex END AS sex
          RETURN DISTINCT
            f.file_id + "_" + COALESCE(study_data_type, nsd) AS file_id_study_data_type,
            sex
        page_size: 5000
      # Samples
      - name: Samples
        # is_tumor
        # sample_types
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-[:of_study]->(s:study)
          WITH DISTINCT s, COLLECT(DISTINCT f) AS fs, "Not specified in data" AS nsd, "Not Applicable" AS na,
            split(replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', ''), ", ") AS study_data_types
          WITH s, fs, nsd, na,
            CASE WHEN study_data_types IS NULL OR size(study_data_types)=0 THEN [nsd] ELSE study_data_types END AS study_data_types
          UNWIND study_data_types AS study_data_type
          UNWIND fs AS f
          OPTIONAL MATCH (f)-[:of_participant]->(p:participant)
          OPTIONAL MATCH (p)<-[:of_participant]-(samp:sample)
          WITH f, study_data_type, nsd, na,
            COLLECT(DISTINCT CASE WHEN samp IS NULL THEN null ELSE COALESCE(samp.sample_tumor_status, nsd) END) AS is_tumor,
            COLLECT(DISTINCT CASE WHEN samp IS NULL THEN null ELSE COALESCE(samp.sample_type, nsd) END) AS sample_types
          WITH f, study_data_type, nsd, na,
            CASE WHEN size(is_tumor) = 0 THEN [na] ELSE is_tumor END AS is_tumor,
            CASE WHEN size(sample_types) = 0 THEN [na] ELSE sample_types END AS sample_types
          RETURN DISTINCT
            f.file_id + "_" + COALESCE(study_data_type, nsd) AS file_id_study_data_type,
            is_tumor,
            sample_types
        page_size: 5000
      # Diagnoses
      - name: Diagnoses
        # primary_diagnoses
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-[:of_study]->(s:study)
          WITH DISTINCT s, COLLECT(DISTINCT f) AS fs, "Not specified in data" AS nsd, "Not Applicable" AS na,
            split(replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', ''), ", ") AS study_data_types
          WITH s, fs, nsd, na,
            CASE WHEN study_data_types IS NULL OR size(study_data_types)=0 THEN [nsd] ELSE study_data_types END AS study_data_types
          UNWIND study_data_types AS study_data_type
          UNWIND fs AS f
          OPTIONAL MATCH (f)-->(p:participant)<--(diag:diagnosis)
          WITH f, study_data_type, nsd, na,
            COLLECT(DISTINCT CASE WHEN diag IS NULL THEN null ELSE COALESCE(diag.primary_diagnosis, nsd) END) AS primary_diagnoses
          WITH f, study_data_type, nsd, na,
            CASE WHEN primary_diagnoses IS NULL OR size(primary_diagnoses)=0 THEN [na] ELSE primary_diagnoses END AS primary_diagnoses
          RETURN DISTINCT
            f.file_id + "_" + COALESCE(study_data_type, nsd) AS file_id_study_data_type,
            primary_diagnoses
        page_size: 5000
      # Genomic Info
      - name: Genomic Info
        # library_strategies 
        # library_source_materials
        # library_source_molecules
        # library_layouts
        # library_selections
        # platforms
        # instrument_models
        # reference_genome_assemblies
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-[:of_study]->(s:study)
          WITH DISTINCT s, COLLECT(DISTINCT f) AS fs, "Not specified in data" AS nsd, "Not Applicable" AS na,
            split(replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', ''), ", ") AS study_data_types
          WITH s, fs, nsd, na,
            CASE WHEN study_data_types IS NULL OR size(study_data_types)=0 THEN [nsd] ELSE study_data_types END AS study_data_types
          UNWIND study_data_types AS study_data_type
          UNWIND fs AS f
          OPTIONAL MATCH (f)<-[:of_file]-(g:genomic_info)
          WITH f, study_data_type, nsd, na,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_strategy, nsd) END) AS library_strategies,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_source_material, nsd) END) AS library_source_materials,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_source_molecule, nsd) END) AS library_source_molecules,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_layout, nsd) END) AS library_layouts,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_selection, nsd) END) AS library_selections,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.platform, nsd) END) AS platforms,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.instrument_model, nsd) END) AS instrument_models,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.reference_genome_assembly, nsd) END) AS reference_genome_assemblies
          WITH f, study_data_type, nsd, na,
            CASE WHEN size(library_strategies) = 0 THEN [na] ELSE library_strategies END AS library_strategies,
            CASE WHEN size(library_source_materials) = 0 THEN [na] ELSE library_source_materials END AS library_source_materials,
            CASE WHEN size(library_source_molecules) = 0 THEN [na] ELSE library_source_molecules END AS library_source_molecules,
            CASE WHEN size(library_layouts) = 0 THEN [na] ELSE library_layouts END AS library_layouts,
            CASE WHEN size(library_selections) = 0 THEN [na] ELSE library_selections END AS library_selections,
            CASE WHEN size(platforms) = 0 THEN [na] ELSE platforms END AS platforms,
            CASE WHEN size(instrument_models) = 0 THEN [na] ELSE instrument_models END AS instrument_models,
            CASE WHEN size(reference_genome_assemblies) = 0 THEN [na] ELSE reference_genome_assemblies END AS reference_genome_assemblies
          RETURN DISTINCT
            f.file_id + "_" + COALESCE(study_data_type, nsd) AS file_id_study_data_type,
            library_strategies,
            library_source_materials,
            library_source_molecules,
            library_layouts,
            library_selections,
            platforms,
            instrument_models,
            reference_genome_assemblies
        page_size: 5000
      # Imaging
      - name: Imaging
        # image_modality
        # organ_or_tissue
        # tissue_fixative
        # imaging_assay_type
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-[:of_study]->(s:study)
          WITH DISTINCT s, COLLECT(DISTINCT f) AS fs, "Not specified in data" AS nsd, "Not Applicable" AS na,
            split(replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', ''), ", ") AS study_data_types
          WITH s, fs, nsd, na,
            CASE WHEN study_data_types IS NULL OR size(study_data_types)=0 THEN [nsd] ELSE study_data_types END AS study_data_types
          UNWIND study_data_types AS study_data_type
          UNWIND fs AS f
          OPTIONAL MATCH (f)<-[:of_file]-(i:image)
          OPTIONAL MATCH (i)<-[:of_image]-(mm:MultiplexMicroscopy)
          WITH DISTINCT f, study_data_type, nsd, na,
            COLLECT(DISTINCT CASE WHEN i IS NULL THEN null ELSE COALESCE(i.organ_or_tissue, nsd) END) AS organ_or_tissue,
            COLLECT(DISTINCT CASE WHEN i IS NULL THEN null ELSE COALESCE(i.image_modality, nsd) END) AS image_modality,
            COLLECT(DISTINCT CASE WHEN mm IS NULL THEN null ELSE COALESCE(mm.imaging_assay_type, nsd) END) AS imaging_assay_type,
            COLLECT(DISTINCT CASE WHEN mm IS NULL THEN null ELSE COALESCE(mm.tissue_fixative, nsd) END) AS tissue_fixative
          WITH f, study_data_type, nsd, na,
            CASE WHEN size(organ_or_tissue) = 0 THEN [na] ELSE organ_or_tissue END AS organ_or_tissue,
            CASE WHEN size(image_modality) = 0 THEN [na] ELSE image_modality END AS image_modality,
            CASE WHEN size(imaging_assay_type) = 0 THEN [na] ELSE imaging_assay_type END AS imaging_assay_type,
            CASE WHEN size(tissue_fixative) = 0 THEN [na] ELSE tissue_fixative END AS tissue_fixative
          RETURN DISTINCT 
            f.file_id + "_" + COALESCE(study_data_type, nsd) AS file_id_study_data_type,
            organ_or_tissue,
            image_modality,
            imaging_assay_type,
            tissue_fixative 
        page_size: 5000
      # Proteomic
      - name: Proteomic
        # analytical_fractions
        # instrument_makes
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-[:of_study]->(s:study)
          WITH DISTINCT s, COLLECT(DISTINCT f) AS fs, "Not specified in data" AS nsd, "Not Applicable" AS na,
            split(replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', ''), ", ") AS study_data_types
          WITH s, fs, nsd, na,
            CASE WHEN study_data_types IS NULL OR size(study_data_types)=0 THEN [nsd] ELSE study_data_types END AS study_data_types
          UNWIND study_data_types AS study_data_type
          UNWIND fs AS f
          OPTIONAL MATCH (f)<-[:of_file]-(pr:proteomic)
          WITH f, study_data_type, nsd, na,
            COLLECT(DISTINCT CASE WHEN pr IS NULL THEN null ELSE COALESCE(pr.analytical_fractions, nsd) END) AS analytical_fractions,
            COLLECT(DISTINCT CASE WHEN pr IS NULL THEN null ELSE COALESCE(pr.instrument_make, nsd) END) AS instrument_makes
          WITH f, study_data_type, nsd, na,
            CASE WHEN size(analytical_fractions) = 0 THEN [na] ELSE analytical_fractions END AS analytical_fractions,
            CASE WHEN size(instrument_makes) = 0 THEN [na] ELSE instrument_makes END AS instrument_makes
          RETURN DISTINCT 
            f.file_id + "_" + COALESCE(study_data_type, nsd) AS file_id_study_data_type,
            analytical_fractions,
            instrument_makes
        page_size: 5000
      # caNanoLab Protocol
      - name: "caNanoLab Protocol"
        # protocol_names
        # protocol_types
        # doi_urls
        # dois
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-[:of_study]->(s:study)
          WITH DISTINCT s, COLLECT(DISTINCT f) AS fs, "Not specified in data" AS nsd, "Not Applicable" AS na,
            split(replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', ''), ", ") AS study_data_types
          WITH s, fs, nsd, na,
            CASE WHEN study_data_types IS NULL OR size(study_data_types)=0 THEN [nsd] ELSE study_data_types END AS study_data_types
          UNWIND study_data_types AS study_data_type
          UNWIND fs AS f
          OPTIONAL MATCH (f)<-[*]-(proto:Protocol)
          WITH f, study_data_type, nsd, na,
            COLLECT(DISTINCT CASE WHEN proto IS NULL THEN null ELSE COALESCE(proto.protocol_name, nsd) END) AS protocol_names_raw,
            COLLECT(DISTINCT CASE WHEN proto IS NULL THEN null ELSE COALESCE(proto.protocol_type, nsd) END) AS protocol_types_raw,
            COLLECT(DISTINCT CASE WHEN proto IS NULL THEN null ELSE COALESCE(proto.doi_url, nsd) END) AS doi_urls_raw,
            COLLECT(DISTINCT CASE WHEN proto IS NULL THEN null ELSE COALESCE(proto.doi, nsd) END) AS dois_raw
          RETURN DISTINCT
            f.file_id + "_" + COALESCE(study_data_type, nsd) AS file_id_study_data_type,
            CASE WHEN size(protocol_names_raw)=0 THEN [na] ELSE protocol_names_raw END AS protocol_names,
            CASE WHEN size(protocol_types_raw)=0 THEN [na] ELSE protocol_types_raw END AS protocol_types,
            CASE WHEN size(doi_urls_raw)=0 THEN [na] ELSE doi_urls_raw END AS doi_urls,
            CASE WHEN size(dois_raw)=0 THEN [na] ELSE dois_raw END AS dois
        page_size: 5000
      # caNanoLab Publication
      - name: "caNanoLab Publication"
        # publication_titles
        # publication_statuses
        # pub_ids
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-[:of_study]->(s:study)
          WITH DISTINCT s, COLLECT(DISTINCT f) AS fs, "Not specified in data" AS nsd, "Not Applicable" AS na,
            split(replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', ''), ", ") AS study_data_types
          WITH s, fs, nsd, na,
            CASE WHEN study_data_types IS NULL OR size(study_data_types)=0 THEN [nsd] ELSE study_data_types END AS study_data_types
          UNWIND study_data_types AS study_data_type
          UNWIND fs AS f
          OPTIONAL MATCH (f)-->(samp:sample)<-[*]-(pub:Publication)
          WITH f, study_data_type, nsd, na,
            COLLECT(DISTINCT CASE WHEN pub IS NULL THEN null ELSE COALESCE(pub.Publication_Title, nsd) END) AS publication_titles_raw,
            COLLECT(DISTINCT CASE WHEN pub IS NULL THEN null ELSE COALESCE(pub.Publication_Status, nsd) END) AS publication_statuses_raw,
            COLLECT(DISTINCT CASE WHEN pub IS NULL THEN null ELSE COALESCE(pub.DOI_or_Pub_ID, nsd) END) AS pub_ids_raw
          RETURN DISTINCT
            f.file_id + "_" + COALESCE(study_data_type, nsd) AS file_id_study_data_type,
            CASE WHEN size(publication_titles_raw)=0 THEN [na] ELSE publication_titles_raw END AS publication_titles,
            CASE WHEN size(publication_statuses_raw)=0 THEN [na] ELSE publication_statuses_raw END AS publication_statuses,
            CASE WHEN size(pub_ids_raw)=0 THEN [na] ELSE pub_ids_raw END AS pub_ids
        page_size: 5000
      # caNanoLab Composition
      - name: "caNanoLab Composition"
        # nanomaterial_entities
        # functionalizing_entities
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-[:of_study]->(s:study)
          WITH DISTINCT s, COLLECT(DISTINCT f) AS fs, "Not specified in data" AS nsd, "Not Applicable" AS na,
            split(replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', ''), ", ") AS study_data_types
          WITH s, fs, nsd, na,
            CASE WHEN study_data_types IS NULL OR size(study_data_types)=0 THEN [nsd] ELSE study_data_types END AS study_data_types
          UNWIND study_data_types AS study_data_type
          UNWIND fs AS f
          OPTIONAL MATCH (f)-->(samp:sample)<-[*]-(comp:Composition)
          WITH f, study_data_type, nsd, na,
            COLLECT(DISTINCT CASE WHEN comp IS NULL OR comp.Nanomaterial_Entity_Type = "[]" THEN null ELSE COALESCE(replace(replace(replace(comp.Nanomaterial_Entity_Type, '[', ''), ']', ''), '"', ''), nsd) END) AS nanomaterial_entities_raw,
            COLLECT(DISTINCT CASE WHEN comp IS NULL OR comp.Functionalizing_Entity_Type = "[]" THEN null ELSE COALESCE(replace(replace(replace(comp.Functionalizing_Entity_Type, '[', ''), ']', ''), '"', ''), nsd) END) AS functionalizing_entities_raw
          RETURN DISTINCT
            f.file_id + "_" + COALESCE(study_data_type, nsd) AS file_id_study_data_type,
            CASE WHEN size(nanomaterial_entities_raw)=0 THEN [na] ELSE nanomaterial_entities_raw END AS nanomaterial_entities,
            CASE WHEN size(functionalizing_entities_raw)=0 THEN [na] ELSE functionalizing_entities_raw END AS functionalizing_entities
        page_size: 5000
      # caNanoLab Characterization
      - name: "caNanoLab Characterization"
        # characterization_types
        # characterization_names
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-[:of_study]->(s:study)
          WITH DISTINCT s, COLLECT(DISTINCT f) AS fs, "Not specified in data" AS nsd, "Not Applicable" AS na,
            split(replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', ''), ", ") AS study_data_types
          WITH s, fs, nsd, na,
            CASE WHEN study_data_types IS NULL OR size(study_data_types)=0 THEN [nsd] ELSE study_data_types END AS study_data_types
          UNWIND study_data_types AS study_data_type
          UNWIND fs AS f
          OPTIONAL MATCH (f)-->(samp:sample)<-[*]-(char:Characterization)
          WITH f, study_data_type, nsd, na,
            COLLECT(DISTINCT CASE WHEN char IS NULL OR char.Characterization_Type = "[]" THEN null ELSE COALESCE(replace(replace(replace(char.Characterization_Type, '[', ''), ']', ''), '"', ''), nsd) END) AS characterization_types_raw,
            COLLECT(DISTINCT CASE WHEN char IS NULL OR char.Characterization_Name = "[]" THEN null ELSE COALESCE(replace(replace(replace(char.Characterization_Name, '[', ''), ']', ''), '"', ''), nsd) END) AS characterization_names_raw
          RETURN DISTINCT
            f.file_id + "_" + COALESCE(study_data_type, nsd) AS file_id_study_data_type,
            CASE WHEN size(characterization_types_raw)=0 THEN [na] ELSE characterization_types_raw END AS characterization_types,
            CASE WHEN size(characterization_names_raw)=0 THEN [na] ELSE characterization_names_raw END AS characterization_names
        page_size: 5000
  - index_name: "dashboard_participant_ids"
    id_field: "study_participant_id"
    mapping:
      keyword:
        - study_participant_id
        - participant_id
        - phs_accession
      long:
        - number_of_study_participants # calculated - single value
        - number_of_study_samples # calculated - single value
    initial_query:
      # subject_id (participant_id)
      # phs_accession
      query: |
        MATCH (p:participant)
        OPTIONAL MATCH (p)-[:of_participant]->(s:study)
        WITH DISTINCT p, s, "Not specified in data" AS nsd, "Not Applicable" AS na
        ORDER BY p.participant_id
        RETURN DISTINCT
          COALESCE(p.study_participant_id, nsd) as study_participant_id,
          COALESCE(p.participant_id, nsd) as participant_id,
          CASE WHEN s IS NULL THEN na ELSE COALESCE(s.phs_accession, nsd) END as phs_accession
        SKIP $skip LIMIT $limit
      page_size: 5000
    update_queries:
      # Studies
      - name: Studies
        # study_participant_id
        # participant_id
        # phs_accession
        # number_of_study_participants
        # number_of_study_samples
        query: |
          MATCH (s:study)
          WITH s 
          SKIP $skip LIMIT $limit
          WITH s
          OPTIONAL MATCH (s)<-[*]-(p:participant)
          WITH s, COUNT(DISTINCT p) AS number_of_study_participants
          OPTIONAL MATCH (s)<-[*]-(samp:sample)
          WITH s, number_of_study_participants, count(distinct samp) AS number_of_study_samples
          MATCH (s)<-[*]-(p:participant)
          WITH DISTINCT p, s, number_of_study_participants, number_of_study_samples, "Not specified in data" AS nsd
          RETURN DISTINCT
            COALESCE(p.study_participant_id, nsd) as study_participant_id,
            COALESCE(p.participant_id, nsd) as participant_id,
            COALESCE(s.phs_accession, nsd) as phs_accession,
            number_of_study_participants,
            number_of_study_samples
        page_size: 1
  - index_name: "gs_study"
    id_field: "phs_accession"
    mapping:
      keyword:
        - phs_accession
      search_as_you_type:
        - phs_accession_gs
        - study_name_gs
        - study_code_gs
        - study_data_types_gs
    initial_query:
      # phs_accession
      # phs_accession_gs
      # study_name_gs
      # study_code_gs
      # study_data_types_gs
      query: |
        MATCH (s:study)
        WITH DISTINCT s, "Not specified in data" AS nsd
        ORDER BY s.phs_accession
        RETURN DISTINCT
          COALESCE(s.phs_accession, nsd) as phs_accession,
          s.phs_accession as phs_accession_gs,
          s.study_name as study_name_gs,
          s.study_name as study_code_gs,
          CASE WHEN s.study_data_types IS NULL OR s.study_data_types = '[]' 
            THEN nsd 
            ELSE replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', '') 
          END as study_data_types_gs
        SKIP $skip LIMIT $limit
      page_size: 5000
  - index_name: "gs_participant"
    id_field: "study_participant_id"
    mapping:
      keyword:
        - study_participant_id
        - subject_ids_filter
      search_as_you_type:
        - study_gs
        - subject_id_gs
        - site_gs
        - sex_gs
    initial_query:
      # study_participant_id
      # subject_id_gs
      # subject_ids_filter
      query: |
        MATCH (p:participant)
        WITH DISTINCT p, "Not specified in data" AS nsd
        ORDER BY p.study_participant_id
        RETURN DISTINCT
          p.study_participant_id as study_participant_id,
          COALESCE(p.participant_id, nsd) as subject_id_gs,
          [COALESCE(p.participant_id, nsd)] as subject_ids_filter
        SKIP $skip LIMIT $limit
      page_size: 5000
    update_queries:
      # Study
      - name: "Study"
        # study_gs
        query: |
          MATCH (p:participant)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (p)<-[:of_participant]-(:file)-[:of_study]-(s:study)
          WITH p.study_participant_id AS study_participant_id, COLLECT(DISTINCT s.study_name) AS study_names, "Not Applicable" AS na
          CALL {
            WITH study_names
            UNWIND study_names AS study_name
            WITH study_name
            ORDER BY study_name
            RETURN COLLECT(study_name) AS sorted_studies
          }
          WITH study_participant_id, CASE WHEN size(sorted_studies) = 0 THEN [na] ELSE sorted_studies END AS study_gs
          RETURN DISTINCT
            study_participant_id,
            study_gs
        page_size: 5000
      # Site
      - name: "Site"
        # site_gs
        query: |
          MATCH (p:participant)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (p)<-[*]-(d:diagnosis)
          WITH p.study_participant_id AS study_participant_id, COLLECT(DISTINCT d.primary_site) AS sites, "Not Applicable" AS na
          WITH study_participant_id, CASE WHEN size(sites) = 0 THEN [na] ELSE sites END AS site_gs
          RETURN DISTINCT
            study_participant_id,
            site_gs
        page_size: 5000
      # Sex
      - name: "Sex"
        # sex_gs
        query: |
          MATCH (p:participant)
          WITH DISTINCT p, "Not specified in data" AS nsd
          SKIP $skip LIMIT $limit
          WITH p.study_participant_id AS study_participant_id, COALESCE(p.sex, nsd) AS sex_gs
          RETURN DISTINCT
            study_participant_id,
            sex_gs
        page_size: 5000
  - index_name: "gs_sample"
    id_field: "sample_id"
    mapping:
      keyword:
        - sample_id
        - subject_ids_filter
      search_as_you_type:
        - sample_id_gs
        - is_tumor_gs
        - analyte_type_gs
    initial_query:
      # sample_id
      # sample_id_gs
      # is_tumor_gs
      # analyte_type_gs
      query: |
        MATCH (samp:sample)
        WITH DISTINCT samp, "Not specified in data" AS nsd
        ORDER BY samp.sample_id
        RETURN DISTINCT
          samp.sample_id as sample_id,
          samp.sample_id as sample_id_gs,
          COALESCE(samp.sample_tumor_status, nsd) as is_tumor_gs,
          COALESCE(samp.sample_type, nsd) as analyte_type_gs
        SKIP $skip LIMIT $limit
      page_size: 5000
    update_queries:
      # Subject IDs Filter
      - name: "Subject IDs Filter"
        # subject_ids_filter
        query: |
          MATCH (samp:sample)
          WITH DISTINCT samp
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (samp)-[:of_participant]->(p:participant)
          WITH samp.sample_id AS sample_id, 
            COLLECT(DISTINCT p.participant_id) AS participant_ids,
            "Not Applicable" AS na
          RETURN DISTINCT
            sample_id,
            CASE WHEN size(participant_ids) = 0 THEN [na] ELSE participant_ids END AS subject_ids_filter
        page_size: 5000
  - index_name: "gs_file"
    id_field: "file_id"
    mapping:
      keyword:
        - file_id
        - subject_ids_filter
      search_as_you_type:
        - subject_id_gs
        - sample_id_gs
        - file_id_gs
        - file_name_gs
        - file_type_gs
        - accesses_gs
        - acl_gs
        - experimental_strategies_gs
        - instrument_models_gs
        - library_layouts_gs
        - library_selections_gs
        - library_source_materials_gs
        - library_source_molecules_gs
        - library_strategies_gs
        - platforms_gs
        - reference_genome_assemblies_gs
        - sites_gs
        - is_supplementary_file_gs
    initial_query:
      # file_id
      # file_id_gs
      # file_name_gs
      # file_type_gs
      # is_supplementary_file_gs
      query: |
        MATCH (f:file)
        WITH DISTINCT f, "Not specified in data" AS nsd
        ORDER BY f.file_id
        RETURN DISTINCT
          f.file_id as file_id,
          f.file_id as file_id_gs,
          COALESCE(f.file_name, nsd) as file_name_gs,
          COALESCE(f.file_type, nsd) as file_type_gs,
          COALESCE(toString(f.is_supplementary_file), nsd) as is_supplementary_file_gs
        SKIP $skip LIMIT $limit
      page_size: 5000
    update_queries:
      # Participants
      - name: "Participants"
        # TODO: Future requirements clarification needed - determine if subject_id should be [String] array, comma-delimited string, or single value
        # Currently returns first participant_id only
        # subject_id_gs
        # subject_ids_filter
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-[:of_participant]->(p:participant)
          WITH f.file_id AS file_id, COLLECT(DISTINCT p.participant_id) AS participant_ids, "Not Applicable" AS na
          WITH file_id, na, CASE WHEN size(participant_ids) = 0 THEN [] ELSE participant_ids END AS participant_ids
          RETURN DISTINCT
            file_id,
            participant_ids[0] as subject_id_gs,
            CASE WHEN size(participant_ids) = 0 THEN [na] ELSE participant_ids END AS subject_ids_filter
        page_size: 5000
      # Samples
      - name: "Samples"
        # TODO: Future requirements clarification needed - determine if sample_id should be [String] array, comma-delimited string, or single value
        # Currently returns first sample_id only
        # sample_id_gs
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-[:of_participant]->(p:participant)
          WITH DISTINCT f, p
          OPTIONAL MATCH (p)<-[:of_participant]-(samp:sample)
          WITH f.file_id AS file_id, COLLECT(DISTINCT samp.sample_id) AS sample_ids
          WITH file_id, CASE WHEN size(sample_ids) = 0 THEN [] ELSE sample_ids END AS sample_ids
          RETURN DISTINCT
            file_id,
            sample_ids[0] as sample_id_gs
        page_size: 5000
      # Study Info
      - name: "Study Info"
        # accesses_gs
        # acl_gs
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-[:of_study]->(s:study)
          WITH f.file_id AS file_id, s, "Not specified in data" AS nsd, "Not Applicable" AS na
          WITH file_id, nsd, na,
            COLLECT(DISTINCT CASE WHEN s IS NULL THEN null ELSE COALESCE(s.study_access, nsd) END) AS accesses,
            CASE WHEN s.acl = '[]' THEN nsd ELSE replace(replace(replace(s.acl, '[', ''), ']', ''), '"', '') END AS acl
          RETURN DISTINCT
            file_id,
            CASE WHEN size(accesses) = 0 THEN [na] ELSE accesses END AS accesses_gs,
            CASE WHEN acl IS NULL THEN na ELSE COALESCE(acl, nsd) END AS acl_gs
        page_size: 5000
      # Experimental Strategies
      - name: "Experimental Strategies"
        # experimental_strategies_gs
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          WITH f, "Not specified in data" AS nsd,
            split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") AS experimental_strategies
          RETURN DISTINCT
            f.file_id AS file_id,
            CASE WHEN experimental_strategies IS NULL OR size(experimental_strategies)=0 THEN [nsd] ELSE experimental_strategies END AS experimental_strategies_gs
        page_size: 5000
      # Genomic Info GS
      - name: "Genomic Info GS"
        # library_strategies_gs
        # library_source_materials_gs
        # library_source_molecules_gs
        # library_layouts_gs
        # library_selections_gs
        # platforms_gs
        # instrument_models_gs
        # reference_genome_assemblies_gs
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)<-[:of_file]-(g:genomic_info)
          WITH f.file_id AS file_id, g, "Not specified in data" AS nsd, "Not Applicable" AS na
          WITH file_id, nsd, na,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_strategy, nsd) END) AS library_strategies,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_source_material, nsd) END) AS library_source_materials,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_source_molecule, nsd) END) AS library_source_molecules,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_layout, nsd) END) AS library_layouts,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_selection, nsd) END) AS library_selections,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.platform, nsd) END) AS platforms,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.instrument_model, nsd) END) AS instrument_models,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.reference_genome_assembly, nsd) END) AS reference_genome_assemblies
          RETURN DISTINCT
            file_id,
            CASE WHEN size(library_strategies) = 0 THEN [na] ELSE library_strategies END AS library_strategies_gs,
            CASE WHEN size(library_source_materials) = 0 THEN [na] ELSE library_source_materials END AS library_source_materials_gs,
            CASE WHEN size(library_source_molecules) = 0 THEN [na] ELSE library_source_molecules END AS library_source_molecules_gs,
            CASE WHEN size(library_layouts) = 0 THEN [na] ELSE library_layouts END AS library_layouts_gs,
            CASE WHEN size(library_selections) = 0 THEN [na] ELSE library_selections END AS library_selections_gs,
            CASE WHEN size(platforms) = 0 THEN [na] ELSE platforms END AS platforms_gs,
            CASE WHEN size(instrument_models) = 0 THEN [na] ELSE instrument_models END AS instrument_models_gs,
            CASE WHEN size(reference_genome_assemblies) = 0 THEN [na] ELSE reference_genome_assemblies END AS reference_genome_assemblies_gs
        page_size: 5000
      # Sites GS
      - name: "Sites GS"
        # sites_gs
        query: |
          MATCH (f:file)
          WITH DISTINCT f, "Not specified in data" AS nsd, "Not Applicable" AS na
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-->(p:participant)<--(diag:diagnosis)
          WITH f.file_id AS file_id, nsd, na,
            COLLECT(DISTINCT CASE WHEN diag IS NULL THEN null ELSE COALESCE(diag.primary_site, nsd) END) AS sites
          RETURN DISTINCT
            file_id,
            CASE WHEN size(sites) = 0 THEN [na] ELSE sites END AS sites_gs
        page_size: 5000
  - index_name: "gs_program"
    id_field: "program_name"
    mapping:
      keyword:
        - program_name
      search_as_you_type:
        - program_name_gs
        - program_short_description_gs
        - program_full_description_gs
