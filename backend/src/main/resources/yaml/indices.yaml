          WITH file_id, na, CASE WHEN size(primary_diagnoses)=0 THEN [NULL] ELSE primary_diagnoses END AS primary_diagnoses
          UNWIND primary_diagnoses AS primary_diagnosis
          WITH DISTINCT
            file_id, na,
            COLLECT(DISTINCT primary_diagnosis) AS diagnosis_primary_diagnosis_filter
          RETURN DISTINCT
            file_id,
            CASE WHEN SIZE(diagnosis_primary_diagnosis_filter) = 0 THEN [na] ELSE diagnosis_primary_diagnosis_filter END AS diagnosis_primary_diagnosis_filter
        page_size: 10000
