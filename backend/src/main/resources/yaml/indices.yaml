          WITH f, na,
            CASE WHEN size(experimental_strategies)=0 THEN [na] ELSE experimental_strategies END AS experimental_strategies
          UNWIND experimental_strategies AS experimental_strategy
          OPTIONAL MATCH (f)-[:of_participant]->(p:participant)
          WITH f, experimental_strategy, p, na
          WITH f, experimental_strategy, na,
            COLLECT(DISTINCT COALESCE(p.sex, na)) AS sex,
            COLLECT(DISTINCT COALESCE(p.participant_id, na)) AS participant_ids
          WITH f, experimental_strategy, na, sex, participant_ids
          WITH f, experimental_strategy, na,
            CASE WHEN size(sex) = 0 THEN [na] ELSE sex END AS sex,
            CASE WHEN size(participant_ids) = 0 THEN [na] ELSE participant_ids END AS subject_ids
          RETURN 
            f.file_id + "_" + COALESCE(experimental_strategy, na) AS file_id_experimental_strategy,
            sex,
            subject_ids
