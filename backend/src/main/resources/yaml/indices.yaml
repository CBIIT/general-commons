        - program_sort_order_gs
        - type_gs
    initial_query:
      # program_name
      # program_name_gs
      # program_short_description_gs
      # program_full_description_gs
      # program_external_url_gs
      # program_sort_order_gs
      # type_gs
      query: |
        MATCH (p:program)
        WITH DISTINCT p, "Not specified in data" AS nsd
        ORDER BY p.program_sort_order
        RETURN DISTINCT
          p.program_name as program_name,
          p.program_name as program_name_gs,
          COALESCE(p.program_short_description, nsd) as program_short_description_gs,
          COALESCE(p.program_full_description, nsd) as program_full_description_gs,
          COALESCE(p.program_external_url, nsd) as program_external_url_gs,
          COALESCE(toString(p.program_sort_order), nsd) as program_sort_order_gs,
          'program' as type_gs
        SKIP $skip LIMIT $limit
      page_size: 5000
  - index_name: "program"
    id_field: "program_name"
    mapping:
      keyword:
        - program
        - program_name
        - program_acronym
        - program_short_description
        - program_full_description
        - program_external_url
        - program_url
        - program_sort_order
        - acronym
        - name
        - website
        - study_participants.group
        - studies.accession
        - studies.study_access
        - studies.study_version
        - studies.study_data_types
        - studies.study_name
        - studies.study_description
        - studies.short_description
      long:
        - num_studies
        - num_participants
        - num_files
        - num_samples
        - num_disease_sites
        - study_participants.subjects
        - studies.num_participants
        - studies.num_samples
        - studies.num_files
    initial_query:
      # program
      # program_name
      # program_acronym
      # program_short_description
      # program_full_description
      # program_external_url
      # program_url
      # program_sort_order
      query: |
        MATCH (p:program)
        WITH DISTINCT p, "Not specified in data" AS nsd
        SKIP $skip LIMIT $limit
        WITH 
          p.program_name AS program_name,
          COALESCE(p.program_acronym, nsd) AS program_acronym,
          COALESCE(p.program_short_description, nsd) AS program_short_description,
          COALESCE(p.program_full_description, nsd) AS program_full_description,
          COALESCE(p.program_external_url, nsd) AS program_external_url
        RETURN DISTINCT
          program_name,
          program_acronym,
          program_acronym AS program,
          program_acronym AS acronym,
          program_name AS name,
          program_short_description,
          program_full_description,
          program_external_url AS program_url,
          program_external_url AS website,
          program_name AS program_sort_order
      page_size: 5000
    update_queries:
      # Program Statistics
      - name: "Program Statistics"
        # num_studies
        # num_participants
        # num_files
        # num_samples
        # num_disease_sites
        query: |
          MATCH (pr:program)
          WITH DISTINCT pr
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (pr)<-[*]-(s:study)
          WITH pr, COUNT(DISTINCT s) AS num_studies
          OPTIONAL MATCH (pr)<-[*]-(p:participant)
          WITH pr, num_studies, COUNT(DISTINCT p) AS num_participants 
          OPTIONAL MATCH (pr)<-[*]-(samp:sample)
          WITH pr, num_studies, num_participants, COUNT(DISTINCT samp) AS num_samples
          OPTIONAL MATCH (pr)<-[*]-(f:file)
          WITH pr, num_studies, num_participants, num_samples, COUNT(DISTINCT f) AS num_files
          OPTIONAL MATCH (pr)<-[*]-(diag:diagnosis)
          WITH pr, num_studies, num_participants, num_samples, num_files, COUNT(DISTINCT diag.primary_site) AS num_disease_sites
          RETURN 
            pr.program_name AS program_name,
            pr.program_acronym AS acronym,
            pr.program_name AS name,
            pr.program_external_url AS website,
            num_studies, 
            num_participants, 
            num_samples, 
            num_files,
            num_disease_sites
        page_size: 1
      # Study Participants
      - name: "Study Participants"
        # study_participants
        query: |
          MATCH (pr:program)
          WITH DISTINCT pr
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (pr:program)<-[:of_program]-(s:study)
          WITH pr, s
          OPTIONAL MATCH (s)<-[:of_study]-(p:participant)
          WITH pr, s, COUNT(DISTINCT p) AS num_participants
          WITH pr, COLLECT(DISTINCT {
            group: s.study_name,
            subjects: num_participants
          }) AS study_participants
          RETURN DISTINCT
            pr.program_name AS program_name,
            study_participants
        page_size: 5000
      # Studies
      - name: "Studies"
        # studies
        query: |
          MATCH (pr:program)
          WITH DISTINCT pr
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (pr:program)<-[:of_program]-(s:study)
          CALL {
            WITH s
            OPTIONAL MATCH (s)<-[*]-(p:participant)
            WITH s, COUNT(DISTINCT p) AS num_participants
            OPTIONAL MATCH (s)<-[*]-(samp:sample)
            WITH s, num_participants, COUNT(DISTINCT samp) AS num_samples
            OPTIONAL MATCH (s)<-[*]-(f:file)
            RETURN num_participants, num_samples, COUNT(DISTINCT f) AS num_files
          }
          WITH DISTINCT pr, s, num_participants, num_samples, num_files, 'Not specified in data' AS nsd
          WITH 
            pr, s, num_participants, num_samples, num_files,
            CASE WHEN s.study_version IS NULL OR s.study_version = '[]' THEN nsd ELSE replace(replace(replace(s.study_version, '[', ''), ']', ''), '"', '') END AS study_version,
            CASE WHEN s.study_data_types IS NULL OR s.study_data_types = '[]' THEN nsd ELSE replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', '') END AS study_data_types
          RETURN 
            pr.program_name AS program_name,
            COLLECT({
              accession: s.phs_accession,
              study_access: s.study_access,
              study_version: study_version,
              study_data_types: study_data_types,
              study_name: s.study_name,
              study_description: s.study_description,
              short_description: s.short_description,
              num_participants: num_participants,
              num_samples: num_samples, num_files: num_files
            }) AS studies
        page_size: 1
  - index_name: "study"
    id_field: "phs_accession"
    mapping:
      keyword:
        - study_name
        - study_code
        - study_acronym
        - study_description
        - short_description
        - study_external_url
        - primary_investigator_name
        - primary_investigator_email
        - co_investigator_name
        - co_investigator_email
        - phs_accession
        - bioproject_accession
        - index_date
        - cds_requestor
        - funding_agency
        - funding_source_program_name
        - grant_id
        - clinical_trial_system
        - clinical_trial_identifier
        - clinical_trial_arm
        - organism_species
        - adult_or_childhood_study
        - data_types
        - data_type
        - file_types
        - data_access_level
        - cds_primary_bucket
        - cds_secondary_bucket
        - cds_tertiary_bucket
        - study_data_types
        - file_types_and_format
        - size_of_data_being_uploaded
        - size_of_data_being_uploaded_unit
        - size_of_data_being_uploaded_original
        - size_of_data_being_uploaded_original_unit
        - acl
        - study_access
        - study_version
      long:
        - number_of_participants
        - numberOfSubjects
        - number_of_samples
        - numberOfSamples
        - number_of_files
        - numberOfFiles
        - number_of_disease_sites
        - numberOfDiseaseSites
    initial_query:
      # study_name
      # study_code
      # study_acronym
      # study_description
      # short_description
      # study_external_url
      # primary_investigator_name
      # primary_investigator_email
      # co_investigator_name
      # co_investigator_email
      # phs_accession
      # bioproject_accession
      # index_date
      # cds_requestor
      # funding_agency
      # funding_source_program_name
      # grant_id
      # clinical_trial_system
      # clinical_trial_identifier
      # clinical_trial_arm
      # organism_species
      # adult_or_childhood_study
      # data_types
      # data_type
      # file_types
      # data_access_level
      # cds_primary_bucket
      # cds_secondary_bucket
      # cds_tertiary_bucket
      # study_data_types
      # file_types_and_format
      # size_of_data_being_uploaded
      # size_of_data_being_uploaded_unit
      # size_of_data_being_uploaded_original
      # size_of_data_being_uploaded_original_unit
      # acl
      # study_access
      # study_version
      query: |
        MATCH (s:study)<--(:file)
        WITH DISTINCT s, "Not specified in data" AS nsd
        SKIP $skip LIMIT $limit
        WITH s, nsd, CASE WHEN s.study_data_types IS NULL OR s.study_data_types = '[]' THEN nsd ELSE replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', '') END AS study_data_types
        RETURN DISTINCT
          s.study_name AS study_name,
          s.study_name AS study_code,
          COALESCE(s.study_acronym, nsd) AS study_acronym,
          COALESCE(s.study_description, nsd) AS study_description,
          COALESCE(s.short_description, nsd) AS short_description,
          COALESCE(s.study_external_url, nsd) AS study_external_url,
          COALESCE(s.primary_investigator_name, nsd) AS primary_investigator_name,
          COALESCE(s.primary_investigator_email, nsd) AS primary_investigator_email,
          COALESCE(s.co_investigator_name, nsd) AS co_investigator_name,
          COALESCE(s.co_investigator_email, nsd) AS co_investigator_email,
          s.phs_accession AS phs_accession,
          COALESCE(s.bioproject_accession, nsd) AS bioproject_accession,
          COALESCE(s.index_date, nsd) AS index_date,
          COALESCE(s.cds_requestor, nsd) AS cds_requestor,
          COALESCE(s.funding_agency, nsd) AS funding_agency,
          COALESCE(s.funding_source_program_name, nsd) AS funding_source_program_name,
          COALESCE(s.grant_id, nsd) AS grant_id,
          COALESCE(s.clinical_trial_system, nsd) AS clinical_trial_system,
          COALESCE(s.clinical_trial_identifier, nsd) AS clinical_trial_identifier,
          COALESCE(s.clinical_trial_arm, nsd) AS clinical_trial_arm,
          COALESCE(s.organism_species, nsd) AS organism_species,
          COALESCE(s.adult_or_childhood_study, nsd) AS adult_or_childhood_study,
          study_data_types AS data_types,
          study_data_types AS data_type,
          COALESCE(s.file_types, nsd) AS file_types,
          COALESCE(s.data_access_level, nsd) AS data_access_level,
          COALESCE(s.cds_primary_bucket, nsd) AS cds_primary_bucket,
          COALESCE(s.cds_secondary_bucket, nsd) AS cds_secondary_bucket,
          COALESCE(s.cds_tertiary_bucket, nsd) AS cds_tertiary_bucket,
          study_data_types AS study_data_types,
          CASE WHEN s.file_types_and_format IS NULL OR s.file_types_and_format = '[]' THEN nsd ELSE replace(replace(replace(s.file_types_and_format, '[', ''), ']', ''), '"', '') END AS file_types_and_format,
          COALESCE(s.size_of_data_being_uploaded, nsd) AS size_of_data_being_uploaded,
          COALESCE(s.size_of_data_being_uploaded_unit, nsd) AS size_of_data_being_uploaded_unit,
          COALESCE(s.size_of_data_being_uploaded_original, nsd) AS size_of_data_being_uploaded_original,
          COALESCE(s.size_of_data_being_uploaded_original_unit, nsd) AS size_of_data_being_uploaded_original_unit,
          CASE WHEN s.acl IS NULL OR s.acl = '[]' THEN nsd ELSE replace(replace(replace(s.acl, '[', ''), ']', ''), '"', '') END AS acl,
          COALESCE(s.study_access, nsd) AS study_access,
          CASE WHEN s.study_version IS NULL OR s.study_version = '[]' THEN nsd ELSE replace(replace(replace(s.study_version, '[', ''), ']', ''), '"', '') END AS study_version
      page_size: 1
    update_queries:
      # Number of participants
      - name: "Number of participants"
        # number_of_participants
        # numberOfSubjects
        query: |
          MATCH (s:study)
          WITH DISTINCT s
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (s)<-[*]-(p:participant)
          WITH DISTINCT s, COUNT(DISTINCT p) AS number_of_participants
          RETURN DISTINCT s.phs_accession AS phs_accession, number_of_participants, number_of_participants AS numberOfSubjects
        page_size: 1
      # Number of samples
      - name: "Number of samples"
        # number_of_samples
        # numberOfSamples
        query: |
          MATCH (s:study)
          WITH DISTINCT s
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (s)<-[*]-(samp:sample)
          WITH DISTINCT s, COUNT(DISTINCT samp) AS number_of_samples
          RETURN DISTINCT s.phs_accession AS phs_accession, number_of_samples, number_of_samples AS numberOfSamples
        page_size: 1
      # Number of files
      - name: "Number of files"
        # number_of_files
        # numberOfFiles
        query: |
          MATCH (s:study)
          WITH DISTINCT s
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (s)<-[*]-(f:file)
          WITH DISTINCT s, COUNT(DISTINCT f) AS number_of_files
          RETURN DISTINCT s.phs_accession AS phs_accession, number_of_files, number_of_files AS numberOfFiles
        page_size: 1
      # Number of disease sites
      - name: "Number of disease sites"
        # number_of_disease_sites
        # numberOfDiseaseSites
        query: |
          MATCH (s:study)
          WITH DISTINCT s
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (s)<-[*]-(diag:diagnosis)
          WHERE diag.primary_site IS NOT NULL
          WITH DISTINCT s, COUNT(DISTINCT diag.primary_site) AS number_of_disease_sites
          RETURN DISTINCT s.phs_accession AS phs_accession, number_of_disease_sites, number_of_disease_sites AS numberOfDiseaseSites
        page_size: 1
  - index_name: "subject_detail"
    id_field: "subject_id"
    mapping:
      keyword:
        - subject_id
        - study_acronym
        - study_name
        - sex
        - site
        - files.file_id
        - files.file_name
        - files.file_type
        - files.file_description
        - files.file_size
        - files.md5sum
        - files.file_url_in_cds
        - files.experimental_strategy_and_data_subtypes
        - samples.sample_id
        - samples.sample_type
        - samples.sample_tumor_status
        - samples.sample_anatomic_site
        - samples.derived_from_specimen
        - samples.biosample_accession
      long:
        - numberOfSamples
        - numberOfDiseaseSites
        - numberOfFiles
        - samples.sample_age_at_collection
    initial_query:
      # subject_id
      # study_acronym
      # study_name
      # sex
      query: |
        MATCH (p:participant)
        WITH DISTINCT p, "Not specified in data" AS nsd, "Not Applicable" AS na
        SKIP $skip LIMIT $limit
        OPTIONAL MATCH (s:study)<--(p)
        RETURN DISTINCT
          p.participant_id AS subject_id,
          CASE WHEN s IS NULL THEN na ELSE COALESCE(s.study_acronym, nsd) END AS study_acronym,
          CASE WHEN s IS NULL THEN na ELSE COALESCE(s.study_name, nsd) END AS study_name,
          COALESCE(p.sex, nsd) AS sex
      page_size: 5000
    update_queries:
      # Samples
      - name: "Samples"
        # samples
        # numberOfSamples
        # site
        query: |
          MATCH (p:participant)
          WITH DISTINCT p, "Not specified in data" AS nsd, "Not Applicable" AS na
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (p)<-[:of_participant]-(samp:sample)
          WITH p, nsd, na, COLLECT(DISTINCT CASE WHEN samp IS NULL THEN null ELSE {
            sample_id: COALESCE(samp.sample_id, nsd),
            sample_type: COALESCE(samp.sample_type, nsd),
            sample_tumor_status: COALESCE(samp.sample_tumor_status, nsd),
            sample_anatomic_site: COALESCE(samp.sample_anatomic_site, nsd),
            sample_age_at_collection: samp.sample_age_at_collection,
            derived_from_specimen: COALESCE(samp.derived_from_specimen, nsd),
            biosample_accession: COALESCE(samp.biosample_accession, nsd)
          } END) AS samples,
          COLLECT(DISTINCT CASE WHEN samp IS NULL THEN null ELSE COALESCE(samp.sample_anatomic_site, nsd) END) AS site,
          COUNT(DISTINCT samp) AS numberOfSamples
          RETURN DISTINCT
            p.participant_id AS subject_id,
            CASE WHEN numberOfSamples = 0 THEN [] ELSE samples END AS samples,
            numberOfSamples,
            CASE WHEN size(site) = 0 THEN [na] ELSE site END AS site
        page_size: 5000
      # Files
      - name: "Files"
        # files
        # numberOfFiles
        query: |
          MATCH (p:participant)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (p)<-[:of_participant]-(f:file)
          WITH p, COLLECT(DISTINCT {
            file_id: f.file_id,
            file_name: f.file_name,
            file_type: f.file_type,
            file_description: f.file_description,
            file_size: f.file_size,
            md5sum: f.md5sum,
            file_url_in_cds: f.file_url_in_cds,
            experimental_strategy_and_data_subtypes: f.experimental_strategy_and_data_subtypes
          }) AS files,
          COUNT(DISTINCT f) AS numberOfFiles
          RETURN DISTINCT
            p.participant_id AS subject_id,
            CASE WHEN numberOfFiles = 0 THEN [] ELSE files END AS files,
            numberOfFiles
        page_size: 5000
      # Disease Sites
      - name: "Disease Sites"
        # numberOfDiseaseSites
        query: |
          MATCH (p:participant)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (p)<-[*]-(diag:diagnosis)
          WITH p, COUNT(DISTINCT diag.primary_site) AS numberOfDiseaseSites
          RETURN DISTINCT
            p.participant_id AS subject_id,
            numberOfDiseaseSites
        page_size: 5000
