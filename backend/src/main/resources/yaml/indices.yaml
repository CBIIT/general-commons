          UNWIND fs AS f
          WITH f, s, na, study_study_data_type_filter,
            split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") AS experimental_strategies
          WITH f, s, na, study_study_data_type_filter,
            CASE WHEN size(experimental_strategies)=0 THEN [NULL] ELSE experimental_strategies END AS experimental_strategies
          UNWIND experimental_strategies AS experimental_strategy
          RETURN
            f.file_id + "_" + COALESCE(experimental_strategy, na) AS file_id_experimental_strategy,
            COLLECT(DISTINCT COALESCE(s.study_name, na)) AS study_study_name_filter,
            COLLECT(DISTINCT COALESCE(s.phs_accession, na)) AS study_phs_accession_filter,
            study_study_data_type_filter
        page_size: 1
      # Participants
      - name: Participants
        # demographics_sex_filter
        query: |
          MATCH (:study)<-[:of_study]-(f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          WITH f,
            split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") AS experimental_strategies
          WITH f,
            CASE WHEN size(experimental_strategies)=0 THEN [NULL] ELSE experimental_strategies END AS experimental_strategies
          UNWIND experimental_strategies AS experimental_strategy
          OPTIONAL MATCH (f)-[:of_participant]->(p:participant)
          WITH f, experimental_strategy, p, "Not specified in data" AS na
          RETURN 
            f.file_id + "_" + COALESCE(experimental_strategy, na) AS file_id_experimental_strategy,
            COLLECT(DISTINCT COALESCE(p.sex, na)) AS demographics_sex_filter
        page_size: 10000
      # Samples
      - name: Samples
        # samples_sample_tumor_status_filter
        # samples_sample_type_filter
        query: |
          MATCH (:study)<-[:of_study]-(f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          WITH f,
            split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") AS experimental_strategies
          WITH f,
            CASE WHEN size(experimental_strategies)=0 THEN [NULL] ELSE experimental_strategies END AS experimental_strategies
          UNWIND experimental_strategies AS experimental_strategy
          OPTIONAL MATCH (f)-[:of_participant]->(p:participant)
          WITH f, experimental_strategy, COLLECT(DISTINCT p) AS ps, "Not specified in data" AS na
          CALL {
            WITH ps, na
            WITH CASE WHEN size(ps)=0 THEN [NULL] ELSE ps END AS ps, na
            UNWIND ps AS p 
            OPTIONAL MATCH (p)<-[:of_participant]-(samp:sample)
            RETURN
              COLLECT(DISTINCT COALESCE(samp.sample_tumor_status, na)) AS samples_sample_tumor_status_filter,
              COLLECT(DISTINCT COALESCE(samp.sample_type, na)) AS samples_sample_type_filter
          }
          RETURN 
            f.file_id + "_" + COALESCE(experimental_strategy, na) AS file_id_experimental_strategy,
            samples_sample_tumor_status_filter,
            samples_sample_type_filter
        page_size: 25000
      # Diagnoses
      - name: Diagnoses
        # diagnosis_primary_diagnosis_filter
        query: |
          MATCH (:study)<-[:of_study]-(f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          WITH f,
            split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") AS experimental_strategies
          WITH f,
            CASE WHEN size(experimental_strategies)=0 THEN [NULL] ELSE experimental_strategies END AS experimental_strategies
          UNWIND experimental_strategies AS experimental_strategy
          OPTIONAL MATCH (f)-[:of_participant]->(p:participant)
          WITH f, experimental_strategy, COLLECT(DISTINCT p) AS ps, "Not specified in data" AS na
          CALL {
            WITH ps, na
            WITH CASE WHEN size(ps)=0 THEN [NULL] ELSE ps END AS ps, na
            UNWIND ps AS p
            OPTIONAL MATCH (p)<-[:of_participant]-(pdiag:diagnosis)
            RETURN COLLECT(DISTINCT pdiag.primary_diagnosis) AS p_primary_diagnosis
          }
          CALL {
            WITH ps, na
            WITH CASE WHEN size(ps)=0 THEN [NULL] ELSE ps END AS ps, na
            UNWIND ps AS p
            OPTIONAL MATCH (p)<-[:of_participant]-(:sample)<-[:of_sample]-(sdiag:diagnosis)
            RETURN COLLECT(DISTINCT sdiag.primary_diagnosis) AS s_primary_diagnosis
          }
          WITH f, experimental_strategy, na, p_primary_diagnosis + s_primary_diagnosis AS primary_diagnoses
          WITH f, experimental_strategy, na, CASE WHEN size(primary_diagnoses)=0 THEN [NULL] ELSE primary_diagnoses END AS primary_diagnoses
          UNWIND primary_diagnoses AS primary_diagnosis
          WITH DISTINCT
            f, experimental_strategy, na,
            COLLECT(DISTINCT primary_diagnosis) AS diagnosis_primary_diagnosis_filter
          RETURN DISTINCT
            f.file_id + "_" + COALESCE(experimental_strategy, na) AS file_id_experimental_strategy,
            CASE WHEN SIZE(diagnosis_primary_diagnosis_filter) = 0 THEN [na] ELSE diagnosis_primary_diagnosis_filter END AS diagnosis_primary_diagnosis_filter
        page_size: 10000
      # Genomic Info
      - name: Genomic Info
        # genomic_library_strategy_filter
        # genomic_library_source_material_filter
        # genomic_library_source_molecule_filter
        # genomic_library_layout_filter
        # genomic_library_selection_filter
        # genomic_platform_filter
        # genomic_instrument_model_filter
        # genomic_reference_genome_assembly_filter
        query: |
          MATCH (:study)<-[:of_study]-(f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          WITH f,
            split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") AS experimental_strategies
          WITH f,
            CASE WHEN size(experimental_strategies)=0 THEN [NULL] ELSE experimental_strategies END AS experimental_strategies
          UNWIND experimental_strategies AS experimental_strategy
          OPTIONAL MATCH (f)<-[:of_file]-(g:genomic_info)
          WITH f, experimental_strategy, g, "Not specified in data" AS na
          RETURN 
            f.file_id + "_" + COALESCE(experimental_strategy, na) AS file_id_experimental_strategy,
            COLLECT(DISTINCT COALESCE(g.library_strategy, na)) AS genomic_library_strategy_filter,
            COLLECT(DISTINCT COALESCE(g.library_source_material, na)) AS genomic_library_source_material_filter,
            COLLECT(DISTINCT COALESCE(g.library_source_molecule, na)) AS genomic_library_source_molecule_filter,
            COLLECT(DISTINCT COALESCE(g.library_layout, na)) AS genomic_library_layout_filter,
            COLLECT(DISTINCT COALESCE(g.library_selection, na)) AS genomic_library_selection_filter,
            COLLECT(DISTINCT COALESCE(g.platform, na)) AS genomic_platform_filter,
            COLLECT(DISTINCT COALESCE(g.instrument_model, na)) AS genomic_instrument_model_filter,
            COLLECT(DISTINCT COALESCE(g.reference_genome_assembly, na)) AS genomic_reference_genome_assembly_filter
        page_size: 10000
      # Imaging
      - name: Imaging
        # imaging_image_modality_filter
        # imaging_tissue_or_organ_of_origin_filter
        # imaging_tissue_fixative_filter
        # imaging_imaging_assay_type_filter
        query: |
          MATCH (:study)<-[:of_study]-(f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          WITH f,
            split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") AS experimental_strategies
          WITH f,
            CASE WHEN size(experimental_strategies)=0 THEN [NULL] ELSE experimental_strategies END AS experimental_strategies
          UNWIND experimental_strategies AS experimental_strategy
          OPTIONAL MATCH (f)<-[:of_file]-(i:image)
          WITH DISTINCT f, experimental_strategy, COLLECT(DISTINCT i) AS images, "Not specified in data" AS na
          CALL {
            WITH images, na
            WITH CASE WHEN size(images)=0 THEN [NULL] ELSE images END AS images, na
            UNWIND images AS i 
            OPTIONAL MATCH (i)<-[:of_image]-(mm:MultiplexMicroscopy)
            RETURN 
              COLLECT(DISTINCT COALESCE(i.organ_or_tissue, na)) AS imaging_tissue_or_organ_of_origin_filter,
              COLLECT(DISTINCT COALESCE(i.image_modality, na)) AS imaging_image_modality_filter,
              COLLECT(DISTINCT COALESCE(mm.imaging_assay_type, na)) AS imaging_imaging_assay_type_filter,
              COLLECT(DISTINCT COALESCE(mm.tissue_fixative, na)) AS imaging_tissue_fixative_filter
          }
          RETURN DISTINCT 
            f.file_id + "_" + COALESCE(experimental_strategy, na) AS file_id_experimental_strategy,
            imaging_tissue_or_organ_of_origin_filter,
            imaging_image_modality_filter,
            imaging_imaging_assay_type_filter,
            imaging_tissue_fixative_filter 
        page_size: 10000
      # Proteomic
      - name: Proteomic
        # proteomic_analytical_fractions
        # proteomic_instrument_makes_filter
        query: |
          MATCH (:study)<-[:of_study]-(f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          WITH f,
            split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") AS experimental_strategies
          WITH f,
            CASE WHEN size(experimental_strategies)=0 THEN [NULL] ELSE experimental_strategies END AS experimental_strategies
          UNWIND experimental_strategies AS experimental_strategy
          OPTIONAL MATCH (f)<-[:of_file]-(pr:proteomic)
          WITH f, experimental_strategy, pr, "Not specified in data" AS na
          RETURN DISTINCT 
            f.file_id + "_" + COALESCE(experimental_strategy, na) AS file_id_experimental_strategy,
            COLLECT(DISTINCT COALESCE(pr.analytical_fractions, na)) AS proteomic_analytical_fractions_filter,
            COLLECT(DISTINCT COALESCE(pr.instrument_make, na)) AS proteomic_instrument_makes_filter
        page_size: 10000
  - index_name: "dashboard_participant_ids"
    id_field: "study_participant_id"
    mapping:
      keyword:
        - study_participant_id
        - participant_id
        - phs_accession
    initial_query:
      # subject_id (participant_id)
      # phs_accession
      query: |
        MATCH (s:study)<-[:of_study]-(f:file)
        WITH DISTINCT f, s.phs_accession as phs_accession
        MATCH (f)-[:of_participant]->(p:participant)
        WITH DISTINCT p, f, phs_accession, "Not specified in data" AS na
        ORDER BY p.participant_id
        RETURN DISTINCT
          COALESCE(p.study_participant_id, na) as study_participant_id,
          COALESCE(p.participant_id, na) as participant_id,
          COALESCE(phs_accession, na) as phs_accession
        SKIP $skip LIMIT $limit
      page_size: 10000
  - index_name: "gs_study"
    id_field: "phs_accession"
    mapping:
      keyword:
        - phs_accession
      search_as_you_type:
        - phs_accession_gs
        - study_name_gs
        - study_code_gs
    initial_query:
      # phs_accession
      # phs_accession_gs
      # study_name_gs
      # study_code_gs
      query: |
        MATCH (s:study)
        WITH DISTINCT s, "Not specified in data" AS na
        ORDER BY s.phs_accession
        RETURN DISTINCT
          COALESCE(s.phs_accession, na) as phs_accession,
          s.phs_accession as phs_accession_gs,
          s.study_name as study_name_gs,
          s.study_name as study_code_gs
        SKIP $skip LIMIT $limit
      page_size: 10000
  - index_name: "gs_participant"
    id_field: "study_participant_id"
    mapping:
      keyword:
        - study_participant_id
      search_as_you_type:
        - study_gs
        - subject_id_gs
        - site_gs
        - sex_gs # was missing
    initial_query:
      # study_participant_id
      # subject_id_gs
      query: |
        MATCH (p:participant)
        WITH DISTINCT p, "Not specified in data" AS na
        ORDER BY p.study_participant_id
        RETURN DISTINCT
          p.study_participant_id as study_participant_id,
          COALESCE(p.participant_id, na) as subject_id_gs
        SKIP $skip LIMIT $limit
      page_size: 10000
    update_queries:
      # Study
      - name: "Study"
        # study_gs
        query: |
          MATCH (p:participant)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (p)<-[:of_participant]-(:file)-[:of_study]-(s:study)
          WITH p.study_participant_id AS study_participant_id, COLLECT(DISTINCT s.study_name) AS study_names, "Not specified in data" AS na
          WITH study_participant_id, apoc_replacement_poc.sort(study_names) AS sorted_studies, na
          WITH study_participant_id, CASE WHEN size(sorted_studies) = 0 THEN [na] ELSE sorted_studies END AS study_gs
          RETURN DISTINCT
            study_participant_id,
            study_gs
        page_size: 10000
      # Site
      - name: "Site"
        # site_gs
        query: |
          MATCH (p:participant)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (p)<-[:of_participant]-(:sample)<-[:of_sample]-(d:diagnosis)
          WITH p.study_participant_id AS study_participant_id, COLLECT(DISTINCT d.primary_site) AS sites, "Not specified in data" AS na
          WITH study_participant_id, CASE WHEN size(sites) = 0 THEN [na] ELSE sites END AS site_gs
          RETURN DISTINCT
            study_participant_id,
            site_gs
        page_size: 10000
      # Sex
      - name: "Sex"
        # sex_gs
        query: |
          MATCH (p:participant)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          WITH p.study_participant_id AS study_participant_id, COALESCE(p.sex, "Not specified in data") AS sex_gs
          RETURN DISTINCT
            study_participant_id,
            sex_gs
        page_size: 10000
  - index_name: "gs_sample"
    id_field: "sample_id"
    mapping:
      keyword:
        - sample_id
      search_as_you_type:
        - sample_id_gs
        - is_tumor_gs
        - analyte_type_gs
    initial_query:
      # sample_id
      # sample_id_gs
      # is_tumor_gs
      # analyte_type_gs
      query: |
        MATCH (samp:sample)
        WITH DISTINCT samp, "Not specified in data" AS na
        ORDER BY samp.sample_id
        RETURN DISTINCT
          samp.sample_id as sample_id,
          samp.sample_id as sample_id_gs,
          COALESCE(samp.sample_tumor_status, na) as is_tumor_gs,
          COALESCE(samp.sample_type, na) as analyte_type_gs
        SKIP $skip LIMIT $limit
      page_size: 10000
  - index_name: "gs_file"
    id_field: "file_id"
    mapping:
      keyword:
        - file_id
      search_as_you_type:
        - subject_id_gs
        - sample_id_gs
        - file_id_gs
        - file_name_gs
        - file_type_gs
    initial_query:
      # file_id
      # file_id_gs
      # file_name_gs
      # file_type_gs
      query: |
        MATCH (f:file)
        WITH DISTINCT f, "Not specified in data" AS na
        ORDER BY f.file_id
        RETURN DISTINCT
          f.file_id as file_id,
          f.file_id as file_id_gs,
          COALESCE(f.file_name, na) as file_name_gs,
          COALESCE(f.file_type, na) as file_type_gs
        SKIP $skip LIMIT $limit
      page_size: 10000
    update_queries:
      # Participants
      - name: "Participants"
        # TODO: Future requirements clarification needed - determine if subject_id should be [String] array, comma-delimited string, or single value
        # Currently returns first participant_id only
        # subject_id_gs
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-[:of_participant]->(p:participant)
          WITH f.file_id AS file_id, COLLECT(DISTINCT p.participant_id) AS participant_ids
          WITH file_id, CASE WHEN size(participant_ids) = 0 THEN [] ELSE participant_ids END AS participant_ids
          RETURN DISTINCT
            file_id,
            participant_ids[0] as subject_id_gs
        page_size: 10000
      # Samples
      - name: "Samples"
        # TODO: Future requirements clarification needed - determine if sample_id should be [String] array, comma-delimited string, or single value
        # Currently returns first sample_id only
        # sample_id_gs
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-[:of_participant]->(p:participant)
          WITH DISTINCT f, p
          OPTIONAL MATCH (p)<-[:of_participant]-(samp:sample)
          WITH f.file_id AS file_id, COLLECT(DISTINCT samp.sample_id) AS sample_ids
          WITH file_id, CASE WHEN size(sample_ids) = 0 THEN [] ELSE sample_ids END AS sample_ids
          RETURN DISTINCT
            file_id,
            sample_ids[0] as sample_id_gs
        page_size: 10000
  - index_name: "gs_program"
    id_field: "program_name"
    mapping:
      keyword:
        - program_name
      search_as_you_type:
        - program_name_gs
        - program_short_description_gs
        - program_full_description_gs
        - program_external_url_gs
        - program_sort_order_gs
        - type_gs
    initial_query:
      # program_name
      # program_name_gs
      # program_short_description_gs
      # program_full_description_gs
      # program_external_url_gs
      # program_sort_order_gs
      # type_gs
      query: |
        MATCH (p:program)
        WITH DISTINCT p, "Not specified in data" AS na
        ORDER BY p.program_sort_order
        RETURN DISTINCT
          p.program_name as program_name,
          p.program_name as program_name_gs,
          p.program_short_description as program_short_description_gs,
          p.program_full_description as program_full_description_gs,
          p.program_external_url as program_external_url_gs,
          p.program_sort_order as program_sort_order_gs,
          'program' as type_gs
        SKIP $skip LIMIT $limit
      page_size: 10000
  - index_name: "program"
    id_field: "program_name"
    mapping:
      keyword:
        - program_name
        - program_acronym
        - program_external_url
        - program_short_description
        - phs_accessions
      long:
        - num_studies
        - num_participants
        - num_files
        - num_samples
        - num_disease_sites
    initial_query:
      # program_name
      # program_acronym
      # program_external_url
      # program_short_description
      query: |
        MATCH (p:program)
        WITH DISTINCT p, "Not specified in data" AS na
        RETURN DISTINCT
          p.program_name as program_name,
          p.program_acronym as program_acronym,
          COALESCE(p.program_external_url, na) as program_external_url,
          COALESCE(p.program_short_description, na) as program_short_description
        SKIP $skip LIMIT $limit
      page_size: 10000
    update_queries:
      - name: "Number of studies"
        # num_studies
        query: |
          MATCH (p:program)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (p)<-[:of_program]-(s:study)
          RETURN DISTINCT p.program_name AS program_name, COUNT(DISTINCT s) AS num_studies
        page_size: 10000
      - name: "Number of disease sites"
        # num_disease_sites
        query: |
          MATCH (p:program)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (p)<-[:of_program]-(s:study)
          WITH DISTINCT p.program_name AS program_name, s
          OPTIONAL MATCH (s)<-[:of_study]-(p:participant)
          WITH DISTINCT program_name, p
          CALL {
            WITH p
            OPTIONAL MATCH (p)<-[:of_participant]-(diag:diagnosis)
            RETURN COUNT(DISTINCT diag.primary_site) AS num_disease_sites_p
          }
          OPTIONAL MATCH (p)<-[:of_participant]-(samp:sample)
          WITH DISTINCT program_name, num_disease_sites_p, samp 
          OPTIONAL MATCH (samp)<-[:of_sample]-(diag:diagnosis)
          RETURN program_name, COUNT(DISTINCT diag.primary_site)+num_disease_sites_p AS num_disease_sites
        page_size: 10000
      - name: "Number of participants"
        # num_participants
        query: |
          MATCH (p:program)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (p)<-[:of_program]-(s:study)
          WITH DISTINCT p.program_name AS program_name, s
          OPTIONAL MATCH (s)<-[:of_study]-(p:participant)
          RETURN DISTINCT program_name, COUNT(DISTINCT p) AS num_participants
        page_size: 10000
      - name: "Number of files"
        # num_files
        query: |
          MATCH (p:program)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (p)<-[:of_program]-(s:study)
          WITH DISTINCT p.program_name AS program_name, s
          OPTIONAL MATCH (s)<-[:of_study]-(f:file)
          RETURN DISTINCT program_name, COUNT(DISTINCT f) AS num_files
        page_size: 10000
      - name: "Number of samples"
        # num_samples
        query: |
          MATCH (p:program)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (p)<-[:of_program]-(s:study)
          WITH DISTINCT p.program_name AS program_name, s
          OPTIONAL MATCH (s)<-[:of_study]-(p:participant)
          WITH DISTINCT program_name, p
          OPTIONAL MATCH (p)<-[:of_participant]-(samp:sample)
          RETURN DISTINCT program_name, COUNT(DISTINCT samp) AS num_samples
        page_size: 10000
      - name: "Study accessions"
        # phs_accessions
        query: |
          MATCH (p:program)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (p)<-[:of_program]-(s:study)
          RETURN DISTINCT p.program_name AS program_name, COLLECT(DISTINCT s.phs_accession) AS phs_accessions
        page_size: 10000
  - index_name: "study"
    id_field: "phs_accession"
    mapping:
      keyword:
        - phs_accession
        - study_name
        - study_version
        - study_access
        - study_acronym
        - study_description
        - study_data_types
        - study_external_url
      long:
        - numberOfParticipants
        - numberOfFiles
        - numberOfSamples
        - numberOfDiseaseSites
    initial_query:
      # phs_accession
      # study_name
      # study_version
      # study_access
      # study_acronym
      # study_description
      # study_data_types
      # study_external_url
      query: |
        MATCH (s:study)
        WITH DISTINCT s, "Not specified in data" AS na
        ORDER BY s.phs_accession
        RETURN DISTINCT
          COALESCE(s.phs_accession, na) as phs_accession,
          COALESCE(s.study_name, na) as study_name,
          CASE WHEN s.study_version = '[]' OR s.study_version IS NULL THEN na ELSE apoc_replacement_poc.text_replace(s.study_version,'\\[|\\]|\\"|\'','') END as study_version,
          COALESCE(s.study_access, na) as study_access,
          COALESCE(s.study_acronym, na) as study_acronym,
          COALESCE(s.study_description, na) as study_description,
          COALESCE(s.study_data_types, na) as study_data_types,
          COALESCE(s.study_external_url, na) as study_external_url
        SKIP $skip LIMIT $limit
      page_size: 10000
    update_queries:
      # Number of participants
      - name: "Number of participants"
        # numberOfParticipants
        query: |
          MATCH (s:study)
          WITH DISTINCT s
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (s)<-[:of_study]-(p:participant)
          RETURN DISTINCT s.phs_accession AS phs_accession, COUNT(DISTINCT p) AS numberOfParticipants
        page_size: 10000
      # Number of files
      - name: "Number of files"
        # numberOfFiles
        query: |
          MATCH (s:study)
          WITH DISTINCT s
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (s)<-[:of_study]-(f:file)
          RETURN DISTINCT s.phs_accession AS phs_accession, COUNT(DISTINCT f) AS numberOfFiles
        page_size: 10000
      # Number of samples
      - name: "Number of samples"
        # numberOfSamples
        query: |
          MATCH (s:study)
          WITH DISTINCT s
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (s)<-[:of_study]-(p:participant)
          WITH DISTINCT s.phs_accession AS phs_accession, p
          OPTIONAL MATCH (p)<-[:of_participant]-(samp:sample)
          RETURN DISTINCT phs_accession, COUNT(DISTINCT samp) AS numberOfSamples
        page_size: 10000
      # Number of disease sites
      - name: "Number of disease sites"
        # numberOfDiseaseSites
        query: |
          MATCH (s:study)
          WITH DISTINCT s
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (s)<-[:of_study]-(p:participant)
          WITH DISTINCT s.phs_accession AS phs_accession, p
          CALL {
            WITH p
            OPTIONAL MATCH (p)<-[:of_participant]-(diag:diagnosis)
            RETURN COUNT(DISTINCT diag.primary_site) AS num_disease_sites_p
          }
          OPTIONAL MATCH (p)<-[:of_participant]-(samp:sample)
          WITH DISTINCT phs_accession, num_disease_sites_p, samp 
          OPTIONAL MATCH (samp)<-[:of_sample]-(diag:diagnosis)
          RETURN phs_accession, COUNT(DISTINCT diag.primary_site)+num_disease_sites_p AS numberOfDiseaseSites
        page_size: 10000
  - index_name: about_page
    type: about_file
  - index_name: model_nodes
    type: model
    subtype: node
  - index_name: model_properties
    type: model
    subtype: property
  - index_name: model_values
    type: model
    subtype: value