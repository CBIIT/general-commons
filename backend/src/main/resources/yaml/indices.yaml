indices:
  - index_name: "dashboard_participant"
    id_field: "study_participant_id"
    mapping:
      keyword:
        # initial_query
        - study_participant_id # participant.study_participant_id - single value
        - participant_id # participant.participant_id - single value
        - race # participant.race - single value
        - sex # participant.sex - demographics_sex_filter - single value
        - ethnicity # participant.ethnicity - single value
        - subject_ids # participant.participant_id - single value
        - dbGaP_subject_id # participant.dbGaP_subject_id - single value
        # Participant Samples
        - samples # sample.sample_id - sample_ids - array
        - is_tumor # sample.sample_tumor_status - samples_sample_tumor_status_filter - array
        - sample_types # sample.sample_type - samples_sample_type_filter - array
        - is_tumor_sort # derived from is_tumor - single value
        - sample_types_sort # derived from sample_types - single value
        # Study
        - studies # study.study_name - study_study_name_filter - array
        - phs_accession # study.phs_accession - study_phs_accession_filter - array
        - study_data_types # study.study_data_types - study_study_data_type_filter - array
        - accesses # study.study_access - array
        - acl # study.acl - array
        # Files
        - files # file.file_id - array
        - experimental_strategies # file.experimental_strategy_and_data_subtypes - files_experimental_strategy_filter - array
        - file_types # file.file_type - files_file_type_filter - array
        - experimental_strategies_sort # derived from experimental_strategies - single value
        - file_types_sort # derived from file_types - single value
        # File Diagnoses
        - primary_diagnoses # diagnosis.primary_diagnosis - diagnosis_primary_diagnosis_filter - array
        - diagnosis_primary_diagnosis_filter # diagnosis.primary_diagnosis - array
        - primary_diagnoses_sort # derived from primary_diagnoses - single value
        - site # diagnosis.primary_site - array
        - site_sort # derived from site - single value
        # File Genomic Info
        - library_strategies # genomic_info.library_strategy - genomic_library_strategy_filter - array
        - library_source_materials # genomic_info.library_source_material - genomic_library_source_material_filter - array
        - library_source_molecules # genomic_info.library_source_molecule - genomic_library_source_molecule_filter - array
        - library_layouts # genomic_info.library_layout - genomic_library_layout_filter - array
        - library_selections # genomic_info.library_selection - genomic_library_selection_filter - array
        - platforms # genomic_info.platform - genomic_platform_filter - array
        - instrument_models # genomic_info.instrument_model - genomic_instrument_model_filter - array
        - reference_genome_assemblies # genomic_info.reference_genome_assembly - genomic_reference_genome_assembly_filter - array
        - library_strategies_sort # derived from library_strategies - single value
        - library_source_materials_sort # derived from library_source_materials - single value
        - library_source_molecules_sort # derived from library_source_molecules - single value
        - library_layouts_sort # derived from library_layouts - single value
        - library_selections_sort # derived from library_selections - single value
        - platforms_sort # derived from platforms - single value
        - instrument_models_sort # derived from instrument_models - single value
        - reference_genome_assemblies_sort # derived from reference_genome_assemblies - single value
        # File Imaging
        - image_modality # image.image_modality - imaging_image_modality_filter - array
        - organ_or_tissue # image.organ_or_tissue - imaging_tissue_or_organ_of_origin_filter - array
        - tissue_fixative # MultiplexMicroscopy.tissue_fixative - imaging_tissue_fixative_filter - array
        - imaging_assay_type # MultiplexMicroscopy.imaging_assay_type - imaging_imaging_assay_type_filter - array
        - image_modality_sort # derived from image_modality - single value
        - organ_or_tissue_sort # derived from organ_or_tissue - single value
        - tissue_fixative_sort # derived from tissue_fixative - single value
        - imaging_assay_type_sort # derived from imaging_assay_type - single value
        # File Proteomic
        - analytical_fractions # proteomic.analytical_fractions - proteomic_analytical_fractions_filter - array
        - instrument_makes # proteomic.instrument_make - proteomic_instrument_makes_filter - array
        - aliquot_ids # proteomic.aliquot_id - array
        - proteomic_instrument_models # proteomic.proteomic_instrument_model - array
        - proteomic_design_descriptions # proteomic.proteomic_design_description - array
      long:
        - number_of_study_participants # study_num_of_study_participants - single value
        - number_of_study_samples # study_num_of_study_samples - single value
      boolean:
        - files_is_supplementary_file_filter # file.is_supplementary_file - array
        - is_supplementary_file # alias for files_is_supplementary_file_filter - for GraphQL parameter compatibility
    initial_query:
      # study_participant_id
      # participant_id
      # race
      # sex
      # ethnicity
      # subject_ids
      # dbGaP_subject_id
      query: |
        MATCH (p:participant)
        WITH DISTINCT p, "Not specified in data" AS na
        ORDER BY p.study_participant_id
        RETURN DISTINCT
          p.study_participant_id as study_participant_id,
          COALESCE(p.participant_id, na) as participant_id,
          COALESCE(p.race, na) as race,
          COALESCE(p.sex, na) as sex,
          COALESCE(p.ethnicity, na) as ethnicity,
          COALESCE(p.participant_id, na) as subject_ids,
          COALESCE(p.dbGaP_subject_id, na) as dbGaP_subject_id
        SKIP $skip LIMIT $limit
      page_size: 10000
    update_queries:
      # Participant Samples
      - name: "Participant Samples"
        # samples
        # is_tumor
        # sample_types
        # is_tumor_sort
        # sample_types_sort
        query: |
          MATCH (p:participant)
          WITH p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (p)<--(samp:sample)
          WITH p.study_participant_id AS study_participant_id,
            COLLECT(DISTINCT samp.sample_id) AS samples,
            COLLECT(DISTINCT samp.sample_tumor_status) AS is_tumor,
            COLLECT(DISTINCT samp.sample_type) AS sample_types,
            "Not specified in data" AS na
          CALL {
            WITH is_tumor, na
            WITH na, CASE WHEN is_tumor IS NULL OR size(is_tumor)=0 THEN [na] ELSE is_tumor END AS is_tumor
            UNWIND is_tumor AS tumor_status
            WITH tumor_status
            ORDER BY tumor_status
            RETURN reduce(s = '', i IN collect(tumor_status) | s + i + '') AS is_tumor_sort
          }
          CALL {
            WITH sample_types, na
            WITH CASE WHEN sample_types IS NULL OR size(sample_types)=0 THEN [na] ELSE sample_types END AS sample_types
            UNWIND sample_types AS sample_type
            WITH sample_type
            ORDER BY sample_type
            RETURN reduce(s = '', i IN collect(sample_type) | s + i + '') AS sample_types_sort
          }
          RETURN DISTINCT
            study_participant_id,
            samples,
            is_tumor,
            sample_types,
            is_tumor_sort,
            sample_types_sort
        page_size: 10000
      # Study
      - name: "Study"
        # studies
        # phs_accession
        # study_data_types
        # number_of_study_participants
        # number_of_study_samples
        # accesses
        # acl
        query: |
          MATCH (s:study)
          WITH s 
          SKIP $skip LIMIT $limit 
          WITH s, "Not specified in data" AS na
          CALL {
            WITH s
            OPTIONAL MATCH (s)<-[*]-(p:participant)
            WITH s, COUNT(DISTINCT p) AS number_of_study_participants
            OPTIONAL MATCH (s)<-[*]-(samp:sample)
            RETURN number_of_study_participants, count(distinct samp) AS number_of_study_samples
          }
          WITH 
            s, na, number_of_study_participants, number_of_study_samples,
            split(replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', ''), ", ") AS study_data_types,
            split(replace(replace(replace(s.acl, '[', ''), ']', ''), '"', ''), ", ") AS acl,
            COLLECT(DISTINCT COALESCE(s.study_name, na)) AS studies,
            COLLECT(DISTINCT COALESCE(s.phs_accession, na)) AS phs_accession,
            COLLECT(DISTINCT COALESCE(s.study_access, na)) AS accesses
          WITH 
            s, na, number_of_study_participants, number_of_study_samples,
            CASE WHEN study_data_types IS NULL OR size(study_data_types)=0 THEN [na] ELSE study_data_types END AS study_data_types,
            CASE WHEN acl IS NULL OR size(acl)=0 THEN [na] ELSE acl END AS acl,
            CASE WHEN studies IS NULL OR size(studies)=0 THEN [na] ELSE studies END AS studies,
            CASE WHEN phs_accession IS NULL OR size(phs_accession)=0 THEN [na] ELSE phs_accession END AS phs_accession,
            CASE WHEN accesses IS NULL OR size(accesses)=0 THEN [na] ELSE accesses END AS accesses
          OPTIONAL MATCH (s)<-[:of_study]-(p:participant)
          WITH DISTINCT p, s, na, number_of_study_participants, number_of_study_samples, study_data_types, acl, studies, phs_accession, accesses
          RETURN DISTINCT
            p.study_participant_id AS study_participant_id,
            studies,
            phs_accession,
            accesses,
            study_data_types,
            acl,
            number_of_study_participants,
            number_of_study_samples
        page_size: 1
      # Files
      - name: "Files"
        # files
        # experimental_strategies
        # file_types
        # files_is_supplementary_file_filter
        # experimental_strategies_sort
        # file_types_sort
        query: |
          MATCH (p:participant)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f:file)-->(p)
          WITH p.study_participant_id AS study_participant_id, COLLECT(DISTINCT f) AS fs, COLLECT(DISTINCT f.file_id) AS files, "Not specified in data" AS na
          CALL {
            WITH study_participant_id, fs, na
            WITH study_participant_id, na, fs
            WITH study_participant_id, na, CASE WHEN fs IS NULL OR size(fs)=0 THEN [] ELSE fs END AS fs
            WITH study_participant_id, na, fs, size(fs) = 0 AS no_files
            UNWIND (CASE WHEN size(fs) = 0 THEN [null] ELSE fs END) AS f
            WITH 
              study_participant_id, f, na, no_files,
              CASE WHEN f IS NULL THEN null ELSE split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") END AS experimental_strategies
            WITH 
              study_participant_id, f, na, no_files,
              CASE WHEN no_files THEN [na] WHEN experimental_strategies IS NULL OR size(experimental_strategies)=0 THEN [na] ELSE experimental_strategies END AS experimental_strategies
            UNWIND experimental_strategies AS experimental_strategy
            RETURN 
              COLLECT(DISTINCT COALESCE(experimental_strategy, na)) AS experimental_strategies,
              COLLECT(DISTINCT CASE WHEN f IS NULL THEN na ELSE COALESCE(f.file_type, na) END) AS file_types,
              COLLECT(DISTINCT CASE WHEN f IS NULL THEN false ELSE COALESCE(f.is_supplementary_file, false) END) AS files_is_supplementary_file_filter
          }
          CALL {
            WITH experimental_strategies, na
            WITH na, CASE WHEN experimental_strategies IS NULL OR size(experimental_strategies)=0 THEN [na] ELSE experimental_strategies END AS experimental_strategies
            UNWIND experimental_strategies AS experimental_strategy
            WITH experimental_strategy
            ORDER BY experimental_strategy
            RETURN reduce(s = '', i IN collect(experimental_strategy) | s + i + '') AS experimental_strategies_sort
          }
          CALL {
            WITH file_types, na
            WITH CASE WHEN file_types IS NULL OR size(file_types)=0 THEN [na] ELSE file_types END AS file_types
            UNWIND file_types AS file_type
            WITH file_type
            ORDER BY file_type
            RETURN reduce(s = '', i IN collect(file_type) | s + i + '') AS file_types_sort
          }
          RETURN DISTINCT
            files,
            study_participant_id,
            experimental_strategies,
            file_types,
            files_is_supplementary_file_filter,
            files_is_supplementary_file_filter AS is_supplementary_file,
            experimental_strategies_sort,
            file_types_sort
        page_size: 10000
      # File Diagnoses
      - name: "File Diagnoses"
        # primary_diagnoses
        # primary_diagnoses_sort
        # site
        # site_sort
        query: |
          MATCH (p:participant)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f:file)-->(p)
          WITH DISTINCT f, p.study_participant_id AS study_participant_id, "Not specified in data" AS na
          OPTIONAL MATCH (f)<-[*]-(diag:diagnosis)
          WITH DISTINCT study_participant_id, na,
            COLLECT(DISTINCT diag.primary_diagnosis) AS primary_diagnoses,
            COLLECT(DISTINCT COALESCE(diag.primary_site, na)) AS site
          WITH study_participant_id, na, 
            CASE WHEN primary_diagnoses IS NULL OR size(primary_diagnoses)=0 THEN [na] ELSE primary_diagnoses END AS primary_diagnoses,
            CASE WHEN site IS NULL OR size(site)=0 THEN [na] ELSE site END AS site
          CALL {
            WITH primary_diagnoses, na
            WITH na, CASE WHEN primary_diagnoses IS NULL OR size(primary_diagnoses)=0 THEN [na] ELSE primary_diagnoses END AS primary_diagnoses
            UNWIND primary_diagnoses AS primary_diagnosis
            WITH primary_diagnosis
            ORDER BY primary_diagnosis
            RETURN reduce(s = '', i IN collect(primary_diagnosis) | s + i + '') AS primary_diagnoses_sort
          }
          CALL {
            WITH site, na
            WITH CASE WHEN site IS NULL OR size(site)=0 THEN [na] ELSE site END AS site
            UNWIND site AS site_value
            WITH site_value
            ORDER BY site_value
            RETURN reduce(s = '', i IN collect(site_value) | s + i + '') AS site_sort
          }
          RETURN DISTINCT
            study_participant_id,
            primary_diagnoses,
            primary_diagnoses_sort,
            site,
            site_sort
        page_size: 10000
      # File Genomic Info 
      - name: "File Genomic Info"
        # library_strategies
        # library_source_materials
        # library_source_molecules
        # library_layouts
        # library_selections
        # platforms
        # instrument_models
        # reference_genome_assemblies
        # library_strategies_sort
        # library_source_materials_sort
        # library_source_molecules_sort
        # library_layouts_sort
        # library_selections_sort
        # platforms_sort
        # instrument_models_sort
        # reference_genome_assemblies_sort
        query: |
          MATCH (p:participant)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f:file)-[:of_participant]->(p)
          WITH DISTINCT f, p.study_participant_id AS study_participant_id, "Not specified in data" AS na
          OPTIONAL MATCH (f)<-[:of_file]-(g:genomic_info)
          WITH study_participant_id, na,
            COLLECT(DISTINCT COALESCE(g.library_strategy, na)) AS library_strategies,
            COLLECT(DISTINCT COALESCE(g.library_source_material, na)) AS library_source_materials,
            COLLECT(DISTINCT COALESCE(g.library_source_molecule, na)) AS library_source_molecules,
            COLLECT(DISTINCT COALESCE(g.library_layout, na)) AS library_layouts,
            COLLECT(DISTINCT COALESCE(g.library_selection, na)) AS library_selections,
            COLLECT(DISTINCT COALESCE(g.platform, na)) AS platforms,
            COLLECT(DISTINCT COALESCE(g.instrument_model, na)) AS instrument_models,
            COLLECT(DISTINCT COALESCE(g.reference_genome_assembly, na)) AS reference_genome_assemblies
          CALL {
            WITH library_strategies, na
            WITH CASE WHEN library_strategies IS NULL OR size(library_strategies)=0 THEN [na] ELSE library_strategies END AS library_strategies
            UNWIND library_strategies AS library_strategy
            WITH library_strategy
            ORDER BY library_strategy
            RETURN reduce(s = '', i IN collect(library_strategy) | s + i + '') AS library_strategies_sort
          }
          CALL {
            WITH library_source_materials, na
            WITH CASE WHEN library_source_materials IS NULL OR size(library_source_materials)=0 THEN [na] ELSE library_source_materials END AS library_source_materials
            UNWIND library_source_materials AS library_source_material
            WITH library_source_material
            ORDER BY library_source_material
            RETURN reduce(s = '', i IN collect(library_source_material) | s + i + '') AS library_source_materials_sort
          }
          CALL {
            WITH library_source_molecules, na
            WITH CASE WHEN library_source_molecules IS NULL OR size(library_source_molecules)=0 THEN [na] ELSE library_source_molecules END AS library_source_molecules
            UNWIND library_source_molecules AS library_source_molecule
            WITH library_source_molecule
            ORDER BY library_source_molecule
            RETURN reduce(s = '', i IN collect(library_source_molecule) | s + i + '') AS library_source_molecules_sort
          }
          CALL {
            WITH library_layouts, na
            WITH CASE WHEN library_layouts IS NULL OR size(library_layouts)=0 THEN [na] ELSE library_layouts END AS library_layouts
            UNWIND library_layouts AS library_layout
            WITH library_layout
            ORDER BY library_layout
            RETURN reduce(s = '', i IN collect(library_layout) | s + i + '') AS library_layouts_sort
          }
          CALL {
            WITH library_selections, na
            WITH CASE WHEN library_selections IS NULL OR size(library_selections)=0 THEN [na] ELSE library_selections END AS library_selections
            UNWIND library_selections AS library_selection
            WITH library_selection
            ORDER BY library_selection
            RETURN reduce(s = '', i IN collect(library_selection) | s + i + '') AS library_selections_sort
          }
          CALL {
            WITH platforms, na
            WITH CASE WHEN platforms IS NULL OR size(platforms)=0 THEN [na] ELSE platforms END AS platforms
            UNWIND platforms AS platform
            WITH platform
            ORDER BY platform
            RETURN reduce(s = '', i IN collect(platform) | s + i + '') AS platforms_sort
          }
          CALL {
            WITH instrument_models, na
            WITH CASE WHEN instrument_models IS NULL OR size(instrument_models)=0 THEN [na] ELSE instrument_models END AS instrument_models
            UNWIND instrument_models AS instrument_model
            WITH instrument_model
            ORDER BY instrument_model
            RETURN reduce(s = '', i IN collect(instrument_model) | s + i + '') AS instrument_models_sort
          }
          CALL {
            WITH reference_genome_assemblies, na
            WITH CASE WHEN reference_genome_assemblies IS NULL OR size(reference_genome_assemblies)=0 THEN [na] ELSE reference_genome_assemblies END AS reference_genome_assemblies
            UNWIND reference_genome_assemblies AS reference_genome_assembly
            WITH reference_genome_assembly
            ORDER BY reference_genome_assembly
            RETURN reduce(s = '', i IN collect(reference_genome_assembly) | s + i + '') AS reference_genome_assemblies_sort
          }
          RETURN DISTINCT 
            study_participant_id,
            library_strategies,
            library_source_materials,
            library_source_molecules,
            library_layouts,
            library_selections,
            platforms,
            instrument_models,
            reference_genome_assemblies,
            library_strategies_sort,
            library_source_materials_sort,
            library_source_molecules_sort,
            library_layouts_sort,
            library_selections_sort,
            platforms_sort,
            instrument_models_sort,
            reference_genome_assemblies_sort
        page_size: 10000
      # File Imaging
      - name: "File Imaging"
        # image_modality
        # organ_or_tissue
        # tissue_fixative
        # imaging_assay_type
        # image_modality_sort
        # organ_or_tissue_sort
        # tissue_fixative_sort
        # imaging_assay_type_sort
        query: |
          MATCH (p:participant)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f:file)-[:of_participant]->(p)
          WITH DISTINCT f, p.study_participant_id AS study_participant_id, "Not specified in data" AS na
          OPTIONAL MATCH (f)<-[:of_file]-(i:image)
          OPTIONAL MATCH (i)<-[:of_image]-(mm:MultiplexMicroscopy)
          WITH DISTINCT study_participant_id, na,
            COLLECT(DISTINCT COALESCE(i.organ_or_tissue, na)) AS organ_or_tissue,
            COLLECT(DISTINCT COALESCE(i.image_modality, na)) AS image_modality,
            COLLECT(DISTINCT COALESCE(mm.imaging_assay_type, na)) AS imaging_assay_type,
            COLLECT(DISTINCT COALESCE(mm.tissue_fixative, na)) AS tissue_fixative
          WITH study_participant_id, na,
            CASE WHEN size(organ_or_tissue) = 0 THEN [na] ELSE organ_or_tissue END AS organ_or_tissue,
            CASE WHEN size(image_modality) = 0 THEN [na] ELSE image_modality END AS image_modality,
            CASE WHEN size(imaging_assay_type) = 0 THEN [na] ELSE imaging_assay_type END AS imaging_assay_type,
            CASE WHEN size(tissue_fixative) = 0 THEN [na] ELSE tissue_fixative END AS tissue_fixative
          CALL {
            WITH image_modality
            UNWIND image_modality AS modality
            WITH modality
            ORDER BY modality
            RETURN reduce(s = '', i IN collect(modality) | s + i + '') AS image_modality_sort
          }
          CALL {
            WITH organ_or_tissue, na
            WITH CASE WHEN organ_or_tissue IS NULL OR size(organ_or_tissue)=0 THEN [na] ELSE organ_or_tissue END AS organ_or_tissue
            UNWIND organ_or_tissue AS organ_tissue
            WITH organ_tissue
            ORDER BY organ_tissue
            RETURN reduce(s = '', i IN collect(organ_tissue) | s + i + '') AS organ_or_tissue_sort
          }
          CALL {
            WITH tissue_fixative, na
            WITH CASE WHEN tissue_fixative IS NULL OR size(tissue_fixative)=0 THEN [na] ELSE tissue_fixative END AS tissue_fixative
            UNWIND tissue_fixative AS fixative
            WITH fixative
            ORDER BY fixative
            RETURN reduce(s = '', i IN collect(fixative) | s + i + '') AS tissue_fixative_sort
          }
          CALL {
            WITH imaging_assay_type, na
            WITH CASE WHEN imaging_assay_type IS NULL OR size(imaging_assay_type)=0 THEN [na] ELSE imaging_assay_type END AS imaging_assay_type
            UNWIND imaging_assay_type AS assay_type
            WITH assay_type
            ORDER BY assay_type
            RETURN reduce(s = '', i IN collect(assay_type) | s + i + '') AS imaging_assay_type_sort
          }
          RETURN DISTINCT 
            study_participant_id,
            organ_or_tissue,
            image_modality,
            imaging_assay_type,
            tissue_fixative,
            image_modality_sort,
            organ_or_tissue_sort,
            tissue_fixative_sort,
            imaging_assay_type_sort
        page_size: 10000
      # File Proteomic
      - name: "File Proteomic"
        # analytical_fractions
        # instrument_makes
        # aliquot_ids
        # proteomic_instrument_models
        # proteomic_design_descriptions
        query: |
          MATCH (p:participant)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f:file)-[:of_participant]->(p)
          WITH DISTINCT f, p.study_participant_id AS study_participant_id, "Not specified in data" AS na
          OPTIONAL MATCH (f)<-[:of_file]-(pr:proteomic)
          RETURN DISTINCT 
            study_participant_id,
            COLLECT(DISTINCT COALESCE(pr.analytical_fractions, na)) AS analytical_fractions,
            COLLECT(DISTINCT COALESCE(pr.instrument_make, na)) AS instrument_makes,
            COLLECT(DISTINCT COALESCE(pr.aliquot_id, na)) AS aliquot_ids,
            COLLECT(DISTINCT COALESCE(pr.proteomic_instrument_model, na)) AS proteomic_instrument_models,
            COLLECT(DISTINCT COALESCE(pr.proteomic_design_description, na)) AS proteomic_design_descriptions
        page_size: 10000
  - index_name: "dashboard_sample"
    id_field: "sample_id"
    mapping:
      keyword:
        # initial_query
        - sample_id # sample.sample_id - single value
        - sample_type # sample.sample_type - single value
        - sample_tumor_status # sample.sample_tumor_status - single value
        - analyte_type # sample.sample_type - single value
        - sample_ids # sample.sample_id - single value
        - sample_anatomic_site # sample.sample_anatomic_site - single value
        - sample_age_at_collection # sample.sample_age_at_collection - single value
        - derived_from_specimen # sample.derived_from_specimen - single value
        - biosample_accession # sample.biosample_accession - single value
        # Sample Participants
        - participant_ids # participant.participant_id - array
        - subject_ids # participant.participant_id - single value
        - subject_ids_filter # participant.participant_id - array
        - sex # participant.sex - single value
        # Study
        - studies # study.study_name - array
        - phs_accession # study.phs_accession - array
        - study_data_types # study.study_data_types - array
        - accesses # study.study_access - array
        - acl # study.acl - array
        # Files
        - files # file.file_id - array
        - experimental_strategies # file.experimental_strategy_and_data_subtypes - array
        - file_types # file.file_type - array
        - experimental_strategies_sort # derived from experimental_strategies - single value
        - file_types_sort # derived from file_types - single value
        # Samples
        - is_tumor # sample.sample_tumor_status - single value
        - sample_types # sample.sample_type - array
        # File Diagnoses
        - primary_diagnoses # diagnosis.primary_diagnosis - array
        - site # diagnosis.primary_site - array
        - primary_diagnoses_sort # derived from primary_diagnoses - single value
        - site_sort # derived from site - single value
        # File Genomic Info
        - library_strategies # genomic_info.library_strategy - array
        - library_source_materials # genomic_info.library_source_material - array
        - library_source_molecules # genomic_info.library_source_molecule - array
        - library_layouts # genomic_info.library_layout - array
        - library_selections # genomic_info.library_selection - array
        - platforms # genomic_info.platform - array
        - instrument_models # genomic_info.instrument_model - array
        - reference_genome_assemblies # genomic_info.reference_genome_assembly - array
        - library_strategies_sort # derived from library_strategies - single value
        - library_source_materials_sort # derived from library_source_materials - single value
        - library_source_molecules_sort # derived from library_source_molecules - single value
        - library_layouts_sort # derived from library_layouts - single value
        - library_selections_sort # derived from library_selections - single value
        - platforms_sort # derived from platforms - single value
        - instrument_models_sort # derived from instrument_models - single value
        - reference_genome_assemblies_sort # derived from reference_genome_assemblies - single value
        # File Imaging
        - image_modality # image.image_modality - array
        - organ_or_tissue # image.organ_or_tissue - array
        - tissue_fixative # MultiplexMicroscopy.tissue_fixative - array
        - imaging_assay_type # MultiplexMicroscopy.imaging_assay_type - array
        - image_modality_sort # derived from image_modality - single value
        - organ_or_tissue_sort # derived from organ_or_tissue - single value
        - tissue_fixative_sort # derived from tissue_fixative - single value
        - imaging_assay_type_sort # derived from imaging_assay_type - single value
        # File Proteomic
        - analytical_fractions # proteomic.analytical_fractions - array
        - instrument_makes # proteomic.instrument_make - array
        - aliquot_ids # proteomic.aliquot_id - array
        - proteomic_instrument_models # proteomic.proteomic_instrument_model - array
        - proteomic_design_descriptions # proteomic.proteomic_design_description - array
      long:
        - number_of_study_participants # calculated - single value
        - number_of_study_samples # calculated - single value
      boolean:
        - files_is_supplementary_file_filter # file.is_supplementary_file - array
        - is_supplementary_file # alias for files_is_supplementary_file_filter - for GraphQL parameter compatibility
    initial_query:
      # sample_id
      # sample_type
      # sample_tumor_status
      # analyte_type
      # sample_ids
      # sample_anatomic_site
      # sample_age_at_collection
      # derived_from_specimen
      # biosample_accession
      # is_tumor
      # sample_types
      query: |
        MATCH (samp:sample)
        WITH DISTINCT samp, "Not specified in data" AS na
        ORDER BY samp.sample_id
        RETURN DISTINCT
          samp.sample_id as sample_id,
          samp.sample_type as sample_type,
          samp.sample_tumor_status as sample_tumor_status,
          COALESCE(samp.sample_type, na) as analyte_type,
          samp.sample_id as sample_ids,
          COALESCE(samp.sample_anatomic_site, na) as sample_anatomic_site,
          samp.sample_age_at_collection as sample_age_at_collection,
          samp.derived_from_specimen as derived_from_specimen,
          samp.biosample_accession as biosample_accession,
          COALESCE(samp.sample_tumor_status, na) as is_tumor,
          [COALESCE(samp.sample_type, na)] as sample_types
        SKIP $skip LIMIT $limit
      page_size: 10000
    update_queries:
      # Sample Participants
      - name: "Sample Participants"
        # participant_ids
        # subject_ids
        # subject_ids_filter
        # sex
        query: |
          MATCH (samp:sample)
          WITH DISTINCT samp
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (samp)-[:of_participant]->(p:participant)
          WITH DISTINCT samp, p, "Not specified in data" AS na
          WITH samp, na,
            COLLECT(DISTINCT p.participant_id) AS participant_ids,
            COLLECT(DISTINCT COALESCE(p.participant_id, na)) AS subject_ids_filter,
            COLLECT(DISTINCT COALESCE(p.sex, na)) AS sex_values
          WITH samp, na, participant_ids, subject_ids_filter, sex_values,
            CASE WHEN size(participant_ids) > 0 THEN participant_ids[0] ELSE na END AS subject_ids,
            CASE WHEN size(sex_values) > 0 THEN sex_values[0] ELSE na END AS sex
          RETURN DISTINCT
            samp.sample_id AS sample_id,
            participant_ids,
            subject_ids,
            subject_ids_filter,
            sex
        page_size: 10000
      # Study
      - name: "Study"
        # studies
        # phs_accession
        # study_data_types
        # accesses
        # acl
        # number_of_study_participants
        # number_of_study_samples
        query: |
          MATCH (s:study)
          WITH s 
          SKIP $skip LIMIT $limit 
          WITH s, "Not specified in data" AS na
          CALL {
            WITH s
            OPTIONAL MATCH (s)<-[*]-(p:participant)
            WITH s, COUNT(DISTINCT p) AS number_of_study_participants
            OPTIONAL MATCH (s)<-[*]-(samp:sample)
            RETURN number_of_study_participants, count(distinct samp) AS number_of_study_samples
          }
          WITH 
            s, na, number_of_study_participants, number_of_study_samples,
            split(replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', ''), ", ") AS study_data_types,
            split(replace(replace(replace(s.acl, '[', ''), ']', ''), '"', ''), ", ") AS acl,
            COLLECT(DISTINCT COALESCE(s.study_name, na)) AS studies,
            COLLECT(DISTINCT COALESCE(s.phs_accession, na)) AS phs_accession,
            COLLECT(DISTINCT COALESCE(s.study_access, na)) AS accesses
          WITH 
            s, na, number_of_study_participants, number_of_study_samples,
            CASE WHEN study_data_types IS NULL OR size(study_data_types)=0 THEN [na] ELSE study_data_types END AS study_data_types,
            CASE WHEN acl IS NULL OR size(acl)=0 THEN [na] ELSE acl END AS acl,
            CASE WHEN studies IS NULL OR size(studies)=0 THEN [na] ELSE studies END AS studies,
            CASE WHEN phs_accession IS NULL OR size(phs_accession)=0 THEN [na] ELSE phs_accession END AS phs_accession,
            CASE WHEN accesses IS NULL OR size(accesses)=0 THEN [na] ELSE accesses END AS accesses
          OPTIONAL MATCH (s)<-[:of_study]-(:file)-[:of_participant]->(:participant)<-[:of_participant]-(samp:sample)
          WITH DISTINCT samp, s, na, number_of_study_participants, number_of_study_samples, study_data_types, acl, studies, phs_accession, accesses
          RETURN DISTINCT
            samp.sample_id AS sample_id,
            studies,
            phs_accession,
            study_data_types,
            accesses,
            acl,
            number_of_study_participants,
            number_of_study_samples
        page_size: 1
      # Files
      - name: "Files"
        # files
        # experimental_strategies
        # file_types
        # files_is_supplementary_file_filter
        # experimental_strategies_sort
        # file_types_sort
        query: |
          MATCH (samp:sample)
          WITH DISTINCT samp
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (samp)-[:of_participant]->(p:participant)
          WITH DISTINCT samp.sample_id AS sample_id, p
          OPTIONAL MATCH (p)<-[:of_participant]-(f:file)
          WITH sample_id, COLLECT(DISTINCT f) AS fs, COLLECT(DISTINCT f.file_id) AS files, "Not specified in data" AS na
          CALL {
            WITH sample_id, fs, na
            WITH sample_id, na, fs
            WITH sample_id, na, CASE WHEN fs IS NULL OR size(fs)=0 THEN [] ELSE fs END AS fs
            WITH sample_id, na, fs, size(fs) = 0 AS no_files
            UNWIND (CASE WHEN size(fs) = 0 THEN [null] ELSE fs END) AS f
            WITH 
              sample_id, f, na, no_files,
              CASE WHEN f IS NULL THEN null ELSE split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") END AS experimental_strategies
            WITH 
              sample_id, f, na, no_files,
              CASE WHEN no_files THEN [na] WHEN experimental_strategies IS NULL OR size(experimental_strategies)=0 THEN [na] ELSE experimental_strategies END AS experimental_strategies
            UNWIND experimental_strategies AS experimental_strategy
            RETURN 
              COLLECT(DISTINCT COALESCE(experimental_strategy, na)) AS experimental_strategies,
              COLLECT(DISTINCT CASE WHEN f IS NULL THEN na ELSE COALESCE(f.file_type, na) END) AS file_types,
              COLLECT(DISTINCT CASE WHEN f IS NULL THEN false ELSE COALESCE(f.is_supplementary_file, false) END) AS files_is_supplementary_file_filter
          }
          CALL {
            WITH experimental_strategies, na
            WITH CASE WHEN experimental_strategies IS NULL OR size(experimental_strategies)=0 THEN [na] ELSE experimental_strategies END AS experimental_strategies
            UNWIND experimental_strategies AS experimental_strategy
            WITH experimental_strategy
            ORDER BY experimental_strategy
            RETURN reduce(s = '', i IN collect(experimental_strategy) | s + i + '') AS experimental_strategies_sort
          }
          CALL {
            WITH file_types, na
            WITH CASE WHEN file_types IS NULL OR size(file_types)=0 THEN [na] ELSE file_types END AS file_types
            UNWIND file_types AS file_type
            WITH file_type
            ORDER BY file_type
            RETURN reduce(s = '', i IN collect(file_type) | s + i + '') AS file_types_sort
          }
          RETURN DISTINCT
            sample_id,
            files,
            experimental_strategies,
            file_types,
            files_is_supplementary_file_filter,
            files_is_supplementary_file_filter AS is_supplementary_file,
            experimental_strategies_sort,
            file_types_sort
        page_size: 10000
      # File Diagnoses
      - name: "Diagnoses"
        # primary_diagnoses
        # primary_diagnoses_sort
        # site
        # site_sort
        query: |
          MATCH (samp:sample)
          WITH DISTINCT samp
          SKIP $skip LIMIT $limit
          WITH samp, "Not specified in data" AS na
          OPTIONAL MATCH (samp)<--(diag:diagnosis)
          WITH samp.sample_id AS sample_id, na,
            COLLECT(DISTINCT COALESCE(diag.primary_diagnosis, na)) AS primary_diagnoses,
            COLLECT(DISTINCT COALESCE(diag.primary_site, na)) AS site
          WITH sample_id, na,
            CASE WHEN site IS NULL OR SIZE(site) = 0 THEN [na] ELSE site END AS site,
            CASE WHEN primary_diagnoses IS NULL OR SIZE(primary_diagnoses) = 0 THEN [na] ELSE primary_diagnoses END AS primary_diagnoses
          CALL {
            WITH primary_diagnoses, na
            WITH CASE WHEN primary_diagnoses IS NULL OR size(primary_diagnoses)=0 THEN [na] ELSE primary_diagnoses END AS primary_diagnoses
            UNWIND primary_diagnoses AS primary_diagnosis
            WITH primary_diagnosis
            ORDER BY primary_diagnosis
            RETURN reduce(s = '', i IN collect(primary_diagnosis) | s + i + '') AS primary_diagnoses_sort
          }
          CALL {
            WITH site, na
            WITH CASE WHEN site IS NULL OR size(site)=0 THEN [na] ELSE site END AS site
            UNWIND site AS site_value
            WITH site_value
            ORDER BY site_value
            RETURN reduce(s = '', i IN collect(site_value) | s + i + '') AS site_sort
          }
          RETURN DISTINCT
            sample_id,
            primary_diagnoses,
            primary_diagnoses_sort,
            site,
            site_sort
        page_size: 25000
      # File Genomic Info 
      - name: "File Genomic Info"
        # library_strategies
        # library_source_materials
        # library_source_molecules
        # library_layouts
        # library_selections
        # platforms
        # instrument_models
        # reference_genome_assemblies
        # library_strategies_sort
        # library_source_materials_sort
        # library_source_molecules_sort
        # library_layouts_sort
        # library_selections_sort
        # platforms_sort
        # instrument_models_sort
        # reference_genome_assemblies_sort
        query: |
          MATCH (samp:sample)
          WITH DISTINCT samp
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (samp)<-[:of_participant]-(p:participant)
          WITH DISTINCT samp.sample_id AS sample_id, p
          OPTIONAL MATCH (p)<-[:of_participant]-(f:file)
          WITH DISTINCT sample_id, f, "Not specified in data" AS na
          OPTIONAL MATCH (f)<-[:of_file]-(g:genomic_info)
          WITH sample_id, na,
            COLLECT(DISTINCT COALESCE(g.library_strategy, na)) AS library_strategies,
            COLLECT(DISTINCT COALESCE(g.library_source_material, na)) AS library_source_materials,
            COLLECT(DISTINCT COALESCE(g.library_source_molecule, na)) AS library_source_molecules,
            COLLECT(DISTINCT COALESCE(g.library_layout, na)) AS library_layouts,
            COLLECT(DISTINCT COALESCE(g.library_selection, na)) AS library_selections,
            COLLECT(DISTINCT COALESCE(g.platform, na)) AS platforms,
            COLLECT(DISTINCT COALESCE(g.instrument_model, na)) AS instrument_models,
            COLLECT(DISTINCT COALESCE(g.reference_genome_assembly, na)) AS reference_genome_assemblies
          CALL {
            WITH library_strategies, na
            WITH CASE WHEN library_strategies IS NULL OR size(library_strategies)=0 THEN [na] ELSE library_strategies END AS library_strategies
            UNWIND library_strategies AS library_strategy
            WITH library_strategy
            ORDER BY library_strategy
            RETURN reduce(s = '', i IN collect(library_strategy) | s + i + '') AS library_strategies_sort
          }
          CALL {
            WITH library_source_materials, na
            WITH CASE WHEN library_source_materials IS NULL OR size(library_source_materials)=0 THEN [na] ELSE library_source_materials END AS library_source_materials
            UNWIND library_source_materials AS library_source_material
            WITH library_source_material
            ORDER BY library_source_material
            RETURN reduce(s = '', i IN collect(library_source_material) | s + i + '') AS library_source_materials_sort
          }
          CALL {
            WITH library_source_molecules, na
            WITH CASE WHEN library_source_molecules IS NULL OR size(library_source_molecules)=0 THEN [na] ELSE library_source_molecules END AS library_source_molecules
            UNWIND library_source_molecules AS library_source_molecule
            WITH library_source_molecule
            ORDER BY library_source_molecule
            RETURN reduce(s = '', i IN collect(library_source_molecule) | s + i + '') AS library_source_molecules_sort
          }
          CALL {
            WITH library_layouts, na
            WITH CASE WHEN library_layouts IS NULL OR size(library_layouts)=0 THEN [na] ELSE library_layouts END AS library_layouts
            UNWIND library_layouts AS library_layout
            WITH library_layout
            ORDER BY library_layout
            RETURN reduce(s = '', i IN collect(library_layout) | s + i + '') AS library_layouts_sort
          }
          CALL {
            WITH library_selections, na
            WITH CASE WHEN library_selections IS NULL OR size(library_selections)=0 THEN [na] ELSE library_selections END AS library_selections
            UNWIND library_selections AS library_selection
            WITH library_selection
            ORDER BY library_selection
            RETURN reduce(s = '', i IN collect(library_selection) | s + i + '') AS library_selections_sort
          }
          CALL {
            WITH platforms, na
            WITH CASE WHEN platforms IS NULL OR size(platforms)=0 THEN [na] ELSE platforms END AS platforms
            UNWIND platforms AS platform
            WITH platform
            ORDER BY platform
            RETURN reduce(s = '', i IN collect(platform) | s + i + '') AS platforms_sort
          }
          CALL {
            WITH instrument_models, na
            WITH CASE WHEN instrument_models IS NULL OR size(instrument_models)=0 THEN [na] ELSE instrument_models END AS instrument_models
            UNWIND instrument_models AS instrument_model
            WITH instrument_model
            ORDER BY instrument_model
            RETURN reduce(s = '', i IN collect(instrument_model) | s + i + '') AS instrument_models_sort
          }
          CALL {
            WITH reference_genome_assemblies, na
            WITH CASE WHEN reference_genome_assemblies IS NULL OR size(reference_genome_assemblies)=0 THEN [na] ELSE reference_genome_assemblies END AS reference_genome_assemblies
            UNWIND reference_genome_assemblies AS reference_genome_assembly
            WITH reference_genome_assembly
            ORDER BY reference_genome_assembly
            RETURN reduce(s = '', i IN collect(reference_genome_assembly) | s + i + '') AS reference_genome_assemblies_sort
          }
          RETURN DISTINCT 
            sample_id,
            library_strategies,
            library_source_materials,
            library_source_molecules,
            library_layouts,
            library_selections,
            platforms,
            instrument_models,
            reference_genome_assemblies,
            library_strategies_sort,
            library_source_materials_sort,
            library_source_molecules_sort,
            library_layouts_sort,
            library_selections_sort,
            platforms_sort,
            instrument_models_sort,
            reference_genome_assemblies_sort
        page_size: 10000
      # File Imaging
      - name: "File Imaging"
        # image_modality
        # organ_or_tissue
        # tissue_fixative
        # imaging_assay_type
        # image_modality_sort
        # organ_or_tissue_sort
        # tissue_fixative_sort
        # imaging_assay_type_sort
        query: |
          MATCH (samp:sample)
          WITH DISTINCT samp
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (samp)-[:of_participant]->(p:participant)
          WITH DISTINCT samp.sample_id AS sample_id, p
          OPTIONAL MATCH (p)<-[:of_participant]-(f:file)
          WITH DISTINCT sample_id, f, "Not specified in data" AS na
          OPTIONAL MATCH (f)<-[:of_file]-(i:image)
          OPTIONAL MATCH (i)<-[:of_image]-(mm:MultiplexMicroscopy)
          WITH DISTINCT sample_id, na,
            COLLECT(DISTINCT COALESCE(i.organ_or_tissue, na)) AS organ_or_tissue,
            COLLECT(DISTINCT COALESCE(i.image_modality, na)) AS image_modality,
            COLLECT(DISTINCT COALESCE(mm.imaging_assay_type, na)) AS imaging_assay_type,
            COLLECT(DISTINCT COALESCE(mm.tissue_fixative, na)) AS tissue_fixative
          WITH sample_id, na,
            CASE WHEN size(organ_or_tissue) = 0 THEN [na] ELSE organ_or_tissue END AS organ_or_tissue,
            CASE WHEN size(image_modality) = 0 THEN [na] ELSE image_modality END AS image_modality,
            CASE WHEN size(imaging_assay_type) = 0 THEN [na] ELSE imaging_assay_type END AS imaging_assay_type,
            CASE WHEN size(tissue_fixative) = 0 THEN [na] ELSE tissue_fixative END AS tissue_fixative
          CALL {
            WITH image_modality
            UNWIND image_modality AS modality
            WITH modality
            ORDER BY modality
            RETURN reduce(s = '', i IN collect(modality) | s + i + '') AS image_modality_sort
          }
          CALL {
            WITH organ_or_tissue, na
            WITH CASE WHEN organ_or_tissue IS NULL OR size(organ_or_tissue)=0 THEN [na] ELSE organ_or_tissue END AS organ_or_tissue
            UNWIND organ_or_tissue AS organ_tissue
            WITH organ_tissue
            ORDER BY organ_tissue
            RETURN reduce(s = '', i IN collect(organ_tissue) | s + i + '') AS organ_or_tissue_sort
          }
          CALL {
            WITH tissue_fixative, na
            WITH CASE WHEN tissue_fixative IS NULL OR size(tissue_fixative)=0 THEN [na] ELSE tissue_fixative END AS tissue_fixative
            UNWIND tissue_fixative AS fixative
            WITH fixative
            ORDER BY fixative
            RETURN reduce(s = '', i IN collect(fixative) | s + i + '') AS tissue_fixative_sort
          }
          CALL {
            WITH imaging_assay_type, na
            WITH CASE WHEN imaging_assay_type IS NULL OR size(imaging_assay_type)=0 THEN [na] ELSE imaging_assay_type END AS imaging_assay_type
            UNWIND imaging_assay_type AS assay_type
            WITH assay_type
            ORDER BY assay_type
            RETURN reduce(s = '', i IN collect(assay_type) | s + i + '') AS imaging_assay_type_sort
          }
          RETURN DISTINCT 
            sample_id,
            organ_or_tissue,
            image_modality,
            imaging_assay_type,
            tissue_fixative,
            image_modality_sort,
            organ_or_tissue_sort,
            tissue_fixative_sort,
            imaging_assay_type_sort
        page_size: 10000
      # File Proteomic
      - name: "File Proteomic"
        # analytical_fractions
        # instrument_makes
        # aliquot_ids
        # proteomic_instrument_models
        # proteomic_design_descriptions
        query: |
          MATCH (samp:sample)
          WITH DISTINCT samp
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (p:participant)<-[:of_participant]-(samp)
          WITH DISTINCT samp.sample_id AS sample_id, p
          OPTIONAL MATCH (p)<-[:of_participant]-(f:file)
          WITH DISTINCT sample_id, f, "Not specified in data" AS na
          OPTIONAL MATCH (f)<-[:of_file]-(pr:proteomic)
          RETURN DISTINCT 
            sample_id,
            COLLECT(DISTINCT COALESCE(pr.analytical_fractions, na)) AS analytical_fractions,
            COLLECT(DISTINCT COALESCE(pr.instrument_make, na)) AS instrument_makes,
            COLLECT(DISTINCT COALESCE(pr.aliquot_id, na)) AS aliquot_ids,
            COLLECT(DISTINCT COALESCE(pr.proteomic_instrument_model, na)) AS proteomic_instrument_models,
            COLLECT(DISTINCT COALESCE(pr.proteomic_design_description, na)) AS proteomic_design_descriptions
        page_size: 10000
  - index_name: "samples_for_subject_id"
    id_field: "sample_id"
    mapping:
      keyword:
        # initial_query
        - sample_id # sample.sample_id - single value
        - sample_type # sample.sample_type - single value
        - sample_description # sample.sample_description - single value
        - sample_type_category # sample.sample_type_category - single value
        - sample_tumor_status # sample.sample_tumor_status - single value
        - sample_anatomic_site # sample.sample_anatomic_site - single value
        - sample_age_at_collection # sample.sample_age_at_collection - single value
        - derived_from_specimen # sample.derived_from_specimen - single value
        - biosample_accession # sample.biosample_accession - single value
        - crdc_id # sample.crdc_id - single value
        - participant_id # participant.participant_id - single value
        - subject_id # participant.participant_id - single value (for filtering)
        # Files (nested objects with file_id and file_name)
        - files.file_id # file.file_id - array
        - files.file_name # file.file_name - array
        # Relationship properties (from update queries)
        - phs_accession # study.phs_accession - single value
    initial_query:
      # sample_id
      # sample_type
      # sample_description
      # sample_type_category
      # sample_tumor_status
      # sample_anatomic_site
      # sample_age_at_collection
      # derived_from_specimen
      # biosample_accession
      # crdc_id
      # participant_id
      # subject_id
      # files
      query: |
        MATCH (samp:sample)-[:of_participant]->(:participant)
        WITH DISTINCT samp 
        SKIP $skip LIMIT $limit
        CALL {
          WITH samp
          OPTIONAL MATCH (samp)-[:of_participant]->(p:participant)
          WITH DISTINCT p
          RETURN COLLECT(DISTINCT p.participant_id) AS participant_ids
        }
        CALL {
          WITH samp
          OPTIONAL MATCH (samp)-[:of_participant]->(p:participant)
          WITH DISTINCT p
          OPTIONAL MATCH (p)<-[:of_participant]-(f:file)
          WITH DISTINCT f
          RETURN COLLECT({
            file_id: f.file_id,
            file_name: f.file_name
          }) AS files
        }
        WITH 
          samp,
          CASE WHEN size(participant_ids) > 0 THEN participant_ids ELSE [] END AS participant_ids,
          CASE WHEN size(files) > 0 THEN files ELSE [] END AS files
        RETURN DISTINCT
          samp.sample_id AS sample_id,
          samp.sample_type AS sample_type,
          samp.sample_description AS sample_description,
          samp.sample_type_category AS sample_type_category,
          samp.sample_tumor_status AS sample_tumor_status,
          samp.sample_anatomic_site AS sample_anatomic_site,
          samp.sample_age_at_collection AS sample_age_at_collection,
          samp.derived_from_specimen AS derived_from_specimen,
          samp.biosample_accession AS biosample_accession,
          samp.crdc_id AS crdc_id,
          participant_ids AS participant_id,
          participant_ids AS subject_id,
          files
      page_size: 10000
    update_queries:
      # Study (for phs_accession)
      - name: "Study"
        # phs_accession
        query: |
          MATCH (samp:sample)-[:of_participant]->(:participant)
          WITH DISTINCT samp
          SKIP $skip LIMIT $limit
          MATCH (samp)-[*]->(s:study)
          WITH DISTINCT samp.sample_id AS sample_id, s.phs_accession AS phs_accession
          RETURN DISTINCT
            sample_id,
            phs_accession
        page_size: 10000
  - index_name: "dashboard_file"
    id_field: "file_id"
    mapping:
      keyword:
        # initial_query
        - file_id # file.file_id - single value
        - file_ids # alias for file_id - for GraphQL parameter compatibility
        - file_name # file.file_name - single value
        - file_names # alias for file_name - for GraphQL parameter compatibility
        - file_type # file.file_type - single value
        - md5sum # file.md5sum - single value
        - file_url_in_cds # file.file_url_in_cds - single value
        - drs_uri # calculated - single value
        - is_supplementary_file # file.is_supplementary_file - single value
        - release_datetime # file.release_datetime - single value
        - supplementary_file_names # file.file_name - array
        - license # file.license - single value
        # Study
        - accesses # study.study_access - array
        - acl # study.acl - array
        - phs_accession # study.phs_accession - array
        - studies # study.study_name - array
        - study_data_types # study.study_data_types - array
        # Participants
        - sex # participant.sex - array
        - races # participant.race - array
        - subject_ids # participant.participant_id - array
        - study_participant_ids # participant.study_participant_id - array
        # Samples
        - sample_id # sample.sample_id - array
        - sample_ids # alias for sample_id - for GraphQL parameter compatibility
        - is_tumor # sample.sample_tumor_status - array
        - sample_types # sample.sample_type - array
        - analyte_type # sample.sample_type - array
        # Diagnoses
        - primary_diagnoses # diagnosis.primary_diagnosis - array
        - site # diagnosis.primary_site - array
        # Genomic Info
        - library_strategies # genomic_info.library_strategy - array
        - library_source_materials # genomic_info.library_source_material - array
        - library_source_molecules # genomic_info.library_source_molecule - array
        - library_layouts # genomic_info.library_layout - array
        - library_selections # genomic_info.library_selection - array
        - platforms # genomic_info.platform - array
        - instrument_models # genomic_info.instrument_model - array
        - reference_genome_assemblies # genomic_info.reference_genome_assembly - array
        # Imaging
        - image_modality # image.image_modality - array
        - organ_or_tissue # image.organ_or_tissue - array
        - tissue_fixative # MultiplexMicroscopy.tissue_fixative - array
        - imaging_assay_type # MultiplexMicroscopy.imaging_assay_type - array
        # Proteomic
        - analytical_fractions # proteomic.analytical_fractions - array
        - instrument_makes # proteomic.instrument_make - array
        - proteomic_design_descriptions # proteomic.proteomic_design_description - array
        # Experimental Strategies
        - experimental_strategies # file.experimental_strategy_and_data_subtypes - array
        - file_types # file.file_type - array
        # Sort properties
        - experimental_strategies_sort # derived from experimental_strategies - single value
        - sex_sort # derived from sex - single value
        - races_sort # derived from races - single value
        - is_tumor_sort # derived from is_tumor - single value
        - sample_types_sort # derived from sample_types - single value
        - analyte_type_sort # derived from analyte_type - single value
        - library_strategies_sort # derived from library_strategies - single value
        - library_source_materials_sort # derived from library_source_materials - single value
        - library_source_molecules_sort # derived from library_source_molecules - single value
        - library_layouts_sort # derived from library_layouts - single value
        - library_selections_sort # derived from library_selections - single value
        - platforms_sort # derived from platforms - single value
        - instrument_models_sort # derived from instrument_models - single value
        - primary_diagnoses_sort # derived from primary_diagnoses - single value
        - site_sort # derived from site - single value
        - image_modality_sort # derived from image_modality - single value
        - organ_or_tissue_sort # derived from organ_or_tissue - single value
        - tissue_fixative_sort # derived from tissue_fixative - single value
        - imaging_assay_type_sort # derived from imaging_assay_type - single value
        - supplementary_file_names_sort # derived from supplementary_file_names - single value
        # Associated Files
        - associated_file # file.file_name - single value
        - associated_drs_uri # calculated - single value
        - associated_md5sum # file.md5sum - single value
      long:
        - file_size # file.file_size - single value
        - number_of_study_participants # calculated - single value
        - number_of_study_samples # calculated - single value
    initial_query:
      # file_id
      # file_name
      # file_type
      # file_size
      # md5sum
      # file_url_in_cds
      # drs_uri
      # is_supplementary_file
      # release_datetime
      # supplementary_file_names
      # experimental_strategies
      # file_types
      # experimental_strategies_sort
      query: |
        MATCH (f:file)
        WITH DISTINCT f
        ORDER BY f.file_id
        SKIP $skip LIMIT $limit
        WITH f, "Not specified in data" AS na,
          split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") AS experimental_strategies
        WITH f, na, 
            CASE WHEN experimental_strategies IS NULL OR size(experimental_strategies)=0 THEN [na] ELSE experimental_strategies END AS experimental_strategies
        CALL {
          WITH experimental_strategies
          UNWIND experimental_strategies AS experimental_strategy
          WITH experimental_strategy
          ORDER BY experimental_strategy
          RETURN reduce(s = '', i IN collect(experimental_strategy) | s + i + '') AS experimental_strategies_sort
        }
        WITH f, na, experimental_strategies, experimental_strategies_sort,
          COALESCE(toUpper(f.file_type), na) AS file_type
        RETURN DISTINCT
          f.file_id AS file_id,
          f.file_id AS file_ids,
          f.file_name AS file_name,
          f.file_name AS file_names,
          file_type,
          f.file_size AS file_size,
          f.md5sum AS md5sum,
          f.file_url_in_cds AS file_url_in_cds,
          'drs://nci-crdc.datacommons.io/' + f.file_id AS drs_uri,
          COALESCE(f.is_supplementary_file, na) AS is_supplementary_file,
          f.release_datetime AS release_datetime,
          COALESCE(f.license, na) AS license,
          experimental_strategies AS experimental_strategies,
          [file_type] AS file_types,
          experimental_strategies_sort
      page_size: 40000
    update_queries:
      # Studies
      - name: Studies
        # accesses
        # acl
        # phs_accession
        # studies
        # study_data_types
        # number_of_study_participants
        # number_of_study_samples
        query: |
          MATCH (s:study)
          WITH s 
          SKIP $skip LIMIT $limit 
          OPTIONAL MATCH (s)<-[*]-(f:file)
          WITH DISTINCT s, COLLECT(DISTINCT f.file_id) AS file_ids, "Not specified in data" AS na
          CALL {
            WITH s
            OPTIONAL MATCH (s)<-[*]-(p:participant)
            WITH s, COUNT(DISTINCT p) AS number_of_study_participants
            OPTIONAL MATCH (s)<-[*]-(samp:sample)
            RETURN number_of_study_participants, count(distinct samp) AS number_of_study_samples
          }
          WITH 
            s, file_ids, na, number_of_study_participants, number_of_study_samples,
            split(replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', ''), ", ") AS study_data_types,
            CASE WHEN s.acl = '[]' THEN na ELSE replace(replace(replace(s.acl, '[', ''), ']', ''), '"', '') END AS acl
          WITH 
            s, file_ids, na, number_of_study_participants, number_of_study_samples,
            CASE WHEN study_data_types IS NULL OR size(study_data_types)=0 THEN [na] ELSE study_data_types END AS study_data_types,
            acl
          UNWIND file_ids AS file_id
          RETURN
            file_id,
            COLLECT(DISTINCT COALESCE(s.study_access, na)) AS accesses,
            COLLECT(DISTINCT acl) AS acl,
            COLLECT(DISTINCT COALESCE(s.phs_accession, na)) AS phs_accession,
            COLLECT(DISTINCT COALESCE(s.study_name, na)) AS studies,
            study_data_types,
            number_of_study_participants,
            number_of_study_samples
        page_size: 1
      # Participants
      - name: Participants
        # sex
        # sex_sort
        # races
        # races_sort
        # subject_ids
        # study_participant_ids
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-->(p:participant)
          WITH f.file_id AS file_id, p, "Not specified in data" AS na
          WITH file_id, na,
            COLLECT(DISTINCT COALESCE(p.sex, na)) AS sex,
            COLLECT(DISTINCT COALESCE(p.race, na)) AS races,
            COLLECT(DISTINCT COALESCE(p.participant_id, na)) AS participant_ids,
            COLLECT(DISTINCT COALESCE(p.study_participant_id, na)) AS study_participant_ids
          WITH file_id, na,
            CASE WHEN size(sex) = 0 THEN [na] ELSE sex END AS sex,
            CASE WHEN size(races) = 0 THEN [na] ELSE races END AS races,
            participant_ids,
            study_participant_ids
          CALL {
            WITH sex
            UNWIND sex AS sex_value
            WITH sex_value
            ORDER BY sex_value
            RETURN reduce(s = '', i IN collect(sex_value) | s + i + '') AS sex_sort
          }
          CALL {
            WITH races
            UNWIND races AS race_value
            WITH race_value
            ORDER BY race_value
            RETURN reduce(s = '', i IN collect(race_value) | s + i + '') AS races_sort
          }
          RETURN 
            file_id,
            sex,
            sex_sort,
            races,
            races_sort,
            participant_ids AS subject_ids,
            study_participant_ids
        page_size: 10000
      # Samples
      - name: Samples
        # is_tumor
        # is_tumor_sort
        # sample_types
        # sample_types_sort
        # analyte_type
        # analyte_type_sort
        # sample_id
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-[:of_participant]->(p:participant)
          WITH DISTINCT f.file_id AS file_id, p, "Not specified in data" AS na
          OPTIONAL MATCH (p)<-[:of_participant]-(samp:sample)
          WITH DISTINCT file_id, na,
            COLLECT(DISTINCT COALESCE(samp.sample_tumor_status, na)) AS sample_tumor_status,
            COLLECT(DISTINCT COALESCE(TRIM(LAST(split(samp.sample_type, ':'))), na)) AS sample_type,
            COLLECT(DISTINCT COALESCE(samp.sample_id, na)) AS sample_id
          WITH file_id, na, 
            CASE WHEN size(sample_tumor_status) = 0 THEN [na] ELSE sample_tumor_status END AS is_tumor,
            CASE WHEN size(sample_type) = 0 THEN [na] ELSE sample_type END AS sample_types,
            CASE WHEN size(sample_id) = 0 THEN [na] ELSE sample_id END AS sample_id
          CALL {
            WITH is_tumor
            UNWIND is_tumor AS tumor_status
            WITH tumor_status
            ORDER BY tumor_status
            RETURN reduce(s = '', i IN collect(tumor_status) | s + i + '') AS is_tumor_sort
          }
          CALL {
            WITH sample_types
            UNWIND sample_types AS sample_type_value
            WITH sample_type_value
            ORDER BY sample_type_value
            RETURN reduce(s = '', i IN collect(sample_type_value) | s + i + '') AS sample_types_sort
          }
          CALL {
            WITH sample_types
            UNWIND sample_types AS analyte_type_value
            WITH analyte_type_value
            ORDER BY analyte_type_value
            RETURN reduce(s = '', i IN collect(analyte_type_value) | s + i + '') AS analyte_type_sort
          }
          RETURN 
            file_id,
            is_tumor,
            is_tumor_sort,
            sample_types,
            sample_types_sort,
            sample_types AS analyte_type,
            analyte_type_sort,
            sample_id,
            sample_id AS sample_ids
        page_size: 50000
      # Diagnoses
      - name: Diagnoses
        # primary_diagnoses
        # primary_diagnoses_sort
        # site
        # site_sort
        query: |
          MATCH (f:file)
          WITH DISTINCT f, "Not specified in data" AS na
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-[*]->(diag:diagnosis)
          WITH f.file_id AS file_id, na, 
          COLLECT(DISTINCT COALESCE(TRIM(LAST(split(diag.primary_diagnosis, ':'))), na)) AS primary_diagnoses,
          COLLECT(DISTINCT COALESCE(diag.primary_site, na)) AS primary_sites
          WITH file_id, na, 
            CASE WHEN primary_diagnoses IS NULL OR size(primary_diagnoses)=0 THEN [na] ELSE primary_diagnoses END AS primary_diagnoses,
            CASE WHEN primary_sites IS NULL OR size(primary_sites)=0 THEN [na] ELSE primary_sites END AS site
          CALL {
            WITH primary_diagnoses
            UNWIND primary_diagnoses AS primary_diagnosis
            WITH primary_diagnosis
            ORDER BY primary_diagnosis
            RETURN reduce(s = '', i IN collect(primary_diagnosis) | s + i + '') AS primary_diagnoses_sort
          }
          CALL {
            WITH site
            UNWIND site AS site_value
            WITH site_value
            ORDER BY site_value
            RETURN reduce(s = '', i IN collect(site_value) | s + i + '') AS site_sort
          }
          RETURN DISTINCT
            file_id,
            primary_diagnoses,
            primary_diagnoses_sort,
            site,
            site_sort
        page_size: 10000
      # Genomic Info
      - name: Genomic Info
        # library_strategies
        # library_strategies_sort
        # library_source_materials
        # library_source_materials_sort
        # library_source_molecules
        # library_source_molecules_sort
        # library_layouts
        # library_layouts_sort
        # library_selections
        # library_selections_sort
        # platforms
        # platforms_sort
        # instrument_models
        # instrument_models_sort
        # reference_genome_assemblies
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)<-[:of_file]-(g:genomic_info)
          WITH f.file_id AS file_id, g, "Not specified in data" AS na
          WITH file_id, na,
            COLLECT(DISTINCT COALESCE(g.library_strategy, na)) AS library_strategies,
            COLLECT(DISTINCT COALESCE(g.library_source_material, na)) AS library_source_materials,
            COLLECT(DISTINCT COALESCE(g.library_source_molecule, na)) AS library_source_molecules,
            COLLECT(DISTINCT COALESCE(g.library_layout, na)) AS library_layouts,
            COLLECT(DISTINCT COALESCE(g.library_selection, na)) AS library_selections,
            COLLECT(DISTINCT COALESCE(g.platform, na)) AS platforms,
            COLLECT(DISTINCT COALESCE(g.instrument_model, na)) AS instrument_models,
            COLLECT(DISTINCT COALESCE(g.reference_genome_assembly, na)) AS reference_genome_assemblies
          WITH file_id, na,
            CASE WHEN size(library_strategies) = 0 THEN [na] ELSE library_strategies END AS library_strategies,
            CASE WHEN size(library_source_materials) = 0 THEN [na] ELSE library_source_materials END AS library_source_materials,
            CASE WHEN size(library_source_molecules) = 0 THEN [na] ELSE library_source_molecules END AS library_source_molecules,
            CASE WHEN size(library_layouts) = 0 THEN [na] ELSE library_layouts END AS library_layouts,
            CASE WHEN size(library_selections) = 0 THEN [na] ELSE library_selections END AS library_selections,
            CASE WHEN size(platforms) = 0 THEN [na] ELSE platforms END AS platforms,
            CASE WHEN size(instrument_models) = 0 THEN [na] ELSE instrument_models END AS instrument_models,
            CASE WHEN size(reference_genome_assemblies) = 0 THEN [na] ELSE reference_genome_assemblies END AS reference_genome_assemblies
          CALL {
            WITH library_strategies
            UNWIND library_strategies AS library_strategy
            WITH library_strategy
            ORDER BY library_strategy
            RETURN reduce(s = '', i IN collect(library_strategy) | s + i + '') AS library_strategies_sort
          }
          CALL {
            WITH library_source_materials
            UNWIND library_source_materials AS library_source_material
            WITH library_source_material
            ORDER BY library_source_material
            RETURN reduce(s = '', i IN collect(library_source_material) | s + i + '') AS library_source_materials_sort
          }
          CALL {
            WITH library_source_molecules
            UNWIND library_source_molecules AS library_source_molecule
            WITH library_source_molecule
            ORDER BY library_source_molecule
            RETURN reduce(s = '', i IN collect(library_source_molecule) | s + i + '') AS library_source_molecules_sort
          }
          CALL {
            WITH library_layouts
            UNWIND library_layouts AS library_layout
            WITH library_layout
            ORDER BY library_layout
            RETURN reduce(s = '', i IN collect(library_layout) | s + i + '') AS library_layouts_sort
          }
          CALL {
            WITH library_selections
            UNWIND library_selections AS library_selection
            WITH library_selection
            ORDER BY library_selection
            RETURN reduce(s = '', i IN collect(library_selection) | s + i + '') AS library_selections_sort
          }
          CALL {
            WITH platforms
            UNWIND platforms AS platform
            WITH platform
            ORDER BY platform
            RETURN reduce(s = '', i IN collect(platform) | s + i + '') AS platforms_sort
          }
          CALL {
            WITH instrument_models
            UNWIND instrument_models AS instrument_model
            WITH instrument_model
            ORDER BY instrument_model
            RETURN reduce(s = '', i IN collect(instrument_model) | s + i + '') AS instrument_models_sort
          }
          RETURN 
            file_id,
            library_strategies,
            library_strategies_sort,
            library_source_materials,
            library_source_materials_sort,
            library_source_molecules,
            library_source_molecules_sort,
            library_layouts,
            library_layouts_sort,
            library_selections,
            library_selections_sort,
            platforms,
            platforms_sort,
            instrument_models,
            instrument_models_sort,
            reference_genome_assemblies
        page_size: 10000
      # Imaging
      - name: Imaging
        # image_modality
        # organ_or_tissue
        # tissue_fixative
        # imaging_assay_type
        query: |
          MATCH (f:file)
          WITH DISTINCT f, "Not specified in data" AS na
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)<-[:of_file]-(i:image)
          OPTIONAL MATCH (i)<-[:of_image]-(mm:MultiplexMicroscopy)
          WITH DISTINCT f.file_id AS file_id, na,
            COLLECT(DISTINCT COALESCE(i.organ_or_tissue, na)) AS organ_or_tissue,
            COLLECT(DISTINCT COALESCE(i.image_modality, na)) AS image_modality,
            COLLECT(DISTINCT COALESCE(mm.imaging_assay_type, na)) AS imaging_assay_type,
            COLLECT(DISTINCT COALESCE(mm.tissue_fixative, na)) AS tissue_fixative
          WITH file_id, na,
            CASE WHEN size(organ_or_tissue) = 0 THEN [na] ELSE organ_or_tissue END AS organ_or_tissue,
            CASE WHEN size(image_modality) = 0 THEN [na] ELSE image_modality END AS image_modality,
            CASE WHEN size(imaging_assay_type) = 0 THEN [na] ELSE imaging_assay_type END AS imaging_assay_type,
            CASE WHEN size(tissue_fixative) = 0 THEN [na] ELSE tissue_fixative END AS tissue_fixative
          CALL {
            WITH image_modality
            UNWIND image_modality AS modality
            WITH modality
            ORDER BY modality
            RETURN reduce(s = '', i IN collect(modality) | s + i + '') AS image_modality_sort
          }
          CALL {
            WITH organ_or_tissue
            UNWIND organ_or_tissue AS organ_tissue
            WITH organ_tissue
            ORDER BY organ_tissue
            RETURN reduce(s = '', i IN collect(organ_tissue) | s + i + '') AS organ_or_tissue_sort
          }
          CALL {
            WITH tissue_fixative
            UNWIND tissue_fixative AS fixative
            WITH fixative
            ORDER BY fixative
            RETURN reduce(s = '', i IN collect(fixative) | s + i + '') AS tissue_fixative_sort
          }
          CALL {
            WITH imaging_assay_type
            UNWIND imaging_assay_type AS assay_type
            WITH assay_type
            ORDER BY assay_type
            RETURN reduce(s = '', i IN collect(assay_type) | s + i + '') AS imaging_assay_type_sort
          }
          RETURN DISTINCT 
            file_id,
            organ_or_tissue,
            organ_or_tissue_sort,
            image_modality,
            image_modality_sort,
            imaging_assay_type,
            imaging_assay_type_sort,
            tissue_fixative,
            tissue_fixative_sort 
        page_size: 10000
      # Proteomic
      - name: Proteomic
        # analytical_fractions
        # instrument_makes
        # proteomic_design_descriptions
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)<-[:of_file]-(pr:proteomic)
          WITH f.file_id AS file_id, pr, "Not specified in data" AS na
          WITH file_id, na,
            COLLECT(DISTINCT COALESCE(pr.analytical_fractions, na)) AS analytical_fractions,
            COLLECT(DISTINCT COALESCE(pr.instrument_make, na)) AS instrument_makes,
            COLLECT(DISTINCT COALESCE(pr.proteomic_design_description, na)) AS proteomic_design_descriptions
          WITH file_id, na,
            CASE WHEN size(analytical_fractions) = 0 THEN [na] ELSE analytical_fractions END AS analytical_fractions,
            CASE WHEN size(instrument_makes) = 0 THEN [na] ELSE instrument_makes END AS instrument_makes,
            CASE WHEN size(proteomic_design_descriptions) = 0 THEN [na] ELSE proteomic_design_descriptions END AS proteomic_design_descriptions
          RETURN DISTINCT 
            file_id,
            analytical_fractions,
            instrument_makes,
            proteomic_design_descriptions
        page_size: 10000
      # Associated Files
      - name: Associated Files
        # associated_file
        # associated_drs_uri
        # associated_md5sum
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-->(af:file)
          WITH f.file_id AS file_id, af, "Not specified in data" AS na
          RETURN DISTINCT
            file_id,
            COALESCE(af.file_name, na) AS associated_file,
            CASE WHEN af.file_id IS NOT NULL THEN 'drs://nci-crdc.datacommons.io/' + af.file_id ELSE na END AS associated_drs_uri,
            COALESCE(af.md5sum, na) AS associated_md5sum
        page_size: 10000
      # Supplementary File Names
      - name: Supplementary File Names
        # supplementary_file_names
        # supplementary_file_names_sort
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-[:of_file]->(sf:file)
          WHERE sf.is_supplementary_file = true
          WITH f.file_id AS file_id, COLLECT(DISTINCT sf.file_name) AS supplementary_file_names, "Not specified in data" AS na
          WITH file_id, na,
            CASE WHEN size(supplementary_file_names) = 0 THEN [] ELSE supplementary_file_names END AS supplementary_file_names
          CALL {
            WITH supplementary_file_names
            UNWIND supplementary_file_names AS file_name
            WITH file_name
            ORDER BY file_name
            RETURN reduce(s = '', i IN collect(file_name) | s + i + '') AS supplementary_file_names_sort
          }
          RETURN DISTINCT
            file_id,
            supplementary_file_names,
            supplementary_file_names_sort
        page_size: 10000
  - index_name: "dashboard_file_experimental_strategy"
    id_field: "file_id_experimental_strategy"
    mapping:
      keyword:
        # initial_query
        - file_id_experimental_strategy # calculated - single value
        - file_id # file.file_id - single value
        - file_ids # alias for file_id - for GraphQL parameter compatibility
        - experimental_strategies # file.experimental_strategy_and_data_subtypes - single value
        # Study
        - accesses # study.study_access - array
        - acl # study.acl - array
        - phs_accession # study.phs_accession - array
        - studies # study.study_name - array
        - study_data_types # study.study_data_types - array
        # Participants
        - sex # participant.sex - array
        - subject_ids # participant.participant_id - array
        # Samples
        - sample_id # sample.sample_id - array
        - sample_ids # alias for sample_id - for GraphQL parameter compatibility
        - is_tumor # sample.sample_tumor_status - array
        - sample_types # sample.sample_type - array
        - analyte_type # sample.sample_type - array
        # Diagnoses
        - primary_diagnoses # diagnosis.primary_diagnosis - array
        - site # diagnosis.primary_site - array
        # Genomic Info
        - library_strategies # genomic_info.library_strategy - array
        - library_source_materials # genomic_info.library_source_material - array
        - library_source_molecules # genomic_info.library_source_molecule - array
        - library_layouts # genomic_info.library_layout - array
        - library_selections # genomic_info.library_selection - array
        - platforms # genomic_info.platform - array
        - instrument_models # genomic_info.instrument_model - array
        - reference_genome_assemblies # genomic_info.reference_genome_assembly - array
        # Imaging
        - image_modality # image.image_modality - array
        - organ_or_tissue # image.organ_or_tissue - array
        - tissue_fixative # MultiplexMicroscopy.tissue_fixative - array
        - imaging_assay_type # MultiplexMicroscopy.imaging_assay_type - array
        # Proteomic
        - analytical_fractions # proteomic.analytical_fractions - array
        - instrument_makes # proteomic.instrument_make - array
        - proteomic_design_descriptions # proteomic.proteomic_design_description - array
      long:
        - number_of_study_participants # calculated - single value
        - number_of_study_samples # calculated - single value
      boolean:
        - is_supplementary_file # file.is_supplementary_file - for GraphQL parameter compatibility
    initial_query:
      # file_id_experimental_strategy
      # file_id
      # experimental_strategies
      query: |
        MATCH (f:file)
        WITH DISTINCT f
        ORDER BY f.file_id
        SKIP $skip LIMIT $limit
        WITH f, "Not specified in data" AS na,
          split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") AS experimental_strategies
        WITH f, na, 
            CASE WHEN experimental_strategies IS NULL OR size(experimental_strategies)=0 THEN [na] ELSE experimental_strategies END AS experimental_strategies
        UNWIND experimental_strategies AS experimental_strategy
        RETURN DISTINCT
          f.file_id + "_" + COALESCE(experimental_strategy, na) AS file_id_experimental_strategy,
          f.file_id AS file_id,
          f.file_id AS file_ids,
          COALESCE(experimental_strategy, na) AS experimental_strategies,
