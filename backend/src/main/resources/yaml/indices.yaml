indices:
  - index_name: "dashboard_participant"
    id_field: "study_participant_id"
    mapping:
      keyword:
        # initial_query
        - study_participant_id # participant.study_participant_id - single value
        - participant_id # participant.participant_id - single value
        - race # participant.race - single value
        - sex # participant.sex - demographics_sex_filter - single value
        - ethnicity # participant.ethnicity - single value
        - subject_ids # participant.participant_id - single value
        - dbGaP_subject_id # participant.dbGaP_subject_id - single value
        # Participant Samples
        - samples # sample.sample_id - sample_ids - array
        - is_tumor # sample.sample_tumor_status - samples_sample_tumor_status_filter - array
        - sample_types # sample.sample_type - samples_sample_type_filter - array
        - is_tumor_sort # derived from is_tumor - single value
        - sample_types_sort # derived from sample_types - single value
        # Study
        - studies # study.study_name - study_study_name_filter - array
        - phs_accession # study.phs_accession - study_phs_accession_filter - array
        - study_data_types # study.study_data_types - study_study_data_type_filter - array
        - accesses # study.study_access - array
        - acl # study.acl - array
        # Files
        - files # file.file_id - array
        - experimental_strategies # file.experimental_strategy_and_data_subtypes - files_experimental_strategy_filter - array
        - file_types # file.file_type - files_file_type_filter - array
        - experimental_strategies_sort # derived from experimental_strategies - single value
        - file_types_sort # derived from file_types - single value
        # File Diagnoses
        - primary_diagnoses # diagnosis.primary_diagnosis - diagnosis_primary_diagnosis_filter - array
        - diagnosis_primary_diagnosis_filter # diagnosis.primary_diagnosis - array
        - primary_diagnoses_sort # derived from primary_diagnoses - single value
        - site # diagnosis.primary_site - array
        - site_sort # derived from site - single value
        # File Genomic Info
        - library_strategies # genomic_info.library_strategy - genomic_library_strategy_filter - array
        - library_source_materials # genomic_info.library_source_material - genomic_library_source_material_filter - array
        - library_source_molecules # genomic_info.library_source_molecule - genomic_library_source_molecule_filter - array
        - library_layouts # genomic_info.library_layout - genomic_library_layout_filter - array
        - library_selections # genomic_info.library_selection - genomic_library_selection_filter - array
        - platforms # genomic_info.platform - genomic_platform_filter - array
        - instrument_models # genomic_info.instrument_model - genomic_instrument_model_filter - array
        - reference_genome_assemblies # genomic_info.reference_genome_assembly - genomic_reference_genome_assembly_filter - array
        - library_strategies_sort # derived from library_strategies - single value
        - library_source_materials_sort # derived from library_source_materials - single value
        - library_source_molecules_sort # derived from library_source_molecules - single value
        - library_layouts_sort # derived from library_layouts - single value
        - library_selections_sort # derived from library_selections - single value
        - platforms_sort # derived from platforms - single value
        - instrument_models_sort # derived from instrument_models - single value
        - reference_genome_assemblies_sort # derived from reference_genome_assemblies - single value
        # File Imaging
        - image_modality # image.image_modality - imaging_image_modality_filter - array
        - organ_or_tissue # image.organ_or_tissue - imaging_tissue_or_organ_of_origin_filter - array
        - tissue_fixative # MultiplexMicroscopy.tissue_fixative - imaging_tissue_fixative_filter - array
        - imaging_assay_type # MultiplexMicroscopy.imaging_assay_type - imaging_imaging_assay_type_filter - array
        - image_modality_sort # derived from image_modality - single value
        - organ_or_tissue_sort # derived from organ_or_tissue - single value
        - tissue_fixative_sort # derived from tissue_fixative - single value
        - imaging_assay_type_sort # derived from imaging_assay_type - single value
        # File Proteomic
        - analytical_fractions # proteomic.analytical_fractions - proteomic_analytical_fractions_filter - array
        - instrument_makes # proteomic.instrument_make - proteomic_instrument_makes_filter - array
        - aliquot_ids # proteomic.aliquot_id - array
        - proteomic_instrument_models # proteomic.proteomic_instrument_model - array
        - proteomic_design_descriptions # proteomic.proteomic_design_description - array
        # caNanoLab Protocol
        - protocol_names # Protocol.protocol_name - protocol_names_filter - array
        - protocol_types # Protocol.protocol_type - protocol_types_filter - array
        - doi_urls # Protocol.doi_url - doi_url_filter - array
        - dois # Protocol.doi -doi_filter - array
        # caNanoLab Publication
        - publication_titles # Publication.Publication_Title - publication_titles_filter - array
        - publication_statuses # Publication.Publication_Status - publication_statuses_filter - array
        - pub_ids # Publication.DOI_or_Pub_ID - pub_ids_filter - array
        # caNanoLab Composition
        - nanomaterial_entities # Composition.Nanomaterial_Entity_Type - nanomaterial_entities_filter - array
        - functionalizing_entities # Composition.Functionalizing_Entity_Type - functionalizing_entities_filter - array
        # caNanoLab Characterization
        - characterization_types # Characterization.Characterization_Type - characterization_types_filter - array
        - characterization_names # Characterization.Characterization_Name - characterization_names_filter - array
      long:
        - number_of_study_participants # study_num_of_study_participants - single value
        - number_of_study_samples # study_num_of_study_samples - single value
      boolean:
        - files_is_supplementary_file_filter # file.is_supplementary_file - array
        - is_supplementary_file # alias for files_is_supplementary_file_filter - for GraphQL parameter compatibility
    initial_query:
      # study_participant_id
      # participant_id
      # race
      # sex
      # ethnicity
      # subject_ids
      # dbGaP_subject_id
      query: |
        MATCH (p:participant)
        WITH DISTINCT p, "Not specified in data" AS nsd
        ORDER BY p.study_participant_id
        RETURN DISTINCT
          p.study_participant_id as study_participant_id,
          COALESCE(p.participant_id, nsd) as participant_id,
          COALESCE(p.race, nsd) as race,
          COALESCE(p.sex, nsd) as sex,
          COALESCE(p.ethnicity, nsd) as ethnicity,
          COALESCE(p.participant_id, nsd) as subject_ids,
          COALESCE(p.dbGaP_subject_id, nsd) as dbGaP_subject_id
        SKIP $skip LIMIT $limit
      page_size: 5000
    update_queries:
      # Participant Samples
      - name: "Participant Samples"
        # samples
        # is_tumor
        # sample_types
        # is_tumor_sort
        # sample_types_sort
        query: |
          MATCH (p:participant)
          WITH p, "Not specified in data" AS nsd, "Not Applicable" AS na
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (p)<--(samp:sample)
          WITH p.study_participant_id AS study_participant_id, nsd, na,
            COLLECT(DISTINCT samp.sample_id) AS samples,
            COLLECT(DISTINCT CASE WHEN samp IS NULL THEN null ELSE COALESCE(samp.sample_tumor_status, nsd) END) AS is_tumor,
            COLLECT(DISTINCT CASE WHEN samp IS NULL THEN null ELSE COALESCE(samp.sample_type, nsd) END) AS sample_types
          CALL {
            WITH samples
            UNWIND samples AS sample
            WITH sample
            ORDER BY sample
            RETURN collect(sample) AS sorted_samples
          }
          CALL {
            WITH is_tumor, na
            WITH na, CASE WHEN is_tumor IS NULL OR size(is_tumor)=0 THEN [na] ELSE is_tumor END AS is_tumor
            UNWIND is_tumor AS tumor_status
            WITH tumor_status
            ORDER BY tumor_status
            WITH collect(tumor_status) AS sorted_is_tumor
            RETURN sorted_is_tumor, reduce(s = '', i IN sorted_is_tumor | s + i + '') AS is_tumor_sort
          }
          CALL {
            WITH sample_types, na
            WITH CASE WHEN sample_types IS NULL OR size(sample_types)=0 THEN [na] ELSE sample_types END AS sample_types
            UNWIND sample_types AS sample_type
            WITH sample_type
            ORDER BY sample_type
            WITH collect(sample_type) AS sorted_sample_types
            RETURN sorted_sample_types, reduce(s = '', i IN sorted_sample_types | s + i + '') AS sample_types_sort
          }
          RETURN DISTINCT
            study_participant_id,
            sorted_samples AS samples,
            sorted_is_tumor AS is_tumor,
            sorted_sample_types AS sample_types,
            is_tumor_sort,
            sample_types_sort
        page_size: 5000
      # Study
      - name: "Study"
        # studies
        # phs_accession
        # study_data_types
        # number_of_study_participants
        # number_of_study_samples
        # accesses
        # acl
        query: |
          MATCH (s:study)
          WITH s 
          SKIP $skip LIMIT $limit 
          WITH s, "Not specified in data" AS nsd, "Not Applicable" AS na
          CALL {
            WITH s
            OPTIONAL MATCH (s)<-[*]-(p:participant)
            WITH s, COUNT(DISTINCT p) AS number_of_study_participants
            OPTIONAL MATCH (s)<-[*]-(samp:sample)
            RETURN number_of_study_participants, count(distinct samp) AS number_of_study_samples
          }
          WITH 
            s, nsd, na, number_of_study_participants, number_of_study_samples,
            split(replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', ''), ", ") AS study_data_types,
            split(replace(replace(replace(s.acl, '[', ''), ']', ''), '"', ''), ", ") AS acl,
            COLLECT(DISTINCT CASE WHEN s IS NULL THEN null ELSE COALESCE(s.study_name, nsd) END) AS studies,
            COLLECT(DISTINCT CASE WHEN s IS NULL THEN null ELSE COALESCE(s.phs_accession, nsd) END) AS phs_accession,
            COLLECT(DISTINCT CASE WHEN s IS NULL THEN null ELSE COALESCE(s.study_access, nsd) END) AS accesses
          WITH 
            s, nsd, na, number_of_study_participants, number_of_study_samples,
            CASE WHEN study_data_types IS NULL OR size(study_data_types)=0 THEN [nsd] ELSE study_data_types END AS study_data_types,
            CASE WHEN acl IS NULL OR size(acl)=0 THEN [nsd] ELSE acl END AS acl,
            CASE WHEN studies IS NULL OR size(studies)=0 THEN [nsd] ELSE studies END AS studies,
            CASE WHEN phs_accession IS NULL OR size(phs_accession)=0 THEN [nsd] ELSE phs_accession END AS phs_accession,
            CASE WHEN accesses IS NULL OR size(accesses)=0 THEN [nsd] ELSE accesses END AS accesses
          OPTIONAL MATCH (s)<-[:of_study]-(p:participant)
          WITH DISTINCT p, s, nsd, na, number_of_study_participants, number_of_study_samples, study_data_types, acl, studies, phs_accession, accesses
          CALL {
            WITH studies
            UNWIND studies AS study
            WITH study
            ORDER BY study
            RETURN collect(study) AS sorted_studies
          }
          CALL {
            WITH phs_accession
            UNWIND phs_accession AS phs
            WITH phs
            ORDER BY phs
            RETURN collect(phs) AS sorted_phs_accession
          }
          RETURN DISTINCT
            p.study_participant_id AS study_participant_id,
            sorted_studies AS studies,
            sorted_phs_accession AS phs_accession,
            accesses,
            study_data_types,
            acl,
            number_of_study_participants,
            number_of_study_samples
        page_size: 1
      # Files
      - name: "Files"
        # files
        # experimental_strategies
        # file_types
        # files_is_supplementary_file_filter
        # experimental_strategies_sort
        # file_types_sort
        query: |
          MATCH (p:participant)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f:file)-->(p)
          WITH 
            p.study_participant_id AS study_participant_id, 
            COLLECT(DISTINCT f) AS fs, 
            COLLECT(DISTINCT f.file_id) AS files, 
            "Not specified in data" AS nsd, 
            "Not Applicable" AS na
          CALL {
            WITH files
            UNWIND files AS file
            WITH file
            ORDER BY file
            RETURN collect(file) AS sorted_files
          }
          CALL {
            WITH study_participant_id, fs, nsd, na
            WITH study_participant_id, nsd, na, CASE WHEN fs IS NULL OR size(fs)=0 THEN [] ELSE fs END AS fs
            WITH study_participant_id, nsd, na, fs, size(fs) = 0 AS no_files
            UNWIND (CASE WHEN size(fs) = 0 THEN [null] ELSE fs END) AS f
            WITH 
              study_participant_id, f, nsd, na, no_files,
              CASE WHEN f IS NULL THEN null ELSE split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") END AS experimental_strategies
            WITH 
              study_participant_id, f, nsd, na, no_files,
              CASE WHEN no_files THEN [na] WHEN experimental_strategies IS NULL OR size(experimental_strategies)=0 THEN [nsd] ELSE experimental_strategies END AS experimental_strategies
            UNWIND experimental_strategies AS experimental_strategy
            RETURN 
              COLLECT(DISTINCT COALESCE(experimental_strategy, nsd)) AS experimental_strategies,
              COLLECT(DISTINCT CASE WHEN f IS NULL THEN na ELSE COALESCE(f.file_type, nsd) END) AS file_types,
              COLLECT(DISTINCT CASE WHEN f IS NULL THEN false ELSE COALESCE(f.is_supplementary_file, false) END) AS files_is_supplementary_file_filter
          }
          CALL {
            WITH experimental_strategies, nsd, na
            WITH nsd, na, CASE WHEN experimental_strategies IS NULL OR size(experimental_strategies)=0 THEN [na] ELSE experimental_strategies END AS experimental_strategies
            UNWIND experimental_strategies AS experimental_strategy
            WITH experimental_strategy
            ORDER BY experimental_strategy
            WITH collect(experimental_strategy) AS sorted_experimental_strategies
            RETURN sorted_experimental_strategies, reduce(s = '', i IN sorted_experimental_strategies | s + i + '') AS experimental_strategies_sort
          }
          CALL {
            WITH file_types, nsd, na
            WITH CASE WHEN file_types IS NULL OR size(file_types)=0 THEN [na] ELSE file_types END AS file_types
            UNWIND file_types AS file_type
            WITH file_type
            ORDER BY file_type
            WITH collect(file_type) AS sorted_file_types
            RETURN sorted_file_types, reduce(s = '', i IN sorted_file_types | s + i + '') AS file_types_sort
          }
          RETURN DISTINCT
            sorted_files AS files,
            study_participant_id,
            sorted_experimental_strategies AS experimental_strategies,
            sorted_file_types AS file_types,
            files_is_supplementary_file_filter,
            files_is_supplementary_file_filter AS is_supplementary_file,
            experimental_strategies_sort,
            file_types_sort
        page_size: 5000
      # File Diagnoses
      - name: "File Diagnoses"
        # primary_diagnoses
        # primary_diagnoses_sort
        # site
        # site_sort
        query: |
          MATCH (p:participant)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f:file)-->(p)
          WITH DISTINCT f, p.study_participant_id AS study_participant_id, "Not specified in data" AS nsd, "Not Applicable" AS na
          OPTIONAL MATCH (f)-->(p:participant)<--(diag:diagnosis)
          WITH DISTINCT study_participant_id, nsd, na,
            COLLECT(DISTINCT CASE WHEN diag IS NULL THEN null ELSE COALESCE(diag.primary_diagnosis, nsd) END) AS primary_diagnoses,
            COLLECT(DISTINCT CASE WHEN diag IS NULL THEN null ELSE COALESCE(diag.primary_site, nsd) END) AS site
          WITH study_participant_id, nsd, na, 
            CASE WHEN primary_diagnoses IS NULL OR size(primary_diagnoses)=0 THEN [na] ELSE primary_diagnoses END AS primary_diagnoses,
            CASE WHEN site IS NULL OR size(site)=0 THEN [na] ELSE site END AS site
          CALL {
            WITH primary_diagnoses, na
            WITH na, CASE WHEN primary_diagnoses IS NULL OR size(primary_diagnoses)=0 THEN [na] ELSE primary_diagnoses END AS primary_diagnoses
            UNWIND primary_diagnoses AS primary_diagnosis
            WITH primary_diagnosis
            ORDER BY primary_diagnosis
            WITH collect(primary_diagnosis) AS sorted_primary_diagnoses
            RETURN sorted_primary_diagnoses, reduce(s = '', i IN sorted_primary_diagnoses | s + i + '') AS primary_diagnoses_sort
          }
          CALL {
            WITH site, na
            WITH CASE WHEN site IS NULL OR size(site)=0 THEN [na] ELSE site END AS site
            UNWIND site AS site_value
            WITH site_value
            ORDER BY site_value
            WITH collect(site_value) AS sorted_site
            RETURN sorted_site, reduce(s = '', i IN sorted_site | s + i + '') AS site_sort
          }
          RETURN DISTINCT
            study_participant_id,
            sorted_primary_diagnoses AS primary_diagnoses,
            primary_diagnoses_sort,
            sorted_site AS site,
            site_sort
        page_size: 5000
      # File Genomic Info 
      - name: "File Genomic Info"
        # library_strategies
        # library_source_materials
        # library_source_molecules
        # library_layouts
        # library_selections
        # platforms
        # instrument_models
        # reference_genome_assemblies
        # library_strategies_sort
        # library_source_materials_sort
        # library_source_molecules_sort
        # library_layouts_sort
        # library_selections_sort
        # platforms_sort
        # instrument_models_sort
        # reference_genome_assemblies_sort
        query: |
          MATCH (p:participant)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f:file)-[:of_participant]->(p)
          WITH DISTINCT f, p.study_participant_id AS study_participant_id, "Not specified in data" AS nsd, "Not Applicable" AS na
          OPTIONAL MATCH (f)<-[:of_file]-(g:genomic_info)
          WITH study_participant_id, nsd, na,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_strategy, nsd) END) AS library_strategies,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_source_material, nsd) END) AS library_source_materials,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_source_molecule, nsd) END) AS library_source_molecules,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_layout, nsd) END) AS library_layouts,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_selection, nsd) END) AS library_selections,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.platform, nsd) END) AS platforms,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.instrument_model, nsd) END) AS instrument_models,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.reference_genome_assembly, nsd) END) AS reference_genome_assemblies
          CALL {
            WITH library_strategies, na
            WITH CASE WHEN library_strategies IS NULL OR size(library_strategies)=0 THEN [na] ELSE library_strategies END AS library_strategies
            UNWIND library_strategies AS library_strategy
            WITH library_strategy
            ORDER BY library_strategy
            RETURN reduce(s = '', i IN collect(library_strategy) | s + i + '') AS library_strategies_sort
          }
          CALL {
            WITH library_source_materials, na
            WITH CASE WHEN library_source_materials IS NULL OR size(library_source_materials)=0 THEN [na] ELSE library_source_materials END AS library_source_materials
            UNWIND library_source_materials AS library_source_material
            WITH library_source_material
            ORDER BY library_source_material
            RETURN reduce(s = '', i IN collect(library_source_material) | s + i + '') AS library_source_materials_sort
          }
          CALL {
            WITH library_source_molecules, na
            WITH CASE WHEN library_source_molecules IS NULL OR size(library_source_molecules)=0 THEN [na] ELSE library_source_molecules END AS library_source_molecules
            UNWIND library_source_molecules AS library_source_molecule
            WITH library_source_molecule
            ORDER BY library_source_molecule
            RETURN reduce(s = '', i IN collect(library_source_molecule) | s + i + '') AS library_source_molecules_sort
          }
          CALL {
            WITH library_layouts, na
            WITH CASE WHEN library_layouts IS NULL OR size(library_layouts)=0 THEN [na] ELSE library_layouts END AS library_layouts
            UNWIND library_layouts AS library_layout
            WITH library_layout
            ORDER BY library_layout
            RETURN reduce(s = '', i IN collect(library_layout) | s + i + '') AS library_layouts_sort
          }
          CALL {
            WITH library_selections, na
            WITH CASE WHEN library_selections IS NULL OR size(library_selections)=0 THEN [na] ELSE library_selections END AS library_selections
            UNWIND library_selections AS library_selection
            WITH library_selection
            ORDER BY library_selection
            RETURN reduce(s = '', i IN collect(library_selection) | s + i + '') AS library_selections_sort
          }
          CALL {
            WITH platforms, na
            WITH CASE WHEN platforms IS NULL OR size(platforms)=0 THEN [na] ELSE platforms END AS platforms
            UNWIND platforms AS platform
            WITH platform
            ORDER BY platform
            RETURN reduce(s = '', i IN collect(platform) | s + i + '') AS platforms_sort
          }
          CALL {
            WITH instrument_models, na
            WITH CASE WHEN instrument_models IS NULL OR size(instrument_models)=0 THEN [na] ELSE instrument_models END AS instrument_models
            UNWIND instrument_models AS instrument_model
            WITH instrument_model
            ORDER BY instrument_model
            RETURN reduce(s = '', i IN collect(instrument_model) | s + i + '') AS instrument_models_sort
          }
          CALL {
            WITH reference_genome_assemblies, na
            WITH CASE WHEN reference_genome_assemblies IS NULL OR size(reference_genome_assemblies)=0 THEN [na] ELSE reference_genome_assemblies END AS reference_genome_assemblies
            UNWIND reference_genome_assemblies AS reference_genome_assembly
            WITH reference_genome_assembly
            ORDER BY reference_genome_assembly
            RETURN reduce(s = '', i IN collect(reference_genome_assembly) | s + i + '') AS reference_genome_assemblies_sort
          }
          RETURN DISTINCT 
            study_participant_id,
            library_strategies,
            library_source_materials,
            library_source_molecules,
            library_layouts,
            library_selections,
            platforms,
            instrument_models,
            reference_genome_assemblies,
            library_strategies_sort,
            library_source_materials_sort,
            library_source_molecules_sort,
            library_layouts_sort,
            library_selections_sort,
            platforms_sort,
            instrument_models_sort,
            reference_genome_assemblies_sort
        page_size: 5000
      # File Imaging
      - name: "File Imaging"
        # image_modality
        # organ_or_tissue
        # tissue_fixative
        # imaging_assay_type
        # image_modality_sort
        # organ_or_tissue_sort
        # tissue_fixative_sort
        # imaging_assay_type_sort
        query: |
          MATCH (p:participant)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f:file)-[:of_participant]->(p)
          WITH DISTINCT f, p.study_participant_id AS study_participant_id, "Not specified in data" AS nsd, "Not Applicable" AS na
          OPTIONAL MATCH (f)<-[:of_file]-(i:image)
          OPTIONAL MATCH (i)<-[:of_image]-(mm:MultiplexMicroscopy)
          WITH DISTINCT study_participant_id, nsd, na,
            COLLECT(DISTINCT CASE WHEN i IS NULL THEN null ELSE COALESCE(i.organ_or_tissue, nsd) END) AS organ_or_tissue,
            COLLECT(DISTINCT CASE WHEN i IS NULL THEN null ELSE COALESCE(i.image_modality, nsd) END) AS image_modality,
            COLLECT(DISTINCT CASE WHEN mm IS NULL THEN null ELSE COALESCE(mm.imaging_assay_type, nsd) END) AS imaging_assay_type,
            COLLECT(DISTINCT CASE WHEN mm IS NULL THEN null ELSE COALESCE(mm.tissue_fixative, nsd) END) AS tissue_fixative
          WITH study_participant_id, nsd, na,
            CASE WHEN size(organ_or_tissue) = 0 THEN [na] ELSE organ_or_tissue END AS organ_or_tissue,
            CASE WHEN size(image_modality) = 0 THEN [na] ELSE image_modality END AS image_modality,
            CASE WHEN size(imaging_assay_type) = 0 THEN [na] ELSE imaging_assay_type END AS imaging_assay_type,
            CASE WHEN size(tissue_fixative) = 0 THEN [na] ELSE tissue_fixative END AS tissue_fixative
          CALL {
            WITH image_modality
            UNWIND image_modality AS modality
            WITH modality
            ORDER BY modality
            RETURN reduce(s = '', i IN collect(modality) | s + i + '') AS image_modality_sort
          }
          CALL {
            WITH organ_or_tissue, na
            WITH CASE WHEN organ_or_tissue IS NULL OR size(organ_or_tissue)=0 THEN [na] ELSE organ_or_tissue END AS organ_or_tissue
            UNWIND organ_or_tissue AS organ_tissue
            WITH organ_tissue
            ORDER BY organ_tissue
            RETURN reduce(s = '', i IN collect(organ_tissue) | s + i + '') AS organ_or_tissue_sort
          }
          CALL {
            WITH tissue_fixative, na
            WITH CASE WHEN tissue_fixative IS NULL OR size(tissue_fixative)=0 THEN [na] ELSE tissue_fixative END AS tissue_fixative
            UNWIND tissue_fixative AS fixative
            WITH fixative
            ORDER BY fixative
            RETURN reduce(s = '', i IN collect(fixative) | s + i + '') AS tissue_fixative_sort
          }
          CALL {
            WITH imaging_assay_type, na
            WITH CASE WHEN imaging_assay_type IS NULL OR size(imaging_assay_type)=0 THEN [na] ELSE imaging_assay_type END AS imaging_assay_type
            UNWIND imaging_assay_type AS assay_type
            WITH assay_type
            ORDER BY assay_type
            RETURN reduce(s = '', i IN collect(assay_type) | s + i + '') AS imaging_assay_type_sort
          }
          RETURN DISTINCT 
            study_participant_id,
            organ_or_tissue,
            image_modality,
            imaging_assay_type,
            tissue_fixative,
            image_modality_sort,
            organ_or_tissue_sort,
            tissue_fixative_sort,
            imaging_assay_type_sort
        page_size: 5000
      # File Proteomic
      - name: "File Proteomic"
        # analytical_fractions
        # instrument_makes
        # aliquot_ids
        # proteomic_instrument_models
        # proteomic_design_descriptions
        query: |
          MATCH (p:participant)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f:file)-[:of_participant]->(p)
          WITH DISTINCT f, p.study_participant_id AS study_participant_id, "Not specified in data" AS nsd, "Not Applicable" AS na
          OPTIONAL MATCH (f)<-[:of_file]-(pr:proteomic)
          WITH study_participant_id, nsd, na,
            COLLECT(DISTINCT CASE WHEN pr IS NULL THEN null ELSE COALESCE(pr.analytical_fractions, nsd) END) AS analytical_fractions_raw,
            COLLECT(DISTINCT CASE WHEN pr IS NULL THEN null ELSE COALESCE(pr.instrument_make, nsd) END) AS instrument_makes_raw,
            COLLECT(DISTINCT CASE WHEN pr IS NULL THEN null ELSE COALESCE(pr.aliquot_id, nsd) END) AS aliquot_ids_raw,
            COLLECT(DISTINCT CASE WHEN pr IS NULL THEN null ELSE COALESCE(pr.proteomic_instrument_model, nsd) END) AS proteomic_instrument_models_raw,
            COLLECT(DISTINCT CASE WHEN pr IS NULL THEN null ELSE COALESCE(pr.proteomic_design_description, nsd) END) AS proteomic_design_descriptions_raw
          RETURN DISTINCT 
            study_participant_id,
            CASE WHEN size(analytical_fractions_raw)=0 THEN [na] ELSE analytical_fractions_raw END AS analytical_fractions,
            CASE WHEN size(instrument_makes_raw)=0 THEN [na] ELSE instrument_makes_raw END AS instrument_makes,
            CASE WHEN size(aliquot_ids_raw)=0 THEN [na] ELSE aliquot_ids_raw END AS aliquot_ids,
            CASE WHEN size(proteomic_instrument_models_raw)=0 THEN [na] ELSE proteomic_instrument_models_raw END AS proteomic_instrument_models,
            CASE WHEN size(proteomic_design_descriptions_raw)=0 THEN [na] ELSE proteomic_design_descriptions_raw END AS proteomic_design_descriptions
        page_size: 5000
      # caNanoLab Protocol
      - name: "caNanoLab Protocol"
        # protocol_names
        # protocol_types
        # doi_urls
        # dois
        query: |
          MATCH (p:participant)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          WITH p, "Not specified in data" AS nsd, "Not Applicable" AS na
          OPTIONAL MATCH (p)<-[*]-(proto:Protocol)
          WITH p, nsd, na,
            COLLECT(DISTINCT CASE WHEN proto IS NULL THEN null ELSE COALESCE(proto.protocol_name, nsd) END) AS protocol_names_raw,
            COLLECT(DISTINCT CASE WHEN proto IS NULL THEN null ELSE COALESCE(proto.protocol_type, nsd) END) AS protocol_types_raw,
            COLLECT(DISTINCT CASE WHEN proto IS NULL THEN null ELSE COALESCE(proto.doi_url, nsd) END) AS doi_urls_raw,
            COLLECT(DISTINCT CASE WHEN proto IS NULL THEN null ELSE COALESCE(proto.doi, nsd) END) AS dois_raw
          RETURN DISTINCT
            p.study_participant_id AS study_participant_id,
            CASE WHEN size(protocol_names_raw)=0 THEN [na] ELSE protocol_names_raw END AS protocol_names,
            CASE WHEN size(protocol_types_raw)=0 THEN [na] ELSE protocol_types_raw END AS protocol_types,
            CASE WHEN size(doi_urls_raw)=0 THEN [na] ELSE doi_urls_raw END AS doi_urls,
            CASE WHEN size(dois_raw)=0 THEN [na] ELSE dois_raw END AS dois
        page_size: 5000
      # caNanoLab Publication
      - name: "caNanoLab Publication"
        # publication_titles
        # publication_statuses
        # pub_ids
        query: |
          MATCH (p:participant)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          WITH p, "Not specified in data" AS nsd, "Not Applicable" AS na
          OPTIONAL MATCH (p)<-[*]-(pub:Publication)
          WITH p, nsd, na,
            COLLECT(DISTINCT CASE WHEN pub IS NULL THEN null ELSE COALESCE(pub.Publication_Title, nsd) END) AS publication_titles_raw,
            COLLECT(DISTINCT CASE WHEN pub IS NULL THEN null ELSE COALESCE(pub.Publication_Status, nsd) END) AS publication_statuses_raw,
            COLLECT(DISTINCT CASE WHEN pub IS NULL THEN null ELSE COALESCE(pub.DOI_or_Pub_ID, nsd) END) AS pub_ids_raw
          RETURN DISTINCT
            p.study_participant_id AS study_participant_id,
            CASE WHEN size(publication_titles_raw)=0 THEN [na] ELSE publication_titles_raw END AS publication_titles,
            CASE WHEN size(publication_statuses_raw)=0 THEN [na] ELSE publication_statuses_raw END AS publication_statuses,
            CASE WHEN size(pub_ids_raw)=0 THEN [na] ELSE pub_ids_raw END AS pub_ids
        page_size: 5000
      # caNanoLab Composition
      - name: "caNanoLab Composition"
        # nanomaterial_entities
        # functionalizing_entities
        query: |
          MATCH (p:participant)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          WITH p, "Not specified in data" AS nsd, "Not Applicable" AS na
          OPTIONAL MATCH (p)<-[*]-(comp:Composition)
          WITH p, nsd, na,
            COLLECT(DISTINCT CASE WHEN comp IS NULL OR comp.Nanomaterial_Entity_Type = "[]" THEN null ELSE COALESCE(replace(replace(replace(comp.Nanomaterial_Entity_Type, '[', ''), ']', ''), '"', ''), nsd) END) AS nanomaterial_entities_raw,
            COLLECT(DISTINCT CASE WHEN comp IS NULL OR comp.Functionalizing_Entity_Type = "[]" THEN null ELSE COALESCE(replace(replace(replace(comp.Functionalizing_Entity_Type, '[', ''), ']', ''), '"', ''), nsd) END) AS functionalizing_entities_raw
          RETURN DISTINCT
            p.study_participant_id AS study_participant_id,
            CASE WHEN size(nanomaterial_entities_raw)=0 THEN [na] ELSE nanomaterial_entities_raw END AS nanomaterial_entities,
            CASE WHEN size(functionalizing_entities_raw)=0 THEN [na] ELSE functionalizing_entities_raw END AS functionalizing_entities
        page_size: 5000
      # caNanoLab Characterization
      - name: "caNanoLab Characterization"
        # characterization_types
        # characterization_names
        query: |
          MATCH (p:participant)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          WITH p, "Not specified in data" AS nsd, "Not Applicable" AS na
          OPTIONAL MATCH (p)<-[*]-(char:Characterization)
          WITH p, nsd, na,
            COLLECT(DISTINCT CASE WHEN char IS NULL OR char.Characterization_Type = "[]" THEN null ELSE COALESCE(replace(replace(replace(char.Characterization_Type, '[', ''), ']', ''), '"', ''), nsd) END) AS characterization_types_raw,
            COLLECT(DISTINCT CASE WHEN char IS NULL OR char.Characterization_Name = "[]" THEN null ELSE COALESCE(replace(replace(replace(char.Characterization_Name, '[', ''), ']', ''), '"', ''), nsd) END) AS characterization_names_raw
          RETURN DISTINCT
            p.study_participant_id AS study_participant_id,
            CASE WHEN size(characterization_types_raw)=0 THEN [na] ELSE characterization_types_raw END AS characterization_types,
            CASE WHEN size(characterization_names_raw)=0 THEN [na] ELSE characterization_names_raw END AS characterization_names
        page_size: 5000
  - index_name: "dashboard_sample"
    id_field: "sample_id"
    mapping:
      keyword:
        # initial_query
        - sample_id # sample.sample_id - single value
        - sample_name # sample.sample_name - single value
        - sample_type # sample.sample_type - single value
        - sample_tumor_status # sample.sample_tumor_status - single value
        - analyte_type # sample.sample_type - single value
        - sample_ids # sample.sample_id - single value
        - sample_anatomic_site # sample.sample_anatomic_site - single value
        - sample_age_at_collection # sample.sample_age_at_collection - single value
        - derived_from_specimen # sample.derived_from_specimen - single value
        - biosample_accession # sample.biosample_accession - single value
        - organization_name # sample.Organization_Name - single value
        - organization_name_sort # derived from organization_name - single value
        # Sample Participants
        - participant_ids # participant.participant_id - array
        - subject_ids # participant.participant_id - single value
        - subject_ids_filter # participant.participant_id - array
        - sex # participant.sex - single value
        # Study
        - studies # study.study_name - array
        - study_name # study.study_name - array
        - study_name_sort # derived from study_name - single value
        - study_acronym # study.study_acronym - array
        - study_acronym_sort # derived from study_acronym - single value
        - phs_accession # study.phs_accession - array
        - study_data_types # study.study_data_types - array
        - accesses # study.study_access - array
        - acl # study.acl - array
        # Files
        - files # file.file_id - array
        - experimental_strategies # file.experimental_strategy_and_data_subtypes - array
        - file_types # file.file_type - array
        - experimental_strategies_sort # derived from experimental_strategies - single value
        - file_types_sort # derived from file_types - single value
        # Samples
        - is_tumor # sample.sample_tumor_status - single value
        - sample_types # sample.sample_type - array
        # File Diagnoses
        - primary_diagnoses # diagnosis.primary_diagnosis - array
        - site # diagnosis.primary_site - array
        - primary_diagnoses_sort # derived from primary_diagnoses - single value
        - site_sort # derived from site - single value
        # File Genomic Info
        - library_strategies # genomic_info.library_strategy - array
        - library_source_materials # genomic_info.library_source_material - array
        - library_source_molecules # genomic_info.library_source_molecule - array
        - library_layouts # genomic_info.library_layout - array
        - library_selections # genomic_info.library_selection - array
        - platforms # genomic_info.platform - array
        - instrument_models # genomic_info.instrument_model - array
        - reference_genome_assemblies # genomic_info.reference_genome_assembly - array
        - library_strategies_sort # derived from library_strategies - single value
        - library_source_materials_sort # derived from library_source_materials - single value
        - library_source_molecules_sort # derived from library_source_molecules - single value
        - library_layouts_sort # derived from library_layouts - single value
        - library_selections_sort # derived from library_selections - single value
        - platforms_sort # derived from platforms - single value
        - instrument_models_sort # derived from instrument_models - single value
        - reference_genome_assemblies_sort # derived from reference_genome_assemblies - single value
        # File Imaging
        - image_modality # image.image_modality - array
        - organ_or_tissue # image.organ_or_tissue - array
        - tissue_fixative # MultiplexMicroscopy.tissue_fixative - array
        - imaging_assay_type # MultiplexMicroscopy.imaging_assay_type - array
        - image_modality_sort # derived from image_modality - single value
        - organ_or_tissue_sort # derived from organ_or_tissue - single value
        - tissue_fixative_sort # derived from tissue_fixative - single value
        - imaging_assay_type_sort # derived from imaging_assay_type - single value
        # File Proteomic
        - analytical_fractions # proteomic.analytical_fractions - array
        - instrument_makes # proteomic.instrument_make - array
        - aliquot_ids # proteomic.aliquot_id - array
        - proteomic_instrument_models # proteomic.proteomic_instrument_model - array
        - proteomic_design_descriptions # proteomic.proteomic_design_description - array
        # caNanoLab Protocol
        - protocol_names # Protocol.protocol_name - protocol_names_filter - array
        - protocol_types # Protocol.protocol_type - protocol_types_filter - array
        - doi_urls # Protocol.doi_url - doi_urls_filter - array
        - dois # Protocol.doi - dois_filter - array
        # caNanoLab Publication
        - publication_titles # Publication.Publication_Title - publication_titles_filter - array
        - publication_statuses # Publication.Publication_Status - publication_statuses_filter - array
        - pub_ids # Publication.DOI_or_Pub_ID - pub_ids_filter - array
        # caNanoLab Composition
        - nanomaterial_entities # Composition.Nanomaterial_Entity_Type - nanomaterial_entities_filter - array
        - functionalizing_entities # Composition.Functionalizing_Entity_Type - functionalizing_entities_filter - array
        # caNanoLab Characterization
        - characterization_types # Characterization.Characterization_Type - characterization_types_filter - array
        - characterization_names # Characterization.Characterization_Name - characterization_names_filter - array
      long:
        - number_of_study_participants # calculated - single value
        - number_of_study_samples # calculated - single value
      boolean:
        - files_is_supplementary_file_filter # file.is_supplementary_file - array
        - is_supplementary_file # alias for files_is_supplementary_file_filter - for GraphQL parameter compatibility
    initial_query:
      # sample_id
      # sample_type
      # sample_tumor_status
      # analyte_type
      # sample_ids
      # sample_anatomic_site
      # sample_age_at_collection
      # derived_from_specimen
      # biosample_accession
      # organization_name
      # is_tumor
      # sample_types
      # sample_name
      query: |
        MATCH (samp:sample)
        WITH DISTINCT samp, "Not specified in data" AS nsd
        ORDER BY samp.sample_id
        RETURN DISTINCT
          samp.sample_id as sample_id,
          coalesce(samp.sample_name, coalesce(samp.sample_id, nsd)) as sample_name,
          samp.sample_type as sample_type,
          samp.sample_tumor_status as sample_tumor_status,
          COALESCE(samp.sample_type, nsd) as analyte_type,
          samp.sample_id as sample_ids,
          COALESCE(samp.sample_anatomic_site, nsd) as sample_anatomic_site,
          samp.sample_age_at_collection as sample_age_at_collection,
          samp.derived_from_specimen as derived_from_specimen,
          samp.biosample_accession as biosample_accession,
          COALESCE(samp.Organization_Name, nsd) as organization_name,
          COALESCE(samp.Organization_Name, nsd) as organization_name_sort,
          COALESCE(samp.sample_tumor_status, nsd) as is_tumor,
          [COALESCE(samp.sample_type, nsd)] as sample_types
        SKIP $skip LIMIT $limit
      page_size: 5000
    update_queries:
      # Sample Participants
      - name: "Sample Participants"
        # participant_ids
        # subject_ids
        # subject_ids_filter
        # sex
        query: |
          MATCH (samp:sample)
          WITH DISTINCT samp
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (samp)-[:of_participant]->(p:participant)
          WITH DISTINCT samp, p, "Not specified in data" AS nsd, "Not Applicable" AS na
          WITH samp, nsd, na,
            COLLECT(DISTINCT p.participant_id) AS participant_ids,
            COLLECT(DISTINCT CASE WHEN p IS NULL THEN null ELSE COALESCE(p.participant_id, nsd) END) AS subject_ids_filter,
            COLLECT(DISTINCT CASE WHEN p IS NULL THEN null ELSE COALESCE(p.sex, nsd) END) AS sex_values
          WITH samp, nsd, na, participant_ids, subject_ids_filter, sex_values,
            CASE WHEN size(participant_ids) > 0 THEN participant_ids[0] ELSE na END AS subject_ids,
            CASE WHEN size(sex_values) > 0 THEN sex_values[0] ELSE na END AS sex
          RETURN DISTINCT
            samp.sample_id AS sample_id,
            participant_ids,
            subject_ids,
            subject_ids_filter,
            sex
        page_size: 5000
      # Study
      - name: "Study"
        # studies
        # study_name
        # study_acronym
        # phs_accession
        # study_data_types
        # accesses
        # acl
        # number_of_study_participants
        # number_of_study_samples
        query: |
          MATCH (s:study)
          WITH s 
          SKIP $skip LIMIT $limit 
          WITH s, "Not specified in data" AS nsd, "Not Applicable" AS na
          CALL {
            WITH s
            OPTIONAL MATCH (s)<-[*]-(p:participant)
            WITH s, COUNT(DISTINCT p) AS number_of_study_participants
            OPTIONAL MATCH (s)<-[*]-(samp:sample)
            RETURN number_of_study_participants, count(distinct samp) AS number_of_study_samples
          }
          WITH 
            s, nsd, na, number_of_study_participants, number_of_study_samples,
            split(replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', ''), ", ") AS study_data_types,
            split(replace(replace(replace(s.acl, '[', ''), ']', ''), '"', ''), ", ") AS acl,
            COLLECT(DISTINCT CASE WHEN s IS NULL THEN null ELSE COALESCE(s.study_name, nsd) END) AS studies,
            COLLECT(DISTINCT CASE WHEN s IS NULL THEN null ELSE COALESCE(s.study_name, nsd) END) AS study_name,
            COLLECT(DISTINCT CASE WHEN s IS NULL THEN null ELSE COALESCE(s.study_acronym, nsd) END) AS study_acronym,
            COLLECT(DISTINCT CASE WHEN s IS NULL THEN null ELSE COALESCE(s.phs_accession, nsd) END) AS phs_accession,
            COLLECT(DISTINCT CASE WHEN s IS NULL THEN null ELSE COALESCE(s.study_access, nsd) END) AS accesses
          WITH 
            s, nsd, na, number_of_study_participants, number_of_study_samples,
            CASE WHEN study_data_types IS NULL OR size(study_data_types)=0 THEN [nsd] ELSE study_data_types END AS study_data_types,
            CASE WHEN acl IS NULL OR size(acl)=0 THEN [nsd] ELSE acl END AS acl,
            CASE WHEN studies IS NULL OR size(studies)=0 THEN [nsd] ELSE studies END AS studies,
            CASE WHEN study_name IS NULL OR size(study_name)=0 THEN [nsd] ELSE study_name END AS study_name,
            CASE WHEN study_acronym IS NULL OR size(study_acronym)=0 THEN [nsd] ELSE study_acronym END AS study_acronym,
            CASE WHEN phs_accession IS NULL OR size(phs_accession)=0 THEN [nsd] ELSE phs_accession END AS phs_accession,
            CASE WHEN accesses IS NULL OR size(accesses)=0 THEN [nsd] ELSE accesses END AS accesses
          OPTIONAL MATCH (s)<-[*]-(samp:sample)
          WITH DISTINCT samp, s, nsd, na, number_of_study_participants, number_of_study_samples, study_data_types, acl, studies, study_name, study_acronym, phs_accession, accesses
          CALL {
            WITH study_name, nsd
            WITH CASE WHEN study_name IS NULL OR size(study_name)=0 THEN [nsd] ELSE study_name END AS study_name
            UNWIND study_name AS study_name_value
            WITH study_name_value
            ORDER BY study_name_value
            WITH collect(study_name_value) AS sorted_study_name
            RETURN sorted_study_name AS study_name_sorted, reduce(s = '', i IN sorted_study_name | s + i + '') AS study_name_sort
          }
          CALL {
            WITH study_acronym, nsd
            WITH CASE WHEN study_acronym IS NULL OR size(study_acronym)=0 THEN [nsd] ELSE study_acronym END AS study_acronym
            UNWIND study_acronym AS study_acronym_value
            WITH study_acronym_value
            ORDER BY study_acronym_value
            WITH collect(study_acronym_value) AS sorted_study_acronym
            RETURN sorted_study_acronym AS study_acronym_sorted, reduce(s = '', i IN sorted_study_acronym | s + i + '') AS study_acronym_sort
          }
          CALL {
            WITH phs_accession, nsd
            WITH CASE WHEN phs_accession IS NULL OR size(phs_accession)=0 THEN [nsd] ELSE phs_accession END AS phs_accession
            UNWIND phs_accession AS phs_accession_value
            WITH phs_accession_value
            ORDER BY phs_accession_value
            RETURN collect(phs_accession_value) AS sorted_phs_accession
          }
          RETURN DISTINCT
            samp.sample_id AS sample_id,
            studies,
            study_name_sorted AS study_name,
            study_name_sort,
            study_acronym_sorted AS study_acronym,
            study_acronym_sort,
            sorted_phs_accession AS phs_accession,
            study_data_types,
            accesses,
            acl,
            number_of_study_participants,
            number_of_study_samples
        page_size: 1
      # Files
      - name: "Files"
        # files
        # experimental_strategies
        # file_types
        # files_is_supplementary_file_filter
        # experimental_strategies_sort
        # file_types_sort
        query: |
          MATCH (samp:sample)
          WITH DISTINCT samp
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (samp)<-[*]-(f:file)
          WITH samp.sample_id AS sample_id, COLLECT(DISTINCT f) AS fs, COLLECT(DISTINCT f.file_id) AS files, "Not specified in data" AS nsd, "Not Applicable" AS na
          CALL {
            WITH files
            UNWIND files AS file
            WITH file
            ORDER BY file
            RETURN collect(file) AS sorted_files
          }
          CALL {
            WITH sample_id, fs, nsd, na
            WITH sample_id, nsd, na, fs
            WITH sample_id, nsd, na, CASE WHEN fs IS NULL OR size(fs)=0 THEN [] ELSE fs END AS fs
            WITH sample_id, nsd, na, fs, size(fs) = 0 AS no_files
            UNWIND (CASE WHEN size(fs) = 0 THEN [null] ELSE fs END) AS f
            WITH 
              sample_id, f, nsd, na, no_files,
              CASE WHEN f IS NULL THEN null ELSE split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") END AS experimental_strategies
            WITH 
              sample_id, f, nsd, na, no_files,
              CASE WHEN no_files THEN [na] WHEN experimental_strategies IS NULL OR size(experimental_strategies)=0 THEN [nsd] ELSE experimental_strategies END AS experimental_strategies
            UNWIND experimental_strategies AS experimental_strategy
            RETURN 
              COLLECT(DISTINCT COALESCE(experimental_strategy, nsd)) AS experimental_strategies,
              COLLECT(DISTINCT CASE WHEN f IS NULL THEN na ELSE COALESCE(f.file_type, nsd) END) AS file_types,
              COLLECT(DISTINCT CASE WHEN f IS NULL THEN false ELSE COALESCE(f.is_supplementary_file, false) END) AS files_is_supplementary_file_filter
          }
          CALL {
            WITH experimental_strategies, nsd, na
            WITH CASE WHEN experimental_strategies IS NULL OR size(experimental_strategies)=0 THEN [na] ELSE experimental_strategies END AS experimental_strategies
            UNWIND experimental_strategies AS experimental_strategy
            WITH experimental_strategy
            ORDER BY experimental_strategy
            WITH collect(experimental_strategy) AS sorted_experimental_strategies
            RETURN sorted_experimental_strategies, reduce(s = '', i IN sorted_experimental_strategies | s + i + '') AS experimental_strategies_sort
          }
          CALL {
            WITH file_types, nsd, na
            WITH CASE WHEN file_types IS NULL OR size(file_types)=0 THEN [na] ELSE file_types END AS file_types
            UNWIND file_types AS file_type
            WITH file_type
            ORDER BY file_type
            WITH collect(file_type) AS sorted_file_types
            RETURN sorted_file_types, reduce(s = '', i IN sorted_file_types | s + i + '') AS file_types_sort
          }
          RETURN DISTINCT
            sample_id,
            sorted_files AS files,
            sorted_experimental_strategies AS experimental_strategies,
            sorted_file_types AS file_types,
            files_is_supplementary_file_filter,
            files_is_supplementary_file_filter AS is_supplementary_file,
            experimental_strategies_sort,
            file_types_sort
        page_size: 5000
      # File Diagnoses
      - name: "Diagnoses"
        # primary_diagnoses
        # primary_diagnoses_sort
        # site
        # site_sort
        query: |
          MATCH (samp:sample)
          WITH DISTINCT samp
          SKIP $skip LIMIT $limit
          WITH samp, "Not specified in data" AS nsd, "Not Applicable" AS na
          OPTIONAL MATCH (samp)-->(p:participant)<--(diag1:diagnosis)
          OPTIONAL MATCH (diag2:diagnosis)-->(samp)
          WITH samp, [diag1, diag2] AS diag_list, nsd, na
          UNWIND diag_list AS diag
          WITH DISTINCT diag as diag, samp, nsd, na
          WITH samp.sample_id AS sample_id, nsd, na,
            COLLECT(DISTINCT CASE WHEN diag IS NULL THEN null ELSE COALESCE(diag.primary_diagnosis, nsd) END) AS primary_diagnoses,
            COLLECT(DISTINCT CASE WHEN diag IS NULL THEN null ELSE COALESCE(diag.primary_site, nsd) END) AS site
          WITH sample_id, nsd, na,
            CASE WHEN site IS NULL OR SIZE(site) = 0 THEN [na] ELSE site END AS site,
            CASE WHEN primary_diagnoses IS NULL OR SIZE(primary_diagnoses) = 0 THEN [na] ELSE primary_diagnoses END AS primary_diagnoses
          CALL {
            WITH primary_diagnoses, na
            WITH CASE WHEN primary_diagnoses IS NULL OR size(primary_diagnoses)=0 THEN [na] ELSE primary_diagnoses END AS primary_diagnoses
            UNWIND primary_diagnoses AS primary_diagnosis
            WITH primary_diagnosis
            ORDER BY primary_diagnosis
            RETURN reduce(s = '', i IN collect(primary_diagnosis) | s + i + '') AS primary_diagnoses_sort
          }
          CALL {
            WITH site, na
            WITH CASE WHEN site IS NULL OR size(site)=0 THEN [na] ELSE site END AS site
            UNWIND site AS site_value
            WITH site_value
            ORDER BY site_value
            RETURN reduce(s = '', i IN collect(site_value) | s + i + '') AS site_sort
          }
          RETURN DISTINCT
            sample_id,
            primary_diagnoses,
            primary_diagnoses_sort,
            site,
            site_sort
        page_size: 20000
      # File Genomic Info 
      - name: "File Genomic Info"
        # library_strategies
        # library_source_materials
        # library_source_molecules
        # library_layouts
        # library_selections
        # platforms
        # instrument_models
        # reference_genome_assemblies
        # library_strategies_sort
        # library_source_materials_sort
        # library_source_molecules_sort
        # library_layouts_sort
        # library_selections_sort
        # platforms_sort
        # instrument_models_sort
        # reference_genome_assemblies_sort
        query: |
          MATCH (samp:sample)
          WITH DISTINCT samp
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (samp)<-[*]-(f:file)
          WITH DISTINCT samp.sample_id AS sample_id, f, "Not specified in data" AS nsd, "Not Applicable" AS na
          OPTIONAL MATCH (f)<-[:of_file]-(g:genomic_info)
          WITH sample_id, nsd, na,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_strategy, nsd) END) AS library_strategies,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_source_material, nsd) END) AS library_source_materials,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_source_molecule, nsd) END) AS library_source_molecules,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_layout, nsd) END) AS library_layouts,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.library_selection, nsd) END) AS library_selections,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.platform, nsd) END) AS platforms,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.instrument_model, nsd) END) AS instrument_models,
            COLLECT(DISTINCT CASE WHEN g IS NULL THEN null ELSE COALESCE(g.reference_genome_assembly, nsd) END) AS reference_genome_assemblies
          CALL {
            WITH library_strategies, na
            WITH CASE WHEN library_strategies IS NULL OR size(library_strategies)=0 THEN [na] ELSE library_strategies END AS library_strategies
            UNWIND library_strategies AS library_strategy
            WITH library_strategy
            ORDER BY library_strategy
            RETURN reduce(s = '', i IN collect(library_strategy) | s + i + '') AS library_strategies_sort
          }
          CALL {
            WITH library_source_materials, na
            WITH CASE WHEN library_source_materials IS NULL OR size(library_source_materials)=0 THEN [na] ELSE library_source_materials END AS library_source_materials
            UNWIND library_source_materials AS library_source_material
            WITH library_source_material
            ORDER BY library_source_material
            RETURN reduce(s = '', i IN collect(library_source_material) | s + i + '') AS library_source_materials_sort
          }
          CALL {
            WITH library_source_molecules, na
            WITH CASE WHEN library_source_molecules IS NULL OR size(library_source_molecules)=0 THEN [na] ELSE library_source_molecules END AS library_source_molecules
            UNWIND library_source_molecules AS library_source_molecule
            WITH library_source_molecule
            ORDER BY library_source_molecule
            RETURN reduce(s = '', i IN collect(library_source_molecule) | s + i + '') AS library_source_molecules_sort
          }
          CALL {
            WITH library_layouts, na
            WITH CASE WHEN library_layouts IS NULL OR size(library_layouts)=0 THEN [na] ELSE library_layouts END AS library_layouts
            UNWIND library_layouts AS library_layout
            WITH library_layout
            ORDER BY library_layout
            RETURN reduce(s = '', i IN collect(library_layout) | s + i + '') AS library_layouts_sort
          }
          CALL {
            WITH library_selections, na
            WITH CASE WHEN library_selections IS NULL OR size(library_selections)=0 THEN [na] ELSE library_selections END AS library_selections
            UNWIND library_selections AS library_selection
            WITH library_selection
            ORDER BY library_selection
            RETURN reduce(s = '', i IN collect(library_selection) | s + i + '') AS library_selections_sort
          }
          CALL {
            WITH platforms, na
            WITH CASE WHEN platforms IS NULL OR size(platforms)=0 THEN [na] ELSE platforms END AS platforms
            UNWIND platforms AS platform
            WITH platform
            ORDER BY platform
            RETURN reduce(s = '', i IN collect(platform) | s + i + '') AS platforms_sort
          }
          CALL {
            WITH instrument_models, na
            WITH CASE WHEN instrument_models IS NULL OR size(instrument_models)=0 THEN [na] ELSE instrument_models END AS instrument_models
            UNWIND instrument_models AS instrument_model
            WITH instrument_model
            ORDER BY instrument_model
            RETURN reduce(s = '', i IN collect(instrument_model) | s + i + '') AS instrument_models_sort
          }
          CALL {
            WITH reference_genome_assemblies, na
            WITH CASE WHEN reference_genome_assemblies IS NULL OR size(reference_genome_assemblies)=0 THEN [na] ELSE reference_genome_assemblies END AS reference_genome_assemblies
            UNWIND reference_genome_assemblies AS reference_genome_assembly
            WITH reference_genome_assembly
            ORDER BY reference_genome_assembly
            RETURN reduce(s = '', i IN collect(reference_genome_assembly) | s + i + '') AS reference_genome_assemblies_sort
          }
          RETURN DISTINCT 
            sample_id,
            library_strategies,
            library_source_materials,
            library_source_molecules,
            library_layouts,
            library_selections,
            platforms,
            instrument_models,
            reference_genome_assemblies,
            library_strategies_sort,
            library_source_materials_sort,
            library_source_molecules_sort,
            library_layouts_sort,
            library_selections_sort,
            platforms_sort,
            instrument_models_sort,
            reference_genome_assemblies_sort
        page_size: 5000
      # File Imaging
      - name: "File Imaging"
        # image_modality
        # organ_or_tissue
        # tissue_fixative
        # imaging_assay_type
        # image_modality_sort
        # organ_or_tissue_sort
        # tissue_fixative_sort
        # imaging_assay_type_sort
        query: |
          MATCH (samp:sample)
          WITH DISTINCT samp
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (samp)<-[*]-(f:file)
          WITH DISTINCT samp.sample_id AS sample_id, f, "Not specified in data" AS nsd, "Not Applicable" AS na
          OPTIONAL MATCH (f)<-[:of_file]-(i:image)
          OPTIONAL MATCH (i)<-[:of_image]-(mm:MultiplexMicroscopy)
          WITH DISTINCT sample_id, nsd, na,
            COLLECT(DISTINCT CASE WHEN i IS NULL THEN null ELSE COALESCE(i.organ_or_tissue, nsd) END) AS organ_or_tissue,
            COLLECT(DISTINCT CASE WHEN i IS NULL THEN null ELSE COALESCE(i.image_modality, nsd) END) AS image_modality,
            COLLECT(DISTINCT CASE WHEN mm IS NULL THEN null ELSE COALESCE(mm.imaging_assay_type, nsd) END) AS imaging_assay_type,
            COLLECT(DISTINCT CASE WHEN mm IS NULL THEN null ELSE COALESCE(mm.tissue_fixative, nsd) END) AS tissue_fixative
          WITH sample_id, nsd, na,
            CASE WHEN size(organ_or_tissue) = 0 THEN [na] ELSE organ_or_tissue END AS organ_or_tissue,
            CASE WHEN size(image_modality) = 0 THEN [na] ELSE image_modality END AS image_modality,
            CASE WHEN size(imaging_assay_type) = 0 THEN [na] ELSE imaging_assay_type END AS imaging_assay_type,
            CASE WHEN size(tissue_fixative) = 0 THEN [na] ELSE tissue_fixative END AS tissue_fixative
          CALL {
            WITH image_modality
            UNWIND image_modality AS modality
            WITH modality
            ORDER BY modality
            WITH collect(modality) AS sorted_image_modality
            RETURN sorted_image_modality, reduce(s = '', i IN sorted_image_modality | s + i + '') AS image_modality_sort
          }
          CALL {
            WITH organ_or_tissue, na
            WITH CASE WHEN organ_or_tissue IS NULL OR size(organ_or_tissue)=0 THEN [na] ELSE organ_or_tissue END AS organ_or_tissue
            UNWIND organ_or_tissue AS organ_tissue
            WITH organ_tissue
            ORDER BY organ_tissue
            WITH collect(organ_tissue) AS sorted_organ_or_tissue
            RETURN sorted_organ_or_tissue, reduce(s = '', i IN sorted_organ_or_tissue | s + i + '') AS organ_or_tissue_sort
          }
          CALL {
            WITH tissue_fixative, na
            WITH CASE WHEN tissue_fixative IS NULL OR size(tissue_fixative)=0 THEN [na] ELSE tissue_fixative END AS tissue_fixative
            UNWIND tissue_fixative AS fixative
            WITH fixative
            ORDER BY fixative
            WITH collect(fixative) AS sorted_tissue_fixative
            RETURN sorted_tissue_fixative, reduce(s = '', i IN sorted_tissue_fixative | s + i + '') AS tissue_fixative_sort
          }
          CALL {
            WITH imaging_assay_type, na
            WITH CASE WHEN imaging_assay_type IS NULL OR size(imaging_assay_type)=0 THEN [na] ELSE imaging_assay_type END AS imaging_assay_type
            UNWIND imaging_assay_type AS assay_type
            WITH assay_type
            ORDER BY assay_type
            WITH collect(assay_type) AS sorted_imaging_assay_type
            RETURN sorted_imaging_assay_type, reduce(s = '', i IN sorted_imaging_assay_type | s + i + '') AS imaging_assay_type_sort
          }
          RETURN DISTINCT 
            sample_id,
            sorted_organ_or_tissue AS organ_or_tissue,
            sorted_image_modality AS image_modality,
            sorted_imaging_assay_type AS imaging_assay_type,
            sorted_tissue_fixative AS tissue_fixative,
            image_modality_sort,
            organ_or_tissue_sort,
            tissue_fixative_sort,
            imaging_assay_type_sort
        page_size: 5000
      # File Proteomic
      - name: "File Proteomic"
        # analytical_fractions
        # instrument_makes
        # aliquot_ids
        # proteomic_instrument_models
        # proteomic_design_descriptions
        query: |
          MATCH (samp:sample)
          WITH DISTINCT samp
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (samp)<-[*]-(f:file)
          WITH DISTINCT samp.sample_id AS sample_id, f, "Not specified in data" AS nsd, "Not Applicable" AS na
          OPTIONAL MATCH (f)<-[:of_file]-(pr:proteomic)
          WITH sample_id, nsd, na,
            COLLECT(DISTINCT CASE WHEN pr IS NULL THEN null ELSE COALESCE(pr.analytical_fractions, nsd) END) AS analytical_fractions_raw,
            COLLECT(DISTINCT CASE WHEN pr IS NULL THEN null ELSE COALESCE(pr.instrument_make, nsd) END) AS instrument_makes_raw,
            COLLECT(DISTINCT CASE WHEN pr IS NULL THEN null ELSE COALESCE(pr.aliquot_id, nsd) END) AS aliquot_ids_raw,
            COLLECT(DISTINCT CASE WHEN pr IS NULL THEN null ELSE COALESCE(pr.proteomic_instrument_model, nsd) END) AS proteomic_instrument_models_raw,
            COLLECT(DISTINCT CASE WHEN pr IS NULL THEN null ELSE COALESCE(pr.proteomic_design_description, nsd) END) AS proteomic_design_descriptions_raw
          RETURN DISTINCT 
            sample_id,
            CASE WHEN size(analytical_fractions_raw)=0 THEN [na] ELSE analytical_fractions_raw END AS analytical_fractions,
            CASE WHEN size(instrument_makes_raw)=0 THEN [na] ELSE instrument_makes_raw END AS instrument_makes,
            CASE WHEN size(aliquot_ids_raw)=0 THEN [na] ELSE aliquot_ids_raw END AS aliquot_ids,
            CASE WHEN size(proteomic_instrument_models_raw)=0 THEN [na] ELSE proteomic_instrument_models_raw END AS proteomic_instrument_models,
            CASE WHEN size(proteomic_design_descriptions_raw)=0 THEN [na] ELSE proteomic_design_descriptions_raw END AS proteomic_design_descriptions
        page_size: 5000
      # caNanoLab Protocol
      - name: "caNanoLab Protocol"
        # protocol_names
        # protocol_types
        # doi_urls
        # dois
        query: |
          MATCH (samp:sample)
          WITH DISTINCT samp
          SKIP $skip LIMIT $limit
          WITH samp, "Not specified in data" AS nsd, "Not Applicable" AS na
          OPTIONAL MATCH (samp)<-[*]-(proto:Protocol)
          WITH samp, nsd, na,
            COLLECT(DISTINCT CASE WHEN proto IS NULL THEN null ELSE COALESCE(proto.protocol_name, nsd) END) AS protocol_names_raw,
            COLLECT(DISTINCT CASE WHEN proto IS NULL THEN null ELSE COALESCE(proto.protocol_type, nsd) END) AS protocol_types_raw,
            COLLECT(DISTINCT CASE WHEN proto IS NULL THEN null ELSE COALESCE(proto.doi_url, nsd) END) AS doi_urls_raw,
            COLLECT(DISTINCT CASE WHEN proto IS NULL THEN null ELSE COALESCE(proto.doi, nsd) END) AS dois_raw
          RETURN DISTINCT
            samp.sample_id AS sample_id,
            CASE WHEN size(protocol_names_raw)=0 THEN [na] ELSE protocol_names_raw END AS protocol_names,
            CASE WHEN size(protocol_types_raw)=0 THEN [na] ELSE protocol_types_raw END AS protocol_types,
            CASE WHEN size(doi_urls_raw)=0 THEN [na] ELSE doi_urls_raw END AS doi_urls,
            CASE WHEN size(dois_raw)=0 THEN [na] ELSE dois_raw END AS dois
        page_size: 5000
      # caNanoLab Publication
      - name: "caNanoLab Publication"
        # publication_titles
        # publication_statuses
        # pub_ids
        query: |
          MATCH (samp:sample)
          WITH DISTINCT samp
          SKIP $skip LIMIT $limit
          WITH samp, "Not specified in data" AS nsd, "Not Applicable" AS na
          OPTIONAL MATCH (samp)<-[*]-(pub:Publication)
          WITH samp, nsd, na,
            COLLECT(DISTINCT CASE WHEN pub IS NULL THEN null ELSE COALESCE(pub.Publication_Title, nsd) END) AS publication_titles_raw,
            COLLECT(DISTINCT CASE WHEN pub IS NULL THEN null ELSE COALESCE(pub.Publication_Status, nsd) END) AS publication_statuses_raw,
            COLLECT(DISTINCT CASE WHEN pub IS NULL THEN null ELSE COALESCE(pub.DOI_or_Pub_ID, nsd) END) AS pub_ids_raw
          RETURN DISTINCT
            samp.sample_id AS sample_id,
            CASE WHEN size(publication_titles_raw)=0 THEN [na] ELSE publication_titles_raw END AS publication_titles,
            CASE WHEN size(publication_statuses_raw)=0 THEN [na] ELSE publication_statuses_raw END AS publication_statuses,
            CASE WHEN size(pub_ids_raw)=0 THEN [na] ELSE pub_ids_raw END AS pub_ids
        page_size: 5000
      # caNanoLab Composition
      - name: "caNanoLab Composition"
        # nanomaterial_entities
        # functionalizing_entities
        query: |
          MATCH (samp:sample)
          WITH DISTINCT samp
          SKIP $skip LIMIT $limit
          WITH samp, "Not specified in data" AS nsd, "Not Applicable" AS na
          OPTIONAL MATCH (samp)<-[*]-(comp:Composition)
          WITH samp, nsd, na,
            COLLECT(DISTINCT CASE WHEN comp IS NULL OR comp.Nanomaterial_Entity_Type = "[]" THEN null ELSE COALESCE(replace(replace(replace(comp.Nanomaterial_Entity_Type, '[', ''), ']', ''), '"', ''), nsd) END) AS nanomaterial_entities_raw,
            COLLECT(DISTINCT CASE WHEN comp IS NULL OR comp.Functionalizing_Entity_Type = "[]" THEN null ELSE COALESCE(replace(replace(replace(comp.Functionalizing_Entity_Type, '[', ''), ']', ''), '"', ''), nsd) END) AS functionalizing_entities_raw
          RETURN DISTINCT
            samp.sample_id AS sample_id,
            CASE WHEN size(nanomaterial_entities_raw)=0 THEN [na] ELSE nanomaterial_entities_raw END AS nanomaterial_entities,
            CASE WHEN size(functionalizing_entities_raw)=0 THEN [na] ELSE functionalizing_entities_raw END AS functionalizing_entities
        page_size: 5000
      # caNanoLab Characterization
      - name: "caNanoLab Characterization"
        # characterization_types
        # characterization_names
        query: |
          MATCH (samp:sample)
          WITH DISTINCT samp
          SKIP $skip LIMIT $limit
          WITH samp, "Not specified in data" AS nsd, "Not Applicable" AS na
          OPTIONAL MATCH (samp)<-[*]-(char:Characterization)
          WITH samp, nsd, na,
            COLLECT(DISTINCT CASE WHEN char IS NULL OR char.Characterization_Type = "[]" THEN null ELSE COALESCE(replace(replace(replace(char.Characterization_Type, '[', ''), ']', ''), '"', ''), nsd) END) AS characterization_types_raw,
            COLLECT(DISTINCT CASE WHEN char IS NULL OR char.Characterization_Name = "[]" THEN null ELSE COALESCE(replace(replace(replace(char.Characterization_Name, '[', ''), ']', ''), '"', ''), nsd) END) AS characterization_names_raw
          RETURN DISTINCT
            samp.sample_id AS sample_id,
            CASE WHEN size(characterization_types_raw)=0 THEN [na] ELSE characterization_types_raw END AS characterization_types,
            CASE WHEN size(characterization_names_raw)=0 THEN [na] ELSE characterization_names_raw END AS characterization_names
        page_size: 5000
  - index_name: "samples_for_subject_id"
    id_field: "sample_id"
    mapping:
      keyword:
        # initial_query
        - sample_id # sample.sample_id - single value
        - sample_type # sample.sample_type - single value
        - sample_description # sample.sample_description - single value
        - sample_type_category # sample.sample_type_category - single value
        - sample_tumor_status # sample.sample_tumor_status - single value
        - sample_anatomic_site # sample.sample_anatomic_site - single value
        - sample_age_at_collection # sample.sample_age_at_collection - single value
        - derived_from_specimen # sample.derived_from_specimen - single value
        - biosample_accession # sample.biosample_accession - single value
        - crdc_id # sample.crdc_id - single value
        - participant_id # participant.participant_id - single value
        - subject_id # participant.participant_id - single value (for filtering)
        # Files (nested objects with file_id and file_name)
        - files.file_id # file.file_id - array
        - files.file_name # file.file_name - array
        # Relationship properties (from update queries)
        - phs_accession # study.phs_accession - single value
    initial_query:
      # sample_id
      # sample_type
      # sample_description
      # sample_type_category
      # sample_tumor_status
      # sample_anatomic_site
      # sample_age_at_collection
      # derived_from_specimen
      # biosample_accession
      # crdc_id
      # participant_id
      # subject_id
      # files
      query: |
        MATCH (samp:sample)-[:of_participant]->(:participant)
        WITH DISTINCT samp 
        SKIP $skip LIMIT $limit
        CALL {
          WITH samp
          OPTIONAL MATCH (samp)-[:of_participant]->(p:participant)
          WITH DISTINCT p
          RETURN COLLECT(DISTINCT p.participant_id) AS participant_ids
        }
        CALL {
          WITH samp
          OPTIONAL MATCH (samp)-[:of_participant]->(p:participant)
          WITH DISTINCT p
          OPTIONAL MATCH (p)<-[:of_participant]-(f:file)
          WITH DISTINCT f
          RETURN COLLECT({
            file_id: f.file_id,
            file_name: f.file_name
          }) AS files
        }
        WITH 
          samp,
          CASE WHEN size(participant_ids) > 0 THEN participant_ids ELSE [] END AS participant_ids,
          CASE WHEN size(files) > 0 THEN files ELSE [] END AS files
        RETURN DISTINCT
          samp.sample_id AS sample_id,
          samp.sample_type AS sample_type,
          samp.sample_description AS sample_description,
          samp.sample_type_category AS sample_type_category,
          samp.sample_tumor_status AS sample_tumor_status,
          samp.sample_anatomic_site AS sample_anatomic_site,
          samp.sample_age_at_collection AS sample_age_at_collection,
          samp.derived_from_specimen AS derived_from_specimen,
          samp.biosample_accession AS biosample_accession,
          samp.crdc_id AS crdc_id,
          participant_ids AS participant_id,
          participant_ids AS subject_id,
          files
      page_size: 5000
    update_queries:
      # Study (for phs_accession)
      - name: "Study"
        # phs_accession
        query: |
          MATCH (samp:sample)-[:of_participant]->(:participant)
          WITH DISTINCT samp
          SKIP $skip LIMIT $limit
          MATCH (samp)-[*]->(s:study)
          WITH DISTINCT samp.sample_id AS sample_id, s.phs_accession AS phs_accession
          RETURN DISTINCT
            sample_id,
            phs_accession
        page_size: 5000
  - index_name: "dashboard_file"
    id_field: "file_id"
    mapping:
      keyword:
        # initial_query
        - file_id # file.file_id - single value
        - file_ids # alias for file_id - for GraphQL parameter compatibility
        - file_name # file.file_name - single value
        - file_names # alias for file_name - for GraphQL parameter compatibility
        - file_type # file.file_type - single value
        - md5sum # file.md5sum - single value
        - file_url_in_cds # file.file_url_in_cds - single value
        - drs_uri # calculated - single value
        - is_supplementary_file # file.is_supplementary_file - single value
        - release_datetime # file.release_datetime - single value
        - supplementary_file_names # file.file_name - array
        - license # image.license - single value
        # Study
