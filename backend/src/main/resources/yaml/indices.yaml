      # co_investigator_email
      # phs_accession
      # bioproject_accession
      # index_date
      # cds_requestor
      # funding_agency
      # funding_source_program_name
      # grant_id
      # clinical_trial_system
      # clinical_trial_identifier
      # clinical_trial_arm
      # organism_species
      # adult_or_childhood_study
      # data_types
      # data_type
      # file_types
      # data_access_level
      # cds_primary_bucket
      # cds_secondary_bucket
      # cds_tertiary_bucket
      # study_data_types
      # file_types_and_format
      # size_of_data_being_uploaded
      # size_of_data_being_uploaded_unit
      # size_of_data_being_uploaded_original
      # size_of_data_being_uploaded_original_unit
      # acl
      # study_access
      # study_version
      query: |
        MATCH (s:study)<--(:file)
        WITH DISTINCT s, "Not specified in data" AS na
        SKIP $skip LIMIT $limit
        WITH s, na, CASE WHEN s.study_data_types IS NULL OR s.study_data_types = '[]' THEN na ELSE replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', '') END AS study_data_types
        RETURN DISTINCT
          s.study_name AS study_name,
          s.study_name AS study_code,
          s.study_acronym AS study_acronym,
          s.study_description AS study_description,
          s.short_description AS short_description,
          s.study_external_url AS study_external_url,
          s.primary_investigator_name AS primary_investigator_name,
          s.primary_investigator_email AS primary_investigator_email,
          s.co_investigator_name AS co_investigator_name,
          s.co_investigator_email AS co_investigator_email,
          s.phs_accession AS phs_accession,
          s.bioproject_accession AS bioproject_accession,
          s.index_date AS index_date,
          s.cds_requestor AS cds_requestor,
          s.funding_agency AS funding_agency,
          s.funding_source_program_name AS funding_source_program_name,
          s.grant_id AS grant_id,
          s.clinical_trial_system AS clinical_trial_system,
          s.clinical_trial_identifier AS clinical_trial_identifier,
          s.clinical_trial_arm AS clinical_trial_arm,
          s.organism_species AS organism_species,
          s.adult_or_childhood_study AS adult_or_childhood_study,
          study_data_types AS data_types,
          study_data_types AS data_type,
          s.file_types AS file_types,
          s.data_access_level AS data_access_level,
          s.cds_primary_bucket AS cds_primary_bucket,
          s.cds_secondary_bucket AS cds_secondary_bucket,
          s.cds_tertiary_bucket AS cds_tertiary_bucket,
          study_data_types AS study_data_types,
          CASE WHEN s.file_types_and_format = '[]' THEN na ELSE replace(replace(replace(s.file_types_and_format, '[', ''), ']', ''), '"', '') END AS file_types_and_format,
          s.size_of_data_being_uploaded AS size_of_data_being_uploaded,
          s.size_of_data_being_uploaded_unit AS size_of_data_being_uploaded_unit,
          s.size_of_data_being_uploaded_original AS size_of_data_being_uploaded_original,
          s.size_of_data_being_uploaded_original_unit AS size_of_data_being_uploaded_original_unit,
          CASE WHEN s.acl = '[]' THEN na ELSE replace(replace(replace(s.acl, '[', ''), ']', ''), '"', '') END AS acl,
          s.study_access AS study_access,
          CASE WHEN s.study_version = '[]' THEN na ELSE replace(replace(replace(s.study_version, '[', ''), ']', ''), '"', '') END AS study_version
      page_size: 1
    update_queries:
      # Number of participants
      - name: "Number of participants"
        # number_of_participants
        # numberOfSubjects
        query: |
          MATCH (s:study)
          WITH DISTINCT s
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (s)<-[*]-(p:participant)
          WITH DISTINCT s, COUNT(DISTINCT p) AS number_of_participants
          RETURN DISTINCT s.phs_accession AS phs_accession, number_of_participants, number_of_participants AS numberOfSubjects
        page_size: 1
      # Number of samples
      - name: "Number of samples"
        # number_of_samples
        # numberOfSamples
        query: |
          MATCH (s:study)
          WITH DISTINCT s
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (s)<-[*]-(samp:sample)
          WITH DISTINCT s, COUNT(DISTINCT samp) AS number_of_samples
          RETURN DISTINCT s.phs_accession AS phs_accession, number_of_samples, number_of_samples AS numberOfSamples
        page_size: 1
      # Number of files
      - name: "Number of files"
        # number_of_files
        # numberOfFiles
        query: |
          MATCH (s:study)
          WITH DISTINCT s
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (s)<-[*]-(f:file)
          WITH DISTINCT s, COUNT(DISTINCT f) AS number_of_files
          RETURN DISTINCT s.phs_accession AS phs_accession, number_of_files, number_of_files AS numberOfFiles
        page_size: 1
      # Number of disease sites
      - name: "Number of disease sites"
        # number_of_disease_sites
        # numberOfDiseaseSites
        query: |
          MATCH (s:study)
          WITH DISTINCT s
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (s)<-[*]-(diag:diagnosis)
          WHERE diag.primary_site IS NOT NULL
          WITH DISTINCT s, COUNT(DISTINCT diag.primary_site) AS number_of_disease_sites
          RETURN DISTINCT s.phs_accession AS phs_accession, number_of_disease_sites, number_of_disease_sites AS numberOfDiseaseSites
        page_size: 1
  - index_name: "subject_detail"
    id_field: "subject_id"
    mapping:
      keyword:
        - subject_id
        - study_acronym
        - study_name
        - sex
        - site
        - files.file_id
        - files.file_name
        - files.file_type
        - files.file_description
        - files.file_size
        - files.md5sum
        - files.file_url_in_cds
        - files.experimental_strategy_and_data_subtypes
        - samples.sample_id
        - samples.sample_type
        - samples.sample_tumor_status
        - samples.sample_anatomic_site
        - samples.derived_from_specimen
        - samples.biosample_accession
      long:
        - numberOfSamples
        - numberOfDiseaseSites
        - numberOfFiles
        - samples.sample_age_at_collection
    initial_query:
      # subject_id
      # study_acronym
      # study_name
      # sex
      query: |
        MATCH (p:participant)
        WITH DISTINCT p, "Not specified in data" AS na
        SKIP $skip LIMIT $limit
        OPTIONAL MATCH (s:study)<--(p)
        RETURN DISTINCT
          p.participant_id AS subject_id,
          COALESCE(s.study_acronym, na) AS study_acronym,
          COALESCE(s.study_name, na) AS study_name,
          COALESCE(p.sex, na) AS sex
      page_size: 10000
    update_queries:
      # Samples
      - name: "Samples"
        # samples
        # numberOfSamples
        # site
        query: |
          MATCH (p:participant)
          WITH DISTINCT p, "Not specified in data" AS na
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (p)<-[:of_participant]-(samp:samplex)
          WITH p, na, COLLECT(DISTINCT {
            sample_id: samp.sample_id,
            sample_type: samp.sample_type,
            sample_tumor_status: samp.sample_tumor_status,
            sample_anatomic_site: samp.sample_anatomic_site,
            sample_age_at_collection: samp.sample_age_at_collection,
            derived_from_specimen: samp.derived_from_specimen,
            biosample_accession: samp.biosample_accession
          }) AS samples,
          COLLECT(DISTINCT COALESCE(samp.sample_anatomic_site, na)) AS site,
          COUNT(DISTINCT samp) AS numberOfSamples
          RETURN DISTINCT
            p.participant_id AS subject_id,
            CASE WHEN numberOfSamples = 0 THEN [] ELSE samples END AS samples,
            numberOfSamples,
            site
        page_size: 10000
      # Files
      - name: "Files"
        # files
        # numberOfFiles
        query: |
          MATCH (p:participant)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (p)<-[:of_participant]-(f:file)
          WITH p, COLLECT(DISTINCT {
            file_id: f.file_id,
            file_name: f.file_name,
            file_type: f.file_type,
            file_description: f.file_description,
            file_size: f.file_size,
            md5sum: f.md5sum,
            file_url_in_cds: f.file_url_in_cds,
            experimental_strategy_and_data_subtypes: f.experimental_strategy_and_data_subtypes
          }) AS files,
          COUNT(DISTINCT f) AS numberOfFiles
          RETURN DISTINCT
            p.participant_id AS subject_id,
            CASE WHEN numberOfFiles = 0 THEN [] ELSE files END AS files,
            numberOfFiles
        page_size: 10000
      # Disease Sites
      - name: "Disease Sites"
        # numberOfDiseaseSites
        query: |
          MATCH (p:participant)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (p)<-[*]-(diag:diagnosis)
          WITH p, COUNT(DISTINCT diag.primary_site) AS numberOfDiseaseSites
          RETURN DISTINCT
            p.participant_id AS subject_id,
            numberOfDiseaseSites
        page_size: 10000
