          WITH DISTINCT s, COLLECT(DISTINCT f) AS fs, "Not specified in data" AS na
          CALL {
            WITH fs
            WITH CASE WHEN size(fs)=0 THEN [NULL] ELSE fs END AS fs
            UNWIND fs AS f
            OPTIONAL MATCH (f)-[]->(p:participant)
            WITH COLLECT(DISTINCT p) AS ps 
            CALL {
              WITH ps
              WITH CASE WHEN size(ps)=0 THEN [NULL] ELSE ps END AS ps
              UNWIND ps AS p 
              OPTIONAL MATCH (p)<-[:of_participant]-(samp:sample)
              RETURN COUNT(DISTINCT samp) AS study_num_of_study_samples
            }
            RETURN 
              SIZE(ps) AS study_num_of_study_participants,
              study_num_of_study_samples
          }
          WITH 
