          WITH f, experimental_strategy, COLLECT(DISTINCT p) AS ps, na
          CALL {
            WITH ps, na
            WITH CASE WHEN size(ps)=0 THEN [NULL] ELSE ps END AS ps, na
            UNWIND ps AS p 
            OPTIONAL MATCH (p)<-[:of_participant]-(samp:sample)
            RETURN
              COLLECT(DISTINCT COALESCE(samp.sample_tumor_status, na)) AS sample_tumor_status,
              COLLECT(DISTINCT COALESCE(TRIM(LAST(split(samp.sample_type, ':'))), na)) AS sample_type,
              COLLECT(DISTINCT COALESCE(samp.sample_id, na)) AS sample_id
          }
          WITH f, experimental_strategy, na, sample_tumor_status, sample_type, sample_id,
            CASE WHEN size(sample_tumor_status) = 0 THEN [na] ELSE sample_tumor_status END AS is_tumor,
            CASE WHEN size(sample_type) = 0 THEN [na] ELSE sample_type END AS sample_types,
            CASE WHEN size(sample_id) = 0 THEN [na] ELSE sample_id END AS sample_ids
          RETURN 
            f.file_id + "_" + COALESCE(experimental_strategy, na) AS file_id_experimental_strategy,
