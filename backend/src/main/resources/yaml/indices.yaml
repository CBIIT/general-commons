          OPTIONAL MATCH (f)<-[:of_file]-(g:genomic_info)
          WITH f, study_data_type, na,
            COLLECT(DISTINCT COALESCE(g.library_strategy, na)) AS genomic_library_strategy_filter,
            COLLECT(DISTINCT COALESCE(g.library_source_material, na)) AS genomic_library_source_material_filter,
            COLLECT(DISTINCT COALESCE(g.library_source_molecule, na)) AS genomic_library_source_molecule_filter,
            COLLECT(DISTINCT COALESCE(g.library_layout, na)) AS genomic_library_layout_filter,
            COLLECT(DISTINCT COALESCE(g.library_selection, na)) AS genomic_library_selection_filter,
            COLLECT(DISTINCT COALESCE(g.platform, na)) AS genomic_platform_filter,
            COLLECT(DISTINCT COALESCE(g.instrument_model, na)) AS genomic_instrument_model_filter,
            COLLECT(DISTINCT COALESCE(g.reference_genome_assembly, na)) AS genomic_reference_genome_assembly_filter
          WITH f, study_data_type, na,
            CASE WHEN size(genomic_library_strategy_filter) = 0 THEN [na] ELSE genomic_library_strategy_filter END AS genomic_library_strategy_filter,
            CASE WHEN size(genomic_library_source_material_filter) = 0 THEN [na] ELSE genomic_library_source_material_filter END AS genomic_library_source_material_filter,
            CASE WHEN size(genomic_library_source_molecule_filter) = 0 THEN [na] ELSE genomic_library_source_molecule_filter END AS genomic_library_source_molecule_filter,
            CASE WHEN size(genomic_library_layout_filter) = 0 THEN [na] ELSE genomic_library_layout_filter END AS genomic_library_layout_filter,
            CASE WHEN size(genomic_library_selection_filter) = 0 THEN [na] ELSE genomic_library_selection_filter END AS genomic_library_selection_filter,
            CASE WHEN size(genomic_platform_filter) = 0 THEN [na] ELSE genomic_platform_filter END AS genomic_platform_filter,
            CASE WHEN size(genomic_instrument_model_filter) = 0 THEN [na] ELSE genomic_instrument_model_filter END AS genomic_instrument_model_filter,
            CASE WHEN size(genomic_reference_genome_assembly_filter) = 0 THEN [na] ELSE genomic_reference_genome_assembly_filter END AS genomic_reference_genome_assembly_filter
          RETURN DISTINCT
            f.file_id + "_" + COALESCE(study_data_type, na) AS file_id_study_data_type,
            genomic_library_strategy_filter,
            genomic_library_source_material_filter,
            genomic_library_source_molecule_filter,
            genomic_library_layout_filter,
            genomic_library_selection_filter,
            genomic_platform_filter,
            genomic_instrument_model_filter,
            genomic_reference_genome_assembly_filter
        page_size: 10000
      # Imaging
      - name: Imaging
        # imaging_image_modality_filter
        # imaging_tissue_or_organ_of_origin_filter
        # imaging_tissue_fixative_filter
        # imaging_imaging_assay_type_filter
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-[:of_study]->(s:study)
          WITH DISTINCT s, COLLECT(DISTINCT f) AS fs, "Not specified in data" AS na,
            split(replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', ''), ", ") AS study_data_types
          WITH s, fs, na,
            CASE WHEN study_data_types IS NULL OR size(study_data_types)=0 THEN [na] ELSE study_data_types END AS study_data_types
          UNWIND study_data_types AS study_data_type
          UNWIND fs AS f
          OPTIONAL MATCH (f)<-[:of_file]-(i:image)
          OPTIONAL MATCH (i)<-[:of_image]-(mm:MultiplexMicroscopy)
          WITH DISTINCT f, study_data_type, "Not specified in data" AS na,
            COLLECT(DISTINCT COALESCE(i.organ_or_tissue, na)) AS imaging_tissue_or_organ_of_origin_filter,
            COLLECT(DISTINCT COALESCE(i.image_modality, na)) AS imaging_image_modality_filter,
            COLLECT(DISTINCT COALESCE(mm.imaging_assay_type, na)) AS imaging_imaging_assay_type_filter,
            COLLECT(DISTINCT COALESCE(mm.tissue_fixative, na)) AS imaging_tissue_fixative_filter
          WITH f, study_data_type, na,
            CASE WHEN size(imaging_tissue_or_organ_of_origin_filter) = 0 THEN [na] ELSE imaging_tissue_or_organ_of_origin_filter END AS imaging_tissue_or_organ_of_origin_filter,
            CASE WHEN size(imaging_image_modality_filter) = 0 THEN [na] ELSE imaging_image_modality_filter END AS imaging_image_modality_filter,
            CASE WHEN size(imaging_imaging_assay_type_filter) = 0 THEN [na] ELSE imaging_imaging_assay_type_filter END AS imaging_imaging_assay_type_filter,
            CASE WHEN size(imaging_tissue_fixative_filter) = 0 THEN [na] ELSE imaging_tissue_fixative_filter END AS imaging_tissue_fixative_filter
          RETURN DISTINCT 
            f.file_id + "_" + COALESCE(study_data_type, na) AS file_id_study_data_type,
            imaging_tissue_or_organ_of_origin_filter,
            imaging_image_modality_filter,
            imaging_imaging_assay_type_filter,
            imaging_tissue_fixative_filter 
        page_size: 10000
      # Proteomic
      - name: Proteomic
        # proteomic_analytical_fractions
        # proteomic_instrument_makes_filter
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-[:of_study]->(s:study)
          WITH DISTINCT s, COLLECT(DISTINCT f) AS fs, "Not specified in data" AS na,
            split(replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', ''), ", ") AS study_data_types
          WITH s, fs, na,
            CASE WHEN study_data_types IS NULL OR size(study_data_types)=0 THEN [na] ELSE study_data_types END AS study_data_types
          UNWIND study_data_types AS study_data_type
          UNWIND fs AS f
          OPTIONAL MATCH (f)<-[:of_file]-(pr:proteomic)
          WITH f, study_data_type, na,
            COLLECT(DISTINCT COALESCE(pr.analytical_fractions, na)) AS proteomic_analytical_fractions_filter,
            COLLECT(DISTINCT COALESCE(pr.instrument_make, na)) AS proteomic_instrument_makes_filter
          WITH f, study_data_type, na,
            CASE WHEN size(proteomic_analytical_fractions_filter) = 0 THEN [na] ELSE proteomic_analytical_fractions_filter END AS proteomic_analytical_fractions_filter,
            CASE WHEN size(proteomic_instrument_makes_filter) = 0 THEN [na] ELSE proteomic_instrument_makes_filter END AS proteomic_instrument_makes_filter
          RETURN DISTINCT 
            f.file_id + "_" + COALESCE(study_data_type, na) AS file_id_study_data_type,
            proteomic_analytical_fractions_filter,
            proteomic_instrument_makes_filter
        page_size: 10000
  - index_name: "dashboard_participant_ids"
    id_field: "study_participant_id"
    mapping:
      keyword:
        - study_participant_id
        - participant_id
        - phs_accession
      long:
        - number_of_study_participants # calculated - single value
        - number_of_study_samples # calculated - single value
    initial_query:
      # subject_id (participant_id)
      # phs_accession
      query: |
        MATCH (p:participant)
        OPTIONAL MATCH (p)-[:of_participant]->(s:study)
        WITH DISTINCT p, s, "Not specified in data" AS na
        ORDER BY p.participant_id
        RETURN DISTINCT
          COALESCE(p.study_participant_id, na) as study_participant_id,
          COALESCE(p.participant_id, na) as participant_id,
          COALESCE(s.phs_accession, na) as phs_accession
        SKIP $skip LIMIT $limit
      page_size: 10000
    update_queries:
      # Studies
      - name: Studies
        # study_participant_id
        # participant_id
        # phs_accession
        # number_of_study_participants
        # number_of_study_samples
        query: |
          MATCH (s:study)
          WITH s 
          SKIP $skip LIMIT $limit
          WITH s
          OPTIONAL MATCH (s)<-[*]-(p:participant)
          WITH s, COUNT(DISTINCT p) AS number_of_study_participants
          OPTIONAL MATCH (s)<-[*]-(samp:sample)
          WITH s, number_of_study_participants, count(distinct samp) AS number_of_study_samples
          MATCH (s)<-[*]-(p:participant)
          WITH DISTINCT p, s, number_of_study_participants, number_of_study_samples, "Not specified in data" AS na
          RETURN DISTINCT
            COALESCE(p.study_participant_id, na) as study_participant_id,
            COALESCE(p.participant_id, na) as participant_id,
            COALESCE(s.phs_accession, na) as phs_accession,
            number_of_study_participants,
            number_of_study_samples
        page_size: 1
  - index_name: "gs_study"
    id_field: "phs_accession"
    mapping:
      keyword:
        - phs_accession
      search_as_you_type:
        - phs_accession_gs
        - study_name_gs
        - study_code_gs
        - study_data_types_gs
    initial_query:
      # phs_accession
      # phs_accession_gs
      # study_name_gs
      # study_code_gs
      # study_data_types_gs
      query: |
        MATCH (s:study)
        WITH DISTINCT s, "Not specified in data" AS na
        ORDER BY s.phs_accession
        RETURN DISTINCT
          COALESCE(s.phs_accession, na) as phs_accession,
          s.phs_accession as phs_accession_gs,
          s.study_name as study_name_gs,
          s.study_name as study_code_gs,
          CASE WHEN s.study_data_types IS NULL OR s.study_data_types = '[]' 
            THEN na 
            ELSE replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', '') 
          END as study_data_types_gs
        SKIP $skip LIMIT $limit
      page_size: 10000
  - index_name: "gs_participant"
    id_field: "study_participant_id"
    mapping:
      keyword:
        - study_participant_id
        - subject_ids_filter
      search_as_you_type:
        - study_gs
        - subject_id_gs
        - site_gs
        - sex_gs
    initial_query:
      # study_participant_id
      # subject_id_gs
      # subject_ids_filter
      query: |
        MATCH (p:participant)
        WITH DISTINCT p, "Not specified in data" AS na
        ORDER BY p.study_participant_id
        RETURN DISTINCT
          p.study_participant_id as study_participant_id,
          COALESCE(p.participant_id, na) as subject_id_gs,
          [COALESCE(p.participant_id, na)] as subject_ids_filter
        SKIP $skip LIMIT $limit
      page_size: 10000
    update_queries:
      # Study
      - name: "Study"
        # study_gs
        query: |
          MATCH (p:participant)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (p)<-[:of_participant]-(:file)-[:of_study]-(s:study)
          WITH p.study_participant_id AS study_participant_id, COLLECT(DISTINCT s.study_name) AS study_names, "Not specified in data" AS na
          CALL {
            WITH study_names
            UNWIND study_names AS study_name
            WITH study_name
            ORDER BY study_name
            RETURN COLLECT(study_name) AS sorted_studies
          }
          WITH study_participant_id, CASE WHEN size(sorted_studies) = 0 THEN [na] ELSE sorted_studies END AS study_gs
          RETURN DISTINCT
            study_participant_id,
            study_gs
        page_size: 10000
      # Site
      - name: "Site"
        # site_gs
        query: |
          MATCH (p:participant)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (p)<-[*]-(d:diagnosis)
          WITH p.study_participant_id AS study_participant_id, COLLECT(DISTINCT d.primary_site) AS sites, "Not specified in data" AS na
          WITH study_participant_id, CASE WHEN size(sites) = 0 THEN [na] ELSE sites END AS site_gs
          RETURN DISTINCT
            study_participant_id,
            site_gs
        page_size: 10000
      # Sex
      - name: "Sex"
        # sex_gs
        query: |
          MATCH (p:participant)
          WITH DISTINCT p
          SKIP $skip LIMIT $limit
          WITH p.study_participant_id AS study_participant_id, COALESCE(p.sex, "Not specified in data") AS sex_gs
          RETURN DISTINCT
            study_participant_id,
            sex_gs
        page_size: 10000
  - index_name: "gs_sample"
    id_field: "sample_id"
    mapping:
      keyword:
        - sample_id
        - subject_ids_filter
      search_as_you_type:
        - sample_id_gs
        - is_tumor_gs
        - analyte_type_gs
    initial_query:
      # sample_id
      # sample_id_gs
      # is_tumor_gs
      # analyte_type_gs
      query: |
        MATCH (samp:sample)
        WITH DISTINCT samp, "Not specified in data" AS na
        ORDER BY samp.sample_id
        RETURN DISTINCT
          samp.sample_id as sample_id,
          samp.sample_id as sample_id_gs,
          COALESCE(samp.sample_tumor_status, na) as is_tumor_gs,
          COALESCE(samp.sample_type, na) as analyte_type_gs
        SKIP $skip LIMIT $limit
      page_size: 10000
    update_queries:
      # Subject IDs Filter
      - name: "Subject IDs Filter"
        # subject_ids_filter
        query: |
          MATCH (samp:sample)
          WITH DISTINCT samp
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (samp)-[:of_participant]->(p:participant)
          WITH samp.sample_id AS sample_id, 
            COLLECT(DISTINCT p.participant_id) AS participant_ids,
            "Not specified in data" AS na
          RETURN DISTINCT
            sample_id,
            CASE WHEN size(participant_ids) = 0 THEN [na] ELSE participant_ids END AS subject_ids_filter
        page_size: 10000
  - index_name: "gs_file"
    id_field: "file_id"
    mapping:
      keyword:
        - file_id
        - subject_ids_filter
      search_as_you_type:
        - subject_id_gs
        - sample_id_gs
        - file_id_gs
        - file_name_gs
        - file_type_gs
        - accesses_gs
        - acl_gs
        - experimental_strategies_gs
        - instrument_models_gs
        - library_layouts_gs
        - library_selections_gs
        - library_source_materials_gs
        - library_source_molecules_gs
        - library_strategies_gs
        - platforms_gs
        - reference_genome_assemblies_gs
        - sites_gs
        - is_supplementary_file_gs
    initial_query:
      # file_id
      # file_id_gs
      # file_name_gs
      # file_type_gs
      # is_supplementary_file_gs
      query: |
        MATCH (f:file)
        WITH DISTINCT f, "Not specified in data" AS na
        ORDER BY f.file_id
        RETURN DISTINCT
          f.file_id as file_id,
          f.file_id as file_id_gs,
          COALESCE(f.file_name, na) as file_name_gs,
          COALESCE(f.file_type, na) as file_type_gs,
          COALESCE(toString(f.is_supplementary_file), na) as is_supplementary_file_gs
        SKIP $skip LIMIT $limit
      page_size: 10000
    update_queries:
      # Participants
      - name: "Participants"
        # TODO: Future requirements clarification needed - determine if subject_id should be [String] array, comma-delimited string, or single value
        # Currently returns first participant_id only
        # subject_id_gs
        # subject_ids_filter
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-[:of_participant]->(p:participant)
          WITH f.file_id AS file_id, COLLECT(DISTINCT p.participant_id) AS participant_ids, "Not specified in data" AS na
          WITH file_id, na, CASE WHEN size(participant_ids) = 0 THEN [] ELSE participant_ids END AS participant_ids
          RETURN DISTINCT
            file_id,
            participant_ids[0] as subject_id_gs,
            CASE WHEN size(participant_ids) = 0 THEN [na] ELSE participant_ids END AS subject_ids_filter
        page_size: 10000
      # Samples
      - name: "Samples"
        # TODO: Future requirements clarification needed - determine if sample_id should be [String] array, comma-delimited string, or single value
        # Currently returns first sample_id only
        # sample_id_gs
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-[:of_participant]->(p:participant)
          WITH DISTINCT f, p
          OPTIONAL MATCH (p)<-[:of_participant]-(samp:sample)
          WITH f.file_id AS file_id, COLLECT(DISTINCT samp.sample_id) AS sample_ids
          WITH file_id, CASE WHEN size(sample_ids) = 0 THEN [] ELSE sample_ids END AS sample_ids
          RETURN DISTINCT
            file_id,
            sample_ids[0] as sample_id_gs
        page_size: 10000
      # Study Info
      - name: "Study Info"
        # accesses_gs
        # acl_gs
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-[:of_study]->(s:study)
          WITH f.file_id AS file_id, s, "Not specified in data" AS na
          WITH file_id, na,
            COLLECT(DISTINCT COALESCE(s.study_access, na)) AS accesses,
            CASE WHEN s.acl = '[]' THEN na ELSE replace(replace(replace(s.acl, '[', ''), ']', ''), '"', '') END AS acl
          RETURN DISTINCT
            file_id,
            CASE WHEN size(accesses) = 0 THEN [na] ELSE accesses END AS accesses_gs,
            COALESCE(acl, na) AS acl_gs
        page_size: 10000
      # Experimental Strategies
      - name: "Experimental Strategies"
        # experimental_strategies_gs
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          WITH f, "Not specified in data" AS na,
            split(replace(replace(replace(f.experimental_strategy_and_data_subtypes, '[', ''), ']', ''), '"', ''), ", ") AS experimental_strategies
          RETURN DISTINCT
            f.file_id AS file_id,
            CASE WHEN experimental_strategies IS NULL OR size(experimental_strategies)=0 THEN [na] ELSE experimental_strategies END AS experimental_strategies_gs
        page_size: 10000
      # Genomic Info GS
      - name: "Genomic Info GS"
        # library_strategies_gs
        # library_source_materials_gs
        # library_source_molecules_gs
        # library_layouts_gs
        # library_selections_gs
        # platforms_gs
        # instrument_models_gs
        # reference_genome_assemblies_gs
        query: |
          MATCH (f:file)
          WITH DISTINCT f
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)<-[:of_file]-(g:genomic_info)
          WITH f.file_id AS file_id, g, "Not specified in data" AS na
          WITH file_id, na,
            COLLECT(DISTINCT COALESCE(g.library_strategy, na)) AS library_strategies,
            COLLECT(DISTINCT COALESCE(g.library_source_material, na)) AS library_source_materials,
            COLLECT(DISTINCT COALESCE(g.library_source_molecule, na)) AS library_source_molecules,
            COLLECT(DISTINCT COALESCE(g.library_layout, na)) AS library_layouts,
            COLLECT(DISTINCT COALESCE(g.library_selection, na)) AS library_selections,
            COLLECT(DISTINCT COALESCE(g.platform, na)) AS platforms,
            COLLECT(DISTINCT COALESCE(g.instrument_model, na)) AS instrument_models,
            COLLECT(DISTINCT COALESCE(g.reference_genome_assembly, na)) AS reference_genome_assemblies
          RETURN DISTINCT
            file_id,
            CASE WHEN size(library_strategies) = 0 THEN [na] ELSE library_strategies END AS library_strategies_gs,
            CASE WHEN size(library_source_materials) = 0 THEN [na] ELSE library_source_materials END AS library_source_materials_gs,
            CASE WHEN size(library_source_molecules) = 0 THEN [na] ELSE library_source_molecules END AS library_source_molecules_gs,
            CASE WHEN size(library_layouts) = 0 THEN [na] ELSE library_layouts END AS library_layouts_gs,
            CASE WHEN size(library_selections) = 0 THEN [na] ELSE library_selections END AS library_selections_gs,
            CASE WHEN size(platforms) = 0 THEN [na] ELSE platforms END AS platforms_gs,
            CASE WHEN size(instrument_models) = 0 THEN [na] ELSE instrument_models END AS instrument_models_gs,
            CASE WHEN size(reference_genome_assemblies) = 0 THEN [na] ELSE reference_genome_assemblies END AS reference_genome_assemblies_gs
        page_size: 10000
      # Sites GS
      - name: "Sites GS"
        # sites_gs
        query: |
          MATCH (f:file)
          WITH DISTINCT f, "Not specified in data" AS na
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (f)-[*]->(diag:diagnosis)
          WITH f.file_id AS file_id, na,
            COLLECT(DISTINCT COALESCE(diag.primary_site, na)) AS sites
          RETURN DISTINCT
            file_id,
            CASE WHEN size(sites) = 0 THEN [na] ELSE sites END AS sites_gs
        page_size: 10000
  - index_name: "gs_program"
    id_field: "program_name"
    mapping:
      keyword:
        - program_name
      search_as_you_type:
        - program_name_gs
        - program_short_description_gs
        - program_full_description_gs
        - program_external_url_gs
        - program_sort_order_gs
        - type_gs
    initial_query:
      # program_name
      # program_name_gs
      # program_short_description_gs
      # program_full_description_gs
      # program_external_url_gs
      # program_sort_order_gs
      # type_gs
      query: |
        MATCH (p:program)
        WITH DISTINCT p, "Not specified in data" AS na
        ORDER BY p.program_sort_order
        RETURN DISTINCT
          p.program_name as program_name,
          p.program_name as program_name_gs,
          p.program_short_description as program_short_description_gs,
          p.program_full_description as program_full_description_gs,
          p.program_external_url as program_external_url_gs,
          p.program_sort_order as program_sort_order_gs,
          'program' as type_gs
        SKIP $skip LIMIT $limit
      page_size: 10000
  - index_name: "program"
    id_field: "program_name"
    mapping:
      keyword:
        - program
        - program_name
        - program_acronym
        - program_short_description
        - program_full_description
        - program_external_url
        - program_url
        - program_sort_order
        - acronym
        - name
        - website
        - study_participants.group
        - studies.accession
        - studies.study_access
        - studies.study_version
        - studies.study_data_types
        - studies.study_name
        - studies.study_description
        - studies.short_description
      long:
        - num_studies
        - num_participants
        - num_files
        - num_samples
        - num_disease_sites
        - study_participants.subjects
        - studies.num_participants
        - studies.num_samples
        - studies.num_files
    initial_query:
      # program
      # program_name
      # program_acronym
      # program_short_description
      # program_full_description
      # program_external_url
      # program_url
      # program_sort_order
      query: |
        MATCH (p:program)
        WITH DISTINCT p, "Not specified in data" AS na
        SKIP $skip LIMIT $limit
        WITH 
          p.program_name AS program_name,
          COALESCE(p.program_acronym, na) AS program_acronym,
          COALESCE(p.program_short_description, na) AS program_short_description,
          COALESCE(p.program_full_description, na) AS program_full_description,
          COALESCE(p.program_external_url, na) AS program_external_url
        RETURN DISTINCT
          program_name,
          program_acronym,
          program_acronym AS program,
          program_acronym AS acronym,
          program_name AS name,
          program_short_description,
          program_external_url AS program_url,
          program_external_url AS website,
          program_name AS program_sort_order
      page_size: 10000
    update_queries:
      # Program Statistics
      - name: "Program Statistics"
        # num_studies
        # num_participants
        # num_files
        # num_samples
        # num_disease_sites
        query: |
          MATCH (pr:program)
          WITH DISTINCT pr
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (pr)<-[*]-(s:study)
          WITH pr, COUNT(DISTINCT s) AS num_studies
          OPTIONAL MATCH (pr)<-[*]-(p:participant)
          WITH pr, num_studies, COUNT(DISTINCT p) AS num_participants 
          OPTIONAL MATCH (pr)<-[*]-(samp:sample)
          WITH pr, num_studies, num_participants, COUNT(DISTINCT samp) AS num_samples
          OPTIONAL MATCH (pr)<-[*]-(f:file)
          WITH pr, num_studies, num_participants, num_samples, COUNT(DISTINCT f) AS num_files
          OPTIONAL MATCH (pr)<-[*]-(diag:diagnosis)
          WITH pr, num_studies, num_participants, num_samples, num_files, COUNT(DISTINCT diag.primary_site) AS num_disease_sites
          RETURN 
            pr.program_name AS program_name,
            pr.program_acronym AS acronym,
            pr.program_name AS name,
            pr.program_external_url AS website,
            num_studies, 
            num_participants, 
            num_samples, 
            num_files,
            num_disease_sites
        page_size: 1
      # Study Participants
      - name: "Study Participants"
        # study_participants
        query: |
          MATCH (pr:program)
          WITH DISTINCT pr
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (pr:program)<-[:of_program]-(s:study)
          WITH pr, s
          OPTIONAL MATCH (s)<-[:of_study]-(p:participant)
          WITH pr, s, COUNT(DISTINCT p) AS num_participants
          WITH pr, COLLECT(DISTINCT {
            group: s.study_name,
            subjects: num_participants
          }) AS study_participants
          RETURN DISTINCT
            pr.program_name AS program_name,
            study_participants
        page_size: 10000
      # Studies
      - name: "Studies"
        # studies
        query: |
          MATCH (pr:program)
          WITH DISTINCT pr
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (pr:program)<-[:of_program]-(s:study)
          CALL {
            WITH s
            OPTIONAL MATCH (s)<-[*]-(p:participant)
            WITH s, COUNT(DISTINCT p) AS num_participants
            OPTIONAL MATCH (s)<-[*]-(samp:sample)
            WITH s, num_participants, COUNT(DISTINCT samp) AS num_samples
            OPTIONAL MATCH (s)<-[*]-(f:file)
            RETURN num_participants, num_samples, COUNT(DISTINCT f) AS num_files
          }
          WITH DISTINCT pr, s, num_participants, num_samples, num_files, 'Not specified in data' AS na
          WITH 
            pr, s, num_participants, num_samples, num_files,
            CASE WHEN s.study_version IS NULL OR s.study_version = '[]' THEN na ELSE replace(replace(replace(s.study_version, '[', ''), ']', ''), '"', '') END AS study_version,
            CASE WHEN s.study_data_types IS NULL OR s.study_data_types = '[]' THEN na ELSE replace(replace(replace(s.study_data_types, '[', ''), ']', ''), '"', '') END AS study_data_types
          RETURN 
            pr.program_name AS program_name,
            COLLECT({
              accession: s.phs_accession,
              study_access: s.study_access,
              study_version: study_version,
              study_data_types: study_data_types,
              study_name: s.study_name,
              study_description: s.study_description,
              short_description: s.short_description,
              num_participants: num_participants,
              num_samples: num_samples, num_files: num_files
            }) AS studies
        page_size: 1
