name: Unit Tests for GC
permissions:
  contents: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Choose the environment to build
        type: environment
      unit_test:
        description: "Run Unit Test"
        required: true
        type: boolean
        default: true
  pull_request:
    types:
      - opened
      - closed
    branches:
      - "*.*.*"

run-name: "Unit Tests – ${{ github.event_name == 'pull_request' && format('PR #{0} ({1})', github.event.pull_request.number, github.event.action == 'closed' && 'merged' || 'opened') || github.ref_name }}"

jobs:

  # ──────────────────────────────────────────────
  # Job 1: PR opened → run on source (head) branch
  # ──────────────────────────────────────────────

  pr-unit-test:
    name: PR Unit Test (npm) - ${{ matrix.name }}
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.action != 'closed'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: backend
            run: mvn test

          - name: frontend
            context: frontend
            run: npm run test

          - name: interoperation
            context: interoperation
            run: npm run test

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          submodules: recursive
          clean: true
          fetch-depth: 0

      - name: Set up Node.js
        if: matrix.name != 'backend'
        uses: actions/setup-node@v4
        with:
          node-version: '26'

      - name: Set up Java
        if: matrix.name == 'backend'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run unit tests
        working-directory: ${{ matrix.context }}
        run: ${{ matrix.run }}

  # ──────────────────────────────────────────────
  # Job 2: PR merged / workflow_dispatch → run on target (base) branch
  # ──────────────────────────────────────────────

  merged-unit-test:
    name: Merged Unit Test (npm) - ${{ matrix.name }}
    runs-on: ubuntu-latest
    if: (github.event_name == 'pull_request' && github.event.pull_request.merged == true) || (github.event_name == 'workflow_dispatch' && inputs.unit_test == true) 
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: backend
            run: mvn test

          - name: frontend
            context: frontend
            run: npm run test

          - name: interoperation
            context: interoperation
            run: npm run test

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          submodules: recursive
          clean: true
          fetch-depth: 0

      - name: Set up Node.js
        if: matrix.name != 'backend'
        uses: actions/setup-node@v4
        with:
          node-version: '26'

      - name: Set up Java
        if: matrix.name == 'backend'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run unit tests
        working-directory: ${{ matrix.context }}
        run: ${{ matrix.run }}

  # ──────────────────────────────────────────────
  # Slack notification (always runs)
  # ──────────────────────────────────────────────
  notify:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [pr-unit-test, merged-unit-test]
    if: always()
    steps:
      - name: Slack Notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        uses: act10ns/slack@87c73aef9f8838eb6feae81589a6b1487a4a9e08  # v1.6.0
        with:
          status: ${{ (contains(needs.*.result, 'failure')) && 'failure' || 'success' }}
