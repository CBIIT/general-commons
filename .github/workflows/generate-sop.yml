name: Generate SOP

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-sop:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/sop/requirements.txt

      - name: Generate SOP
        run: |
          mkdir -p artifacts
          python tools/sop/generate_sop.py \
            --config tools/sop/project-info.json \
            --repo . \
            --out artifacts/project-sop.docx

      - name: Upload SOP artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-sop
          path: artifacts/project-sop.docx
