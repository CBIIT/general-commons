name: Code Coverage

on:
  workflow_dispatch:
  push:
    branches: 
      - "*.*.*"
  pull_request:
    branches: 
      - "*.*.*"

permissions:
  contents: read

jobs:
  backend-test-coverage:
    name: Backend Coverage (Java)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Run Tests with Coverage
        working-directory: ./backend
        run: mvn clean test jacoco:report
      
      - name: Upload Coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          flag-name: backend
          parallel: true
          file: backend/target/site/jacoco/jacoco.xml
          base-path: backend

  frontend-test-coverage:
    name: Frontend Coverage (React)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Run Tests with Coverage
        working-directory: ./frontend
        run: npm run test:ci
      
      - name: Upload Coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          flag-name: frontend
          parallel: true
          base-path: frontend

  interoperation-test-coverage:
    name: Interoperation Coverage (Node.js)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: interoperation/package-lock.json
      
      - name: Install Dependencies
        working-directory: ./interoperation
        run: npm ci
      
      - name: Run Tests with Coverage
        working-directory: ./interoperation
        run: npm run test:coverage
      
      - name: Upload Coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          flag-name: interoperation
          parallel: true
          base-path: interoperation

  coverage-finish:
    name: Finalize Coverage Report
    needs: [backend-test-coverage, frontend-test-coverage, interoperation-test-coverage]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: Finalize Coveralls Parallel Build
        uses: coverallsapp/github-action@v2
        with:
          parallel-finished: true
          carryforward: "backend,frontend,interoperation"