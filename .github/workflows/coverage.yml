name: Code Coverage

on:
  push:
    branches: 
      - "main"
      - "*.*.*"
  pull_request:
    branches: 
      - "*"

permissions:
  contents: read

jobs:
  backend-test-coverage:
    name: Backend Coverage (Java)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Run Tests with Coverage
        working-directory: ./backend
        run: mvn clean test jacoco:report
      
      - name: Coveralls GitHub Action
        uses: coverallsapp/github-action@v2

  interoperation-test-coverage:
    name: Interoperation Coverage (Node.js)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: interoperation/package-lock.json
      
      - name: Install Dependencies
        working-directory: ./interoperation
        run: npm ci
      
      - name: Run Tests with Coverage
        working-directory: ./interoperation
        run: npm run test:coverage
      
      - name: Coveralls GitHub Action
        uses: coverallsapp/github-action@v2
